  // Soft pink area-rug under the centre
  drawCarpet(ctx, 3*64, 5*64, 8*64, 3*64, '#4a2238');
  // Tea desk (2..5, 2..4)
  drawWoodSlab(ctx, 2*64+4, 2*64+4, 3*64-8, 2*64-8, '#2a1418', '#4a2230');
  // Tea service: 3 small pink dots representing porcelain
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = '#f5d8e8';
    ctx.beginPath(); ctx.arc(3*64+20 + i*22, 3*64+10, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a060a0';
    ctx.beginPath(); ctx.arc(3*64+20 + i*22, 3*64+10, 3, 0, Math.PI*2); ctx.fill();
  }
  // Wardrobe (9..12, 2..4)
  drawWoodSlab(ctx, 9*64+4, 2*64+4, 3*64-8, 2*64-8, '#161018', '#2a1a26');
  // Wardrobe doors (slight gap)
  ctx.save();
  ctx.fillStyle = '#0a050a';
  ctx.fillRect(10.5*64-1, 2*64+8, 2, 2*64-16);
  ctx.restore();
  // Side-table with kettle (6..8, 6..7.4)
  drawWoodSlab(ctx, 6*64+4, 6*64+4, 2*64-8, 1.4*64-8, '#1a1018', '#3a1c30');
  // Kettle (brass + thin steam)
  ctx.save();
  ctx.fillStyle = '#7c5028';
  ctx.beginPath(); ctx.ellipse(7*64, 6.5*64, 16, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a07840';
  ctx.fillRect(7*64-3, 6.5*64-15, 6, 6);
  // Steam
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = `rgba(220,240,255,${0.2+0.15*Math.sin(t*2+i)})`;
    ctx.fillRect(7*64-2 + Math.sin(t*1.5+i)*4, 6.5*64-22 - i*8, 4, 6);
  }
  ctx.restore();
  // Leaded window on south wall
  ctx.save();
  ctx.fillStyle = '#08020c';
  ctx.fillRect(6*64, H-100, 128, 36);
  ctx.fillStyle = 'rgba(180,150,220,0.55)';
  ctx.fillRect(6*64+4, H-96, 120, 28);
  ctx.strokeStyle = '#150818'; ctx.lineWidth = 2;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(6*64 + i*30, H-96); ctx.lineTo(6*64 + i*30, H-68);
    ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
//   MEMORY HALL
// ============================================================
function drawMemoryHall(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 47);
  // Pale-blue glow rolling along the floor
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(80,180,240,${0.06+0.03*Math.sin(t*0.8)})`;
  ctx.fillRect(64, H*0.4, W-128, H*0.2);
  ctx.restore();
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#02080e');
  // Memory pedestals — small obsidian plinths with floating soul-orbs
  const pedestals = [
    {x:4.5, content:'orb', color:'#8cc6ff'},
    {x:8.5, content:'orb', color:'#c0d8ff'},
    {x:12.5, content:'orb', color:'#ffbbe0'},  // Maytradalis — pink
    {x:16.5, content:'orb', color:'#a8e0d0'},  // Elystria — green-teal
    {x:20.5, content:'empty', color:null},
  ];
  for (const ped of pedestals) {
    const px = ped.x*64, py = 4.4*64+32;
    // plinth
    ctx.fillStyle = '#0a1018';
    ctx.fillRect(px, py-8, 64, 24);
    ctx.fillStyle = '#1c2838';
    ctx.fillRect(px+4, py-8, 56, 6);
    // orb (or empty marker)
    if (ped.content === 'orb') {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const orbY = py - 30 + Math.sin(t*1.3 + ped.x)*4;
      ctx.fillStyle = ped.color;
      ctx.globalAlpha = 0.85 + 0.1*Math.sin(t*2 + ped.x);
      ctx.beginPath(); ctx.arc(px+32, orbY, 14, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.35;
      ctx.beginPath(); ctx.arc(px+32, orbY, 22, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      // empty — pulsing dark X
      ctx.save();
      ctx.strokeStyle = `rgba(160,200,240,${0.3+0.2*Math.sin(t*1.5)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px+22, py-32); ctx.lineTo(px+42, py-12);
      ctx.moveTo(px+42, py-32); ctx.lineTo(px+22, py-12);
      ctx.stroke();
      ctx.restore();
    }
  }
  // Cool drifting motes
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 40; i++) {
    const mx = (i * 73 + t*12) % W;
    const my = ((i * 113) % (H-128)) + 64;
    ctx.fillStyle = `rgba(140,200,240,${0.15+0.1*Math.sin(t+i)})`;
    ctx.fillRect(mx, my, 2, 2);
  }
  ctx.restore();
}

// ============================================================
//   BLACKBOX
// ============================================================
function drawBlackbox(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  // Mirror-iron floor
  ctx.fillStyle = '#040408';
  ctx.fillRect(0, 0, W, H);
  // Slight reflection bands
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = `rgba(40,40,60,${0.06})`;
    ctx.fillRect(0, i*(H/6) + (t*8 % (H/6)), W, 2);
  }
  ctx.restore();
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#01010a');
  // THE BLACKBOX — perfectly black cube
  const bx = 5*64, by = 3*64, bw = 6*64, bh = 6*64;
  ctx.fillStyle = '#000';
  ctx.fillRect(bx, by, bw, bh);
  // Edge "absence" — faint red haze at edges (so it doesn\'t blend with bg)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.strokeStyle = `rgba(180,30,50,${0.18 + 0.1*Math.sin(t)})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx-2, by-2, bw+4, bh+4);
  ctx.restore();
  // The single lamp above the box — colourless flame
  ctx.save();
  ctx.fillStyle = '#1a1014';
  ctx.fillRect(W/2-4, 80, 8, 28);
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(240,240,240,${0.55+0.15*Math.sin(t*3)})`;
  ctx.beginPath(); ctx.arc(W/2, 70, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(200,200,220,${0.25})`;
  ctx.beginPath(); ctx.arc(W/2, 70, 22, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ============================================================
//   CATHEDRAL OF REAPERS
// ============================================================
function drawCathedral(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 53);
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#03020a');
  // Vaulted arches on back wall — taller than corridor
  for (let i = 0; i < 7; i++) {
    const ax = 64 + i*((W-128)/7);
    const aw = (W-128)/7 - 4;
    drawArchPath(ctx, ax+2, 16, aw-4, 140);
    ctx.fillStyle = '#08060e'; ctx.fill();
    ctx.strokeStyle = '#1a1428'; ctx.lineWidth = 2; ctx.stroke();
  }
  // The Reaper-Statue dais (11..19, 2..5)
  ctx.fillStyle = '#0e0a18';
  ctx.fillRect(11*64, 2*64, 8*64, 3*64);
  ctx.strokeStyle = '#1a1428'; ctx.lineWidth = 2;
  ctx.strokeRect(11*64+1, 2*64+1, 8*64-2, 3*64-2);
  // The statue itself — silhouette
  drawReaperStatue(ctx, 15*64, 2.2*64, t);
  // Central aisle (mirror-stone)
  drawCarpet(ctx, 12*64, 5*64, 6*64, H-7*64, '#2a1828');
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(120,90,40,${0.04+0.02*Math.sin(t)})`;
  ctx.fillRect(12*64, 5*64, 6*64, H-7*64);
  ctx.restore();
  // Pews (already collidable — render as wood blocks)
  for (const px of [3,19]) {
    for (const py of [7, 9.5, 12]) {
      drawPew(ctx, px*64, py*64, 8*64, 1.2*64);
    }
  }
  // Great chandelier
  drawChandelier(ctx, W/2, 5.5*64, 1.4, '#ffd28b', t);
  // Sparse motes
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 30; i++) {
    const mx = (i*97 + t*8) % W;
    const my = (i*131) % (H-160) + 80;
    ctx.fillStyle = `rgba(255,210,140,${0.12+0.08*Math.sin(t+i*0.3)})`;
    ctx.fillRect(mx, my, 2, 2);
  }
  ctx.restore();
}

function drawReaperStatue(ctx, cx, top, t) {
  ctx.save();
  ctx.fillStyle = '#06040c';
  // Body (long robe)
  ctx.beginPath();
  ctx.moveTo(cx-32, top+30);
  ctx.lineTo(cx-44, top+170);
  ctx.lineTo(cx+44, top+170);
  ctx.lineTo(cx+32, top+30);
  ctx.closePath(); ctx.fill();
  // Hood
  ctx.beginPath();
  ctx.moveTo(cx-22, top+30);
  ctx.bezierCurveTo(cx-30, top, cx+30, top, cx+22, top+30);
  ctx.closePath(); ctx.fill();
  // Inside hood — pure black with faint glint
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(cx, top+18, 12, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(255,220,140,${0.18 + 0.1*Math.sin(t*0.6)})`;
  ctx.fillRect(cx-3, top+14, 6, 2);
  ctx.restore();
  // Scythe planted on the right
  ctx.fillStyle = '#1c1410';
  ctx.fillRect(cx+30, top+30, 4, 150);
  ctx.fillStyle = '#3a2a1c';
  ctx.beginPath();
  ctx.moveTo(cx+34, top+30);
  ctx.lineTo(cx+74, top+10);
  ctx.lineTo(cx+34, top+50);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawObsidian(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 59);
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#03020a');
  // Render 5 cells with their distinct contents
  const cells = [
    {x:3,  y:2, content:'scythe'},
    {x:9,  y:2, content:'letter'},
    {x:15, y:2, content:'token'},
    {x:3,  y:7, content:'empty'},
    {x:15, y:7, content:'sealed'},
  ];
  for (const c of cells) drawObsidianCell(ctx, c.x*64, c.y*64, 3*64, 3*64, c.content, t);
  // Floor cyan glow lines connecting the cells
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.strokeStyle = `rgba(160,90,255,${0.15+0.1*Math.sin(t)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 1; i < W/96; i++) {
    ctx.moveTo(i*96, H*0.55); ctx.lineTo(i*96+30, H*0.55);
  }
  ctx.stroke();
  ctx.restore();
}

function drawObsidianCell(ctx, x, y, w, h, kind, t) {
  ctx.save();
  // Outer obsidian frame
  ctx.fillStyle = '#0a0612';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#1a1028'; ctx.lineWidth = 3;
  ctx.strokeRect(x+1.5, y+1.5, w-3, h-3);
  // Inner window
  const ix = x+18, iy = y+18, iw = w-36, ih = h-36;
  ctx.fillStyle = '#020108';
  ctx.fillRect(ix, iy, iw, ih);
  // Content
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const cx = x + w/2, cy = y + h/2;
  if (kind === 'scythe') {
    // Floating scythe with violet thread
    ctx.strokeStyle = `rgba(180,120,255,${0.6+0.2*Math.sin(t*1.5)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx-20, cy+20); ctx.lineTo(cx+15, cy-15);
    ctx.stroke();
    ctx.fillStyle = '#a070d8';
    ctx.beginPath();
    ctx.moveTo(cx+15, cy-15); ctx.lineTo(cx+35, cy-25); ctx.lineTo(cx+18, cy-2);
    ctx.closePath(); ctx.fill();
  } else if (kind === 'letter') {
    // Folded letter "breathing"
    const breath = 1 + 0.12*Math.sin(t*1.8);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(breath, 1);
    ctx.fillStyle = `rgba(220,220,200,0.85)`;
    ctx.fillRect(-18, -12, 36, 24);
    ctx.fillStyle = `rgba(160,160,140,0.7)`;
    ctx.fillRect(-18, -2, 36, 2);
    ctx.restore();
  } else if (kind === 'token') {
    // Warm bone token
    ctx.fillStyle = `rgba(255,220,160,${0.7+0.2*Math.sin(t*2)})`;
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(255,180,100,0.5)`;
    ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill();
  } else if (kind === 'empty') {
    // Empty — show subtle text
    ctx.fillStyle = `rgba(120,80,180,${0.3+0.2*Math.sin(t)})`;
    ctx.font = 'bold 11px Cinzel,Georgia,serif';
    ctx.textAlign = 'center';
    ctx.fillText('HELD FOR', cx, cy-2);
    ctx.fillText('FUTURE', cx, cy+10);
  } else if (kind === 'sealed') {
    // Fully sealed — dense crosshatch + violet centre dot
    ctx.strokeStyle = `rgba(180,120,255,0.45)`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(ix+4, iy+4+i*((ih-8)/5));
      ctx.lineTo(ix+iw-4, iy+4+i*((ih-8)/5));
      ctx.stroke();
    }
    ctx.fillStyle = `rgba(120,40,255,${0.7})`;
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}

function drawStrataTable(ctx, x, y, w, h, t) {
  ctx.save();
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#1a2436'; ctx.lineWidth = 3;
  ctx.strokeRect(x+1.5, y+1.5, w-3, h-3);
  // Holo projection — concentric rings + drifting pips
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const cx = x + w/2, cy = y + h/2;
  ctx.strokeStyle = `rgba(90,220,255,${0.55+0.2*Math.sin(t*1.5)})`;
  ctx.lineWidth = 1.5;
  for (let r = 30; r < Math.min(w,h)*0.5; r += 24) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  }
  // Strata layer markers
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = `rgba(90,220,255,0.85)`;
  ctx.textAlign = 'center';
  ctx.fillText('-47', cx, cy+4);
  ctx.fillText('-48', cx + 60, cy+4);
  ctx.fillText('-49', cx + 110, cy+4);
  // Ship heading line
  ctx.strokeStyle = `rgba(140,255,220,${0.65+0.2*Math.sin(t*2)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx-50, cy); ctx.lineTo(cx+120, cy);
  ctx.stroke();
  // pips
  for (let i = 0; i < 8; i++) {
    const a = (t*0.5 + i * Math.PI/4) % (Math.PI*2);
    const rr = 50 + 30*((i+t)%2);
    ctx.fillStyle = `rgba(160,255,255,${0.6})`;
    ctx.fillRect(cx + Math.cos(a)*rr - 1, cy + Math.sin(a)*rr - 1, 2, 2);
  }
  ctx.restore();
  ctx.restore();
}

// ============================================================
//   ASSET LOADING
// ============================================================
function loadSprite(name) {
  return new Promise((resolve, reject) => {
    const m = SPRITE_META[name];
    const img = new Image();
    img.onload = () => { sprites[name] = img; resolve(); };
    img.onerror = () => reject(new Error('sprite load fail: ' + name));
    img.src = ASSET_BASE + m.src;
  });
}
async function loadAllSprites() {
  const names = Object.keys(SPRITE_META);
  const total = names.length;
  document.getElementById('loaderSub').textContent = `Loading sprites… (0/${total})`;
  let done = 0;
  for (const name of names) {
    try { await loadSprite(name); } catch(err) { console.warn('sprite skipped:', name, err); }
    done++;
    document.getElementById('loaderSub').textContent = `Loading sprites… (${done}/${total})`;
  }
  // Also preload the hangar backdrop panorama (Endless view) so the Surge
  // Hanger draw function can paint it as the back-wall view.
  await new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { window.HANGAR_BACKDROP_IMG = img; resolve(); };
    img.onerror = () => { console.warn('hangar backdrop failed to load'); resolve(); };
    img.src = '/api/static/hangar_backdrop.png';
  });
}

// ============================================================
//   GAME LOOP
// ============================================================
let t = 0; let lastT = 0;
function loop(timeMs){
  const dt = Math.min(0.05, (timeMs - lastT) / 1000 || 0);
  lastT = timeMs; t += dt;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt) {
  if (state.fading || !state.loaded) return;
  const k = state.keys;
  // Lock movement during a cinematic
  let vx = 0, vy = 0;
  if (state.cinematic && state.cinematic.active) {
    state.player.vx = 0; state.player.vy = 0; state.player.moving = false;
  } else {
    if (k.up)    vy -= 1;
    if (k.down)  vy += 1;
    if (k.left)  vx -= 1;
    if (k.right) vx += 1;
    if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }
    const speed = 220;
    state.player.vx = vx * speed;
    state.player.vy = vy * speed;
    state.player.moving = !!(vx || vy);
  }

  const room = state.rooms[state.currentRoom];
  const hbW = 32, hbH = 18, footOffsetY = 24;
  let nx = state.player.x + state.player.vx * dt;
  let ny = state.player.y + state.player.vy * dt;
  if (collidesAt(nx, state.player.y, hbW, hbH, footOffsetY, room)) nx = state.player.x;
  if (collidesAt(nx, ny, hbW, hbH, footOffsetY, room))             ny = state.player.y;
  // Soft clamp to room bounds — but DON'T clamp inside a door zone (doors
  // sit on the room edge by design, and the player needs to reach the
  // threshold to trigger the transition).
  const _inDoorZone = (room.doors||[]).some(dr => {
    const dx0 = dr.x*64 - 20, dx1 = (dr.x+dr.w)*64 + 20;
    const dy0 = dr.y*64 - 20, dy1 = (dr.y+dr.h)*64 + 20;
    return nx > dx0 && nx < dx1 && ny > dy0 && ny < dy1;
  });
  if (!_inDoorZone) {
    nx = Math.max(64 + hbW/2, Math.min(room.width*64 - 64 - hbW/2, nx));
    ny = Math.max(64 + hbH, Math.min(room.height*64 - 64 - hbH/2, ny));
  } else {
    // Soft outer clamp — let the player walk a bit past the inner wall into
    // the threshold, but never off-canvas.
    nx = Math.max(8, Math.min(room.width*64 - 8, nx));
    ny = Math.max(8, Math.min(room.height*64 - 8, ny));
  }
  state.player.x = nx;
  state.player.y = ny;

  if (Math.abs(vx) > Math.abs(vy)) {
    state.player.facing = vx > 0 ? 'right' : 'left';
  } else if (vy !== 0) {
    state.player.facing = vy > 0 ? 'down' : 'up';
  }
  if (state.player.moving) {
    state.player.animTime += dt;
    state.player.animFrame = Math.floor(state.player.animTime * 16) % 25;
    // Procedural footstep — derive running speed from velocity magnitude
    const _spd = Math.hypot(state.player.vx, state.player.vy);
    if (window.AmbientAudio) AmbientAudio.footstep('player', { running: _spd > 220 });
  } else {
    state.player.animTime = 0; state.player.animFrame = 0;
  }

  // === Patrol AI — any NPC with a `patrol` waypoint list walks the loop ===
  for (const npc of (room.npcs || [])) {
    if (!Array.isArray(npc.patrol) || npc.patrol.length < 2) continue;
    if (npc._patrolIdx === undefined) { npc._patrolIdx = 0; npc._pauseT = 0; }
    if (npc._pauseT > 0) { npc._pauseT -= dt; npc._moving = false; continue; }
    const target = npc.patrol[npc._patrolIdx];
    const dx = target.x - npc.x, dy = target.y - npc.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 0.08) {
      // Reached waypoint — small pause, then advance
      npc._patrolIdx = (npc._patrolIdx + 1) % npc.patrol.length;
      npc._pauseT = 0.6 + Math.random() * 1.2;
      npc._moving = false;
      continue;
    }
    const step = (npc.speed || 1.5) * dt;
    const nx = dx / dist, ny = dy / dist;
    npc.x += nx * step;
    npc.y += ny * step;
    npc._moving = true;
    npc.flip = nx < 0;
    // Distant footstep for NPC — softer than the player's
    if (window.AmbientAudio) {
      // Distance-based attenuation: NPCs further away are quieter
      const ddx = npc.x*64 - state.player.x, ddy = npc.y*64 - state.player.y;
      const npcDist = Math.hypot(ddx, ddy);
      if (npcDist < 700) {
        AmbientAudio.footstep('npc_'+(npc.label||npc.x+'_'+npc.y),
          { running: (npc.speed||1.5) > 1.8, distant: npcDist > 250 });
      }
    }
  }

  // interactables (use generous radius)
  state.nearInteract = null;
  // NPCs first (proximity → speak)
  for (const npc of (room.npcs||[])) {
    const dx = state.player.x - npc.x*64, dy = (state.player.y + footOffsetY) - npc.y*64;
    if (dx*dx + dy*dy < 110*110) {
      state.nearInteract = {
        title: npc.plaqueTitle || (npc.label||'').toUpperCase() || 'CREW MEMBER',
        body:  npc.plaqueBody  || `${npc.label||'A reaper'} acknowledges you with a slight nod.`,
        __npc: npc,
      };
      break;
    }
  }
  if (!state.nearInteract) {
    for (const it of (room.interactables||[])) {
      const dx = state.player.x - it.x*64, dy = (state.player.y + footOffsetY) - it.y*64;
      if (dx*dx + dy*dy < 110*110) { state.nearInteract = it; break; }
    }
  }
  for (const dr of (room.doors||[])) {
    const cx = (dr.x + dr.w/2) * 64, cy = (dr.y + dr.h/2) * 64;
    const dx = state.player.x - cx, dy = (state.player.y + footOffsetY) - cy;
    if (Math.abs(dx) < dr.w*32 + 18 && Math.abs(dy) < dr.h*32 + 22) {
      enterDoor(dr); return;
    }
  }

  // camera follow + clamp + cinematic-pan overlay
  let targetCx = state.player.x;
  let targetCy = state.player.y;
  let zoomTarget = 1;
  if (state.cinematic && state.cinematic.active) {
    const cin = state.cinematic;
    const elapsed = (performance.now() - cin.startedAt) / 1000;
    const dur = cin.duration || 8.0;
    // Ease in/out using smoothstep
    const k = Math.max(0, Math.min(1, elapsed / dur));
    const ease = k * k * (3 - 2 * k);
    // Slide camera toward focal point (bay door view)
    targetCx = cin.startCx + (cin.targetX - cin.startCx) * ease;
    targetCy = cin.startCy + (cin.targetY - cin.startCy) * ease;
    zoomTarget = 1 + (cin.zoom - 1) * Math.sin(Math.min(1, k * 1.4) * Math.PI);
    if (elapsed >= dur) endCinematic();
  }
  state.zoom = (state.zoom || 1) + (zoomTarget - (state.zoom || 1)) * Math.min(1, dt * 2.5);
  state.camera.x += (targetCx - state.camera.x) * Math.min(1, dt*6);
  state.camera.y += (targetCy - state.camera.y) * Math.min(1, dt*6);
  const halfW = (state.width/2) / state.zoom, halfH = (state.height/2) / state.zoom;
  const roomW = room.width*64, roomH = room.height*64;
  if (roomW <= halfW*2)  state.camera.x = roomW/2;
  else state.camera.x = Math.max(halfW, Math.min(roomW - halfW, state.camera.x));
  if (roomH <= halfH*2) state.camera.y = roomH/2;
  else state.camera.y = Math.max(halfH, Math.min(roomH - halfH, state.camera.y));

  const actBtn = document.getElementById('actionBtn');
  if (state.nearInteract) {
    actBtn.classList.remove('disabled');
    showHint(state.nearInteract.title);
  } else {
    actBtn.classList.add('disabled');
    hideHint();
  }
}

function collidesAt(px, py, hbW, hbH, footY, room) {
  const left = px - hbW/2, right = px + hbW/2;
  const top = py + footY - hbH/2, bottom = py + footY + hbH/2;
  // If the player's foot box overlaps a door zone, treat it as passable —
  // doors are visual gaps cut through the room walls.
  for (const dr of (room.doors||[])) {
    const dx = dr.x * 64, dy = dr.y * 64, dW = dr.w * 64, dH = dr.h * 64;
    const margin = 18;   // small buffer so the player can stand at the threshold
    if (right > dx - margin && left < dx + dW + margin &&
        bottom > dy - margin && top < dy + dH + margin) {
      // We're inside a door — ignore wall blocks here.
      return false;
    }
  }
  for (const w of room.walls) {
    const wx = w.x * 64, wy = w.y * 64, wW = w.w * 64, wH = w.h * 64;
    if (right > wx && left < wx + wW && bottom > wy && top < wy + wH) return true;
  }
  return false;
}

function render(){
  const W = state.width, H = state.height, dpr = state.dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  if (!state.loaded || !state.currentRoom) return;
  const room = state.rooms[state.currentRoom];
  const zoom = state.zoom || 1;
  const camX = state.camera.x - (W/zoom)/2;
  const camY = state.camera.y - (H/zoom)/2;
  ctx.save();
  // Apply cinematic screen shake (if any)
  const _sx = state.shakeX || 0, _sy = state.shakeY || 0;
  if (_sx || _sy) ctx.translate(_sx, _sy);
  ctx.scale(zoom, zoom);
  ctx.translate(-camX, -camY);
  room.draw(ctx, room);
  for (const it of (room.interactables||[])) {
    drawInteractableMarker(it.x*64, it.y*64, it === state.nearInteract);
  }
  for (const dr of (room.doors||[])) drawDoorMarker(dr);
  // Y-sort NPCs and the player so closer-to-camera sprites occlude further ones
  const drawList = [];
  drawList.push({ y: state.player.y, kind: 'player' });
  for (const n of (room.npcs||[])) drawList.push({ y: n.y * 64, kind: 'npc', npc: n });
  drawList.sort((a, b) => a.y - b.y);
  for (const item of drawList) {
    if (item.kind === 'player') drawPlayer();
    else drawNpc(item.npc);
  }
  ctx.restore();
  drawVignette();
  // Cinematic overlay (vignette intensifies + letterbox bars + banner)
  if (state.cinematic && state.cinematic.active) drawCinematicOverlay();
}

// ============================================================
//   CINEMATIC CAMERA SYSTEM
//   Pan + zoom the camera toward a focal point, with letterbox
//   bars, vignette, and a banner. Used for the Endless-viewing
//   trigger in the Surge Hanger; reusable for future story beats.
// ============================================================
function startCinematic(opts) {
  if (state.cinematic && state.cinematic.active) return;
  state.cinematic = Object.assign({
    active: true,
    startedAt: performance.now(),
    duration: 9.5,
    startCx: state.camera.x,
    startCy: state.camera.y,
    targetX: opts.targetX,   // world coords
    targetY: opts.targetY,
    zoom: opts.zoom || 1.45,
    banner: opts.banner || 'VIEWING THE ENDLESS',
    sub: opts.sub || '',
    playerFrozen: true,
    // Cinematic kind drives reveal effects ('endless' uses backdrop overlay)
    kind: opts.kind || 'default',
    // Used by drawCinematicOverlay for screen shake + audio swell + first-reveal banner
    shakeIntensity: opts.shakeIntensity != null ? opts.shakeIntensity : 8,
  }, opts);
  // Stop the player during cinematic
  state.player.vx = 0; state.player.vy = 0; state.player.moving = false;
  // Audio swell — low brass-like sustain that rises with the camera pan
  startCinematicSwell(state.cinematic);
  // Persist that the Endless has been seen at least once
  if (state.cinematic.kind === 'endless') {
    try {
      const seen = !!localStorage.getItem('ds_endless_seen');
      state.cinematic.firstReveal = !seen;
      if (!seen) localStorage.setItem('ds_endless_seen', '1');
    } catch (e) { state.cinematic.firstReveal = false; }
  }
}
function endCinematic() {
  if (state.cinematic) {
    state.cinematic.active = false;
    stopCinematicSwell(state.cinematic);
  }
  state.cinematic = null;
  state.shakeX = 0; state.shakeY = 0;
}

// ============================================================
//   Cinematic audio swell — uses the AmbientAudio WebAudio ctx.
//   Layered low pad + slow rising sine, faded in/out with the
//   cinematic timeline so the reveal feels weighted.
// ============================================================
function startCinematicSwell(cin) {
  if (!window.AmbientAudio || !AmbientAudio.isStarted()) return;
  try {
    const c = AmbientAudio.getCtx();
    const now = c.currentTime;
    const dur = cin.duration || 9;
    const master = c.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.22, now + 1.2);
    master.gain.setValueAtTime(0.22, now + dur - 1.4);
    master.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    master.connect(c.destination);
    // Low sustain (A1 + E2 fifth)
    const o1 = c.createOscillator(); o1.type = 'sawtooth';   o1.frequency.value = 55;
    const o2 = c.createOscillator(); o2.type = 'triangle';   o2.frequency.value = 82.4;
    // Rising shimmer (sine sweep from C4 up to C5 over the duration)
    const o3 = c.createOscillator(); o3.type = 'sine';       o3.frequency.value = 261.6;
    o3.frequency.exponentialRampToValueAtTime(523.3, now + dur * 0.65);
    o3.frequency.exponentialRampToValueAtTime(261.6, now + dur);
    const g1 = c.createGain(); g1.gain.value = 0.32;
    const g2 = c.createGain(); g2.gain.value = 0.22;
    const g3 = c.createGain(); g3.gain.value = 0.10;
    o1.connect(g1); o2.connect(g2); o3.connect(g3);
    g1.connect(master); g2.connect(master); g3.connect(master);
    o1.start(now); o2.start(now); o3.start(now);
    o1.stop(now + dur + 0.2);
    o2.stop(now + dur + 0.2);
    o3.stop(now + dur + 0.2);
    cin._audio = { master, o1, o2, o3 };
  } catch (e) { /* audio not ready, silent fail */ }
}
function stopCinematicSwell(cin) {
  if (!cin || !cin._audio) return;
  try {
    const c = AmbientAudio.getCtx();
    const now = c.currentTime;
    cin._audio.master.gain.cancelScheduledValues(now);
    cin._audio.master.gain.setValueAtTime(cin._audio.master.gain.value || 0.0001, now);
    cin._audio.master.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
  } catch (e) {}
  cin._audio = null;
}
function drawCinematicOverlay() {
  const cin = state.cinematic;
  const W = state.width, H = state.height;
  const elapsed = (performance.now() - cin.startedAt) / 1000;
  const dur = cin.duration;
  const k = Math.max(0, Math.min(1, elapsed / dur));

  // ============================================================
  // Screen shake — pulses sharply near the "reveal peak" (~50%
  // through the cinematic). Mostly subtle, becomes a real jolt
  // for the FIRST viewing of the Endless.
  // ============================================================
  // Bell-curve around k=0.45..0.65 (the moment the bay door fills the view)
  const peak = 0.55;
  const peakWindow = Math.exp(-((k - peak) * (k - peak)) / 0.012);  // narrow bell
  const intensity = (cin.shakeIntensity || 6) * peakWindow * (cin.firstReveal ? 1.8 : 0.55);
  state.shakeX = (Math.random() - 0.5) * intensity;
  state.shakeY = (Math.random() - 0.5) * intensity * 0.6;

  // ============================================================
  // Endless full-frame reveal — at the peak, fade in a large copy
  // of the hangar_backdrop sky behind a soft vignette, so the
  // player sees the Endless dominate the canvas before the camera
  // pulls back.
  // ============================================================
  if (cin.kind === 'endless' && window.HANGAR_BACKDROP_IMG && window.HANGAR_BACKDROP_IMG.complete) {
    // Reveal envelope: ramps up 0.30..0.55, holds, drops 0.78..0.95
    let revealAlpha = 0;
    if (k < 0.30) revealAlpha = 0;
    else if (k < 0.55) revealAlpha = (k - 0.30) / 0.25;
    else if (k < 0.78) revealAlpha = 1;
    else if (k < 0.95) revealAlpha = 1 - (k - 0.78) / 0.17;
    else revealAlpha = 0;
    revealAlpha = Math.max(0, Math.min(1, revealAlpha));

    if (revealAlpha > 0.01) {
      ctx.save();
      ctx.globalAlpha = revealAlpha;
      // The reference plate's BOTTOM half is the Endless sky + horizon
      // spires. Slice y=50%..98% so the fullscreen reveal is dominated
      // by lavender sky with the spires framing the lower edge.
      const img = window.HANGAR_BACKDROP_IMG;
      const sx = 0;
      const sy = img.height * 0.50;
      const sw = img.width;
      const sh = img.height * 0.48;
      // Slow Ken-Burns drift on the source
      const driftY = -Math.sin(k * Math.PI) * 18;
      // Fit cover the entire screen
      const dstAr = W / H;
      const srcAr = sw / sh;
      let dx = 0, dy = 0, dw = W, dh = H;
      if (srcAr > dstAr) {
        dh = H * 1.1;
        dw = dh * srcAr;
        dx = (W - dw) / 2;
        dy = (H - dh) / 2 + driftY;
      } else {
        dw = W * 1.1;
        dh = dw / srcAr;
        dx = (W - dw) / 2;
        dy = (H - dh) / 2 + driftY;
      }
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
      // Lavender colour cast for atmosphere
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = `rgba(180,140,210,${0.18 * revealAlpha})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  // letterbox bars (slide in over 0..0.8s, slide out over last 0.8s)
  const slideIn = Math.min(1, elapsed / 0.8);
  const slideOut = Math.min(1, (dur - elapsed) / 0.8);
  const bar = Math.min(slideIn, slideOut);
  const barH = H * 0.12 * bar;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.96)';
  ctx.fillRect(0, 0, W, barH);
  ctx.fillRect(0, H - barH, W, barH);
  // intensified vignette
  const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.4, W/2, H/2, Math.max(W,H)*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(0,0,0,${0.55 * bar})`);
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  // top-center banner
  const bannerOp = Math.min(1, Math.min(elapsed * 1.8, (dur - elapsed) * 1.5));
  if (bannerOp > 0) {
    ctx.globalAlpha = bannerOp;
    ctx.fillStyle = '#ffd28b';
    ctx.font = 'bold 20px Cinzel, Georgia, serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ffd28b'; ctx.shadowBlur = 16;
    ctx.fillText(cin.banner, W/2, barH + 32);
    ctx.shadowBlur = 0;
    if (cin.sub) {
      ctx.font = '13px Cinzel, Georgia, serif';
      ctx.fillStyle = 'rgba(255,230,200,0.75)';
      ctx.fillText(cin.sub, W/2, barH + 56);
    }
    // First-reveal callout
    if (cin.firstReveal && k > 0.4 && k < 0.85) {
      ctx.globalAlpha = bannerOp * Math.min(1, (k - 0.4) / 0.1) * Math.min(1, (0.85 - k) / 0.1);
      ctx.font = 'italic 14px Cinzel, Georgia, serif';
      ctx.fillStyle = 'rgba(220,200,255,0.85)';
      ctx.fillText('— first sight of the Endless —', W/2, H - barH - 44);
    }
    // skip hint at bottom
    ctx.globalAlpha = bannerOp * 0.55;
    ctx.font = '10px monospace';
    ctx.fillStyle = 'rgba(200,200,200,0.85)';
    ctx.fillText('[ press SPACE to skip ]', W/2, H - barH - 18);
  }
  ctx.restore();
}

function drawInteractableMarker(x, y, near){
  // Warm candle-flicker at floor level (no neon)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const flicker = 0.65 + 0.35*Math.sin(t*7 + x*.01);
  ctx.globalAlpha = (near ? 0.85 : 0.32) * flicker;
  ctx.fillStyle = near ? '#ffd28b' : '#d4a85a';
  ctx.beginPath(); ctx.arc(x, y, near ? 9 : 5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = (near ? 0.22 : 0.12) * flicker;
  ctx.beginPath(); ctx.arc(x, y, near ? 28 : 14, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  if (near) {
    ctx.save();
    ctx.fillStyle = '#ffe9b3';
    ctx.font = 'bold 11px Cinzel,Georgia,serif';
    ctx.textAlign = 'center';
    ctx.fillText('✦  EXAMINE', x, y - 22);
    ctx.restore();
  }
}

function drawDoorMarker(dr){
  // Real gothic archway opening — a stone-cut hallway through the wall.
  // Pulses warm amber from the corridor beyond. The visible threshold sells
  // the door as a physical passage, not just a glow.
  const cx = (dr.x + dr.w/2)*64, cy = (dr.y + dr.h/2)*64;
  const w  = Math.max(48, dr.w*64);
  const h  = Math.max(48, dr.h*64);
  ctx.save();
  // 1) Dark recessed jamb (the inner cavity of the archway)
  ctx.fillStyle = '#0b0610';
  const x0 = cx - w/2, y0 = cy - h/2;
  ctx.beginPath();
  ctx.moveTo(x0,            y0 + h*0.32);
  ctx.quadraticCurveTo(cx,  y0 - h*0.10, x0 + w, y0 + h*0.32);
  ctx.lineTo(x0 + w,        y0 + h);
  ctx.lineTo(x0,            y0 + h);
  ctx.closePath();
  ctx.fill();
  // 2) Stone arch trim (brass-bronze frame)
  ctx.strokeStyle = '#5a3a20'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x0,            y0 + h*0.32);
  ctx.quadraticCurveTo(cx,  y0 - h*0.10, x0 + w, y0 + h*0.32);
  ctx.stroke();
  // 3) Soft warm corridor light spilling out
  ctx.globalCompositeOperation = 'lighter';
  const flicker = 0.55 + 0.35*Math.sin(t*3 + cx*.01);
  const grad = ctx.createRadialGradient(cx, y0 + h*0.55, 2, cx, y0 + h*0.55, w*0.7);
  grad.addColorStop(0, 'rgba(255,196,118,' + (0.55*flicker).toFixed(3) + ')');
  grad.addColorStop(1, 'rgba(255,196,118,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x0 - 20, y0 - 20, w + 40, h + 40);
  // 4) Door-sigil "EXIT" pip at the apex
  ctx.globalAlpha = 0.65 + 0.25*Math.sin(t*4);
  ctx.fillStyle = '#ffd28b';
  ctx.font = 'bold 11px Cinzel,Georgia,serif';
  ctx.textAlign = 'center';
  ctx.fillText('◆', cx, y0 + h*0.18);
  ctx.restore();
  // 5) Threshold prompt when the player stands near
  const dx = state.player.x - cx, dy = (state.player.y + 24) - cy;
  if (Math.abs(dx) < w/2 + 30 && Math.abs(dy) < h/2 + 30) {
    ctx.save();
    ctx.fillStyle = '#ffe9b3';
    ctx.font = 'bold 10px Cinzel,Georgia,serif';
    ctx.textAlign = 'center';
    const label = (dr.to||'').replace(/_/g,' ').toUpperCase();
    ctx.fillText('▾ ' + label + ' ▾', cx, y0 - 4);
    ctx.restore();
  }
}

function drawPlayer(){
  const p = state.player;
  let sheet, flipped = false, frameIdx;
  const facing = p.facing;
  const isMoving = p.moving;
  if (!isMoving) {
    if (facing === 'down') { sheet = 'idle_down'; frameIdx = Math.floor(t*5) % SPRITE_META.idle_down.frames; }
    else if (facing === 'up')   { sheet = 'idle_up'; frameIdx = Math.floor(t*5) % SPRITE_META.idle_up.frames; }
    else { sheet = 'idle_right'; frameIdx = Math.floor(t*5) % SPRITE_META.idle_right.frames; flipped = (facing === 'left'); }
  } else if (facing === 'down') {
    sheet = 'run_down';  frameIdx = p.animFrame % SPRITE_META.run_down.frames;
  } else if (facing === 'up') {
    sheet = 'run_up';    frameIdx = p.animFrame % SPRITE_META.run_up.frames;
  } else if (facing === 'right') {
    sheet = 'run_right'; frameIdx = p.animFrame % SPRITE_META.run_right.frames;
  } else {
    sheet = 'run_right'; flipped = true; frameIdx = p.animFrame % SPRITE_META.run_right.frames;
  }
  const meta = SPRITE_META[sheet];
  const img = sprites[sheet];
  if (!img) return;
  const fIdx = frameIdx;
  // === Consistent character size across animation sheets ===
  // Each Maytradalis sheet has a slightly different frame_h (192 / 182 /
  // 145 etc.). Using a single `scale` against frame_h would make her
  // visibly grow and shrink as she switches poses. Instead we normalise
  // by deriving the per-sheet scale from a CANONICAL target height — the
  // tallest sheet (run_down at 192) multiplied by playerScale.
  const refH = SPRITE_META.run_down.frame_h;       // 192 — canonical
  const targetH = refH * state.playerScale;        // ~106 px on-screen
  const effScale = targetH / meta.frame_h;
  const drawW = meta.frame_w * effScale;
  const drawH = meta.frame_h * effScale;
  const drawX = p.x - drawW/2;
  // Subtle idle "breathing" bob — only when not moving
  const bob = isMoving ? 0 : Math.sin(t * 2.3) * 1.6;
  const drawY = p.y - drawH + 20 + bob;

  // shadow
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(p.x, p.y + 18, drawW*0.32, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  if (flipped) {
    ctx.translate(drawX + drawW/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(drawX + drawW/2), 0);
  }
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, fIdx * meta.frame_w, 0, meta.frame_w, meta.frame_h, drawX, drawY, drawW, drawH);
  ctx.restore();
}

// Sprite-based NPCs (Death, Elystria, Cryious, Romaine, ...) — Y-sorted with player
// Each NPC has a canonical `refSheet` (defaults to its idle sheet, falling
// back to its walk sheet) whose frame_h is used as the reference height —
// so the character keeps a CONSISTENT on-screen height when its animation
// swaps between idle and walking.
function drawNpc(npc) {
  // Custom vector-drawn NPCs (hooded reapers, skeletons, etc.) — no sprite sheet.
  if (npc.customDraw) {
    const px = npc.x * 64;
    const py = npc.y * 64;
    const scale = npc.scale || 1.0;
    const drawer = NPC_DRAW[npc.customDraw];
    if (drawer) {
      // Shadow
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(px, py + 18, 18*scale, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // Custom drawer — they handle the entire sprite render at (px, py)
      drawer(ctx, px, py, t, scale, npc);
      // Speak hint
      const near = (state.nearInteract && state.nearInteract.__npc === npc);
      if (near) {
        ctx.save();
        ctx.font = 'bold 11px Cinzel,Georgia,serif';
        ctx.fillStyle = '#ffe9b3';
        ctx.textAlign = 'center';
        ctx.fillText('✦  SPEAK · ' + (npc.label || ''), px, py - 110*scale);
        ctx.restore();
      }
    }
    return;
  }
  const isMoving = !!npc._moving;
  const sheetName = (!isMoving && npc.idleSheet) ? npc.idleSheet : npc.sheet;
  const meta = SPRITE_META[sheetName];
  const img = sprites[sheetName];
  if (!meta || !img) return;
  const refSheetName = npc.refSheet || npc.idleSheet || npc.sheet;
  const refMeta = SPRITE_META[refSheetName] || meta;
  const baseScale = npc.scale || 0.55;
  const targetH = refMeta.frame_h * baseScale;
  const effScale = targetH / meta.frame_h;
  const drawW = meta.frame_w * effScale;
  const drawH = meta.frame_h * effScale;
  const px = npc.x * 64;
  const py = npc.y * 64;
  const speed = npc.animSpeed || 5;
  const frame = Math.floor(t * speed) % meta.frames;
  const bob = isMoving ? 0 : Math.sin(t * 1.8 + npc.x*0.7) * 1.4;
  const drawX = px - drawW/2;
  const drawY = py - drawH + 20 + bob;
  // shadow
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(px, py + 18, drawW*0.32, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // sprite
  ctx.save();
  if (npc.flip) {
    ctx.translate(drawX + drawW/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(drawX + drawW/2), 0);
  }
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, frame * meta.frame_w, 0, meta.frame_w, meta.frame_h, drawX, drawY, drawW, drawH);
  ctx.restore();
  // floating "•" indicator above an NPC the player is near
  const near = (state.nearInteract && state.nearInteract.__npc === npc);
  if (near) {
    ctx.save();
    ctx.font = 'bold 11px Cinzel,Georgia,serif';
    ctx.fillStyle = '#ffe9b3';
    ctx.textAlign = 'center';
    ctx.fillText('✦  SPEAK · ' + (npc.label || ''), px, drawY - 4);
    ctx.restore();
  }
  // Ambient self-talk speech bubble
  drawNpcSpeechBubble(npc, px, drawY - 18);
}

// ============================================================
//   AMBIENT NPC SELF-TALK
//   NPCs with `idleQuips: [string,...]` randomly emit a short
//   speech-bubble line every ~14–28 seconds. The bubble floats
//   above their head for ~5 seconds, then fades.
// ============================================================
function drawNpcSpeechBubble(npc, anchorX, anchorY) {
  if (!npc.idleQuips || !npc.idleQuips.length) return;
  const now = (typeof t === 'number') ? t : 0;
  if (npc._nextQuipAt == null) {
    // Stagger so all NPCs don't talk at once on room load
    npc._nextQuipAt = now + 4 + Math.random() * 10;
  }
  // Pick a new line when the timer is up
  if (!npc._currentQuip && now >= npc._nextQuipAt) {
    npc._currentQuip = npc.idleQuips[Math.floor(Math.random() * npc.idleQuips.length)];
    npc._quipUntil = now + 5.5;
    // Schedule the *next* quip after this one fades
    npc._nextQuipAt = now + 5.5 + 12 + Math.random() * 16;
  }
  if (npc._currentQuip && now >= npc._quipUntil) {
    npc._currentQuip = null;
  }
  if (!npc._currentQuip) return;
  // Render the speech bubble
  const text = npc._currentQuip;
  const remaining = npc._quipUntil - now;
  const opacity = remaining < 0.6 ? Math.max(0, remaining / 0.6)
                 : (remaining > 4.9 ? Math.max(0, (5.5 - remaining) / 0.6) : 1);
  ctx.save();
  ctx.font = '12px Georgia, serif';
  // measure & wrap (~28 chars per line)
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (test.length > 32 && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  const lineH = 16;
  const padX = 10, padY = 8;
  let maxW = 0;
  for (const l of lines) {
    const w = ctx.measureText(l).width;
    if (w > maxW) maxW = w;
  }
  const bubbleW = maxW + padX * 2;
  const bubbleH = lineH * lines.length + padY * 2;
  const bx = anchorX - bubbleW / 2;
  const by = anchorY - bubbleH - 12;
  // Drop shadow
  ctx.globalAlpha = opacity * 0.4;
  ctx.fillStyle = '#000';
  roundRect(ctx, bx + 2, by + 3, bubbleW, bubbleH, 6); ctx.fill();
  // Bubble body
  ctx.globalAlpha = opacity * 0.93;
  ctx.fillStyle = 'rgba(20, 16, 28, 0.92)';
  ctx.strokeStyle = 'rgba(255, 220, 160, 0.55)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, bx, by, bubbleW, bubbleH, 6); ctx.fill(); ctx.stroke();
  // Tail pointing down at NPC
  ctx.beginPath();
  ctx.moveTo(anchorX - 6, by + bubbleH - 0.5);
  ctx.lineTo(anchorX,     by + bubbleH + 8);
  ctx.lineTo(anchorX + 6, by + bubbleH - 0.5);
  ctx.fillStyle = 'rgba(20, 16, 28, 0.92)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 220, 160, 0.55)';
  ctx.beginPath();
  ctx.moveTo(anchorX - 6, by + bubbleH - 0.5);
  ctx.lineTo(anchorX,     by + bubbleH + 8);
  ctx.lineTo(anchorX + 6, by + bubbleH - 0.5);
  ctx.stroke();
  // Text
  ctx.globalAlpha = opacity;
  ctx.fillStyle = '#f5e3c0';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], bx + padX, by + padY + i * lineH);
  }
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

function drawVignette(){
  const W = state.width, H = state.height;
  const grad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.32, W/2, H/2, Math.max(W,H)*0.78);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function loadRoom(id, spawn) {
  const def = ROOM_DEFS[id];
  if (!def) {
    console.error('loadRoom: unknown room id', id, '— available:', Object.keys(ROOM_DEFS));
    return;
  }
  state.currentRoom = id;
  state.rooms[id] = def;
  state.visited.add(id);
  const sx = (spawn && typeof spawn.x === 'number') ? spawn.x : def.spawn.x;
  const sy = (spawn && typeof spawn.y === 'number') ? spawn.y : def.spawn.y;
  let px = sx * 64;
  let py = sy * 64;
  // Defensive: if the requested spawn happens to land inside one of the room's
  // wall colliders (e.g. on top of a docked skiff), search outward in a
  // spiral for the closest walkable tile so the player doesn't get stuck.
  const hbW = 18, hbH = 18, footY = 24;
  if (collidesAt(px, py, hbW, hbH, footY, def)) {
    const STEP = 32;
    let found = null;
    outer:
    for (let r = 1; r <= 12 && !found; r++) {
      for (let dy = -r; dy <= r && !found; dy++) {
        for (let dx = -r; dx <= r && !found; dx++) {
          if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
          const tx = px + dx*STEP, ty = py + dy*STEP;
          if (tx < 64 + hbW/2 || tx > def.width*64 - 64 - hbW/2) continue;
          if (ty < 64 + hbH    || ty > def.height*64 - 64 - hbH/2) continue;
          if (!collidesAt(tx, ty, hbW, hbH, footY, def)) {
            found = { x: tx, y: ty };
            break outer;
          }
        }
      }
    }
    if (found) {
      console.warn('loadRoom: spawn inside collider — nudged to', found);
      px = found.x; py = found.y;
    }
  }
  state.player.x = px;
  state.player.y = py;
  state.player.vx = 0; state.player.vy = 0;
  state.player.moving = false;
  state.player.animFrame = 0; state.player.animTime = 0;
  state.camera.x = state.player.x;
  state.camera.y = state.player.y;
  document.getElementById('roomName').textContent = def.name;
  document.getElementById('roomSub').textContent  = def.sub;
  News.onRoomEnter();
}
function enterDoor(door){
  // Guard against re-entry from a still-in-progress fade
  if (state.fading) return;
  console.log('[door] entering', door.to, 'spawn', door.spawn);
  if (typeof playDoorCue === 'function') playDoorCue();
  state.fading = true;
  const fade = document.getElementById('fade');
  fade.classList.add('show');
  const prevRoom = state.currentRoom;
  setTimeout(() => {
    try {
      loadRoom(door.to, door.spawn);
    } catch (err) {
      console.error('[door] loadRoom threw:', err);
    }
    // If the room didn't actually change, log loudly so the bug is visible
    if (state.currentRoom === prevRoom) {
      console.error('[door] FAILED to transition from', prevRoom, '→', door.to);
    }
    setTimeout(() => {
      fade.classList.remove('show');
      state.fading = false;
    }, 250);
  }, 350);
}

// ============================================================
//   AMBIENT AUDIO ENGINE
//   Procedural footsteps, distant whisper-chatter, and a slow
//   gothic-organ drone — all built with one shared AudioContext.
// ============================================================
const AmbientAudio = (function() {
  let ctx = null;
  let masterGain = null;
  let ambientBus = null;     // for chatter + drone
  let sfxBus = null;         // for footsteps + door cues
  let started = false;
  let droneNodes = [];
  let chatterTimer = null;
  let lastFootAt = { player: 0 };

  function ensureCtx() {
    if (ctx) return ctx;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain(); masterGain.gain.value = 0.85; masterGain.connect(ctx.destination);
    ambientBus = ctx.createGain(); ambientBus.gain.value = 0.55; ambientBus.connect(masterGain);
    sfxBus = ctx.createGain();     sfxBus.gain.value = 0.7;     sfxBus.connect(masterGain);
    return ctx;
  }

  // --- FOOTSTEPS — short low-passed noise burst with a click-thump
  function footstep(speakerKey, opts) {
    if (!started) return;
    const c = ctx;
    const now = c.currentTime;
    const last = lastFootAt[speakerKey] || 0;
    const minGap = opts && opts.running ? 0.20 : 0.34;
    if (now - last < minGap) return;
    lastFootAt[speakerKey] = now;
    // Noise burst
    const bufLen = Math.floor(c.sampleRate * 0.16);
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const env = Math.exp(-i / (bufLen * 0.3));
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const src = c.createBufferSource(); src.buffer = buf;
    const lp = c.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.value = opts && opts.running ? 1100 : 750;
    lp.Q.value = 0.7;
    const g = c.createGain();
    const peak = (opts && opts.distant) ? 0.035 : (opts && opts.running ? 0.13 : 0.09);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(peak, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    src.connect(lp); lp.connect(g); g.connect(sfxBus);
    src.start(now); src.stop(now + 0.2);
    // Subtle low-thump
    const o = c.createOscillator(); const og = c.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(opts && opts.running ? 95 : 70, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.12);
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(peak * 0.65, now + 0.01);
    og.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
    o.connect(og); og.connect(sfxBus);
    o.start(now); o.stop(now + 0.16);
  }

  // --- DISTANT WHISPER CHATTER — formant-shaped noise pulses
  function scheduleChatter() {
    if (!started) return;
    const c = ctx;
    const now = c.currentTime;
    // Random whisper "syllable" — a short noise burst routed through a bandpass
    const dur = 0.18 + Math.random() * 0.4;
    const bufLen = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const env = Math.sin(Math.PI * i / bufLen);
      data[i] = (Math.random() * 2 - 1) * env * 0.6;
    }
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.value = 600 + Math.random() * 1200;
    bp.Q.value = 4 + Math.random() * 6;
    const delay = c.createDelay(); delay.delayTime.value = 0.07;
    const fb = c.createGain(); fb.gain.value = 0.38;
    const g = c.createGain(); g.gain.value = 0.08 + Math.random() * 0.05;
    // pan slightly
    let panner = null;
    try { panner = c.createStereoPanner(); panner.pan.value = (Math.random()*2 - 1) * 0.85; } catch(e){}
    src.connect(bp);
    bp.connect(delay); delay.connect(fb); fb.connect(delay);
    bp.connect(g); delay.connect(g);
    if (panner) { g.connect(panner); panner.connect(ambientBus); } else { g.connect(ambientBus); }
    src.start(now); src.stop(now + dur + 0.1);
    // schedule next chatter — 6–14s gap, random
    const next = 5500 + Math.random() * 9000;
    chatterTimer = setTimeout(scheduleChatter, next);
  }

  // --- GOTHIC ORGAN DRONE — sustained pad, slow chord progression
  function startDrone() {
    if (!started) return;
    const c = ctx;
    const now = c.currentTime;
    // Three slowly-overlapping voices forming a minor 6th–7th pad
    // base ~ A1 (55), with E2 (82.4) and C3 (~130.8)
    const freqs = [55, 82.41, 130.81];
    const overall = c.createGain(); overall.gain.value = 0.0; overall.connect(ambientBus);
    overall.gain.linearRampToValueAtTime(0.34, now + 4.0);
    droneNodes.push(overall);
    // Slow chorus modulation
    const lfo = c.createOscillator(); lfo.frequency.value = 0.07;
    const lfoGain = c.createGain(); lfoGain.gain.value = 1.6;
    lfo.connect(lfoGain);
    lfo.start(now);
    droneNodes.push(lfo);
    freqs.forEach((f, i) => {
      // Two detuned saw-tooths per voice — organ-like reediness
      [0, 1].forEach(j => {
        const o = c.createOscillator(); o.type = 'sawtooth';
        o.frequency.value = f * (j === 0 ? 1.0 : 1.005);
        lfoGain.connect(o.frequency);
        const lp = c.createBiquadFilter(); lp.type = 'lowpass';
        lp.frequency.value = 380 + i * 70; lp.Q.value = 4;
        const og = c.createGain(); og.gain.value = 0.07 / freqs.length;
        // gentle amplitude wobble per voice
        const ampLfo = c.createOscillator(); ampLfo.frequency.value = 0.04 + i*0.013;
        const ampLfoGain = c.createGain(); ampLfoGain.gain.value = 0.018;
        ampLfo.connect(ampLfoGain); ampLfoGain.connect(og.gain);
        ampLfo.start(now);
        o.connect(lp); lp.connect(og); og.connect(overall);
        o.start(now);
        droneNodes.push(o); droneNodes.push(ampLfo);
      });
    });
    // Add a tall fifth above (E3 ~ 164.8) that fades in much later
    const upperOsc = c.createOscillator(); upperOsc.type = 'triangle';
    upperOsc.frequency.value = 164.81;
    const upperGain = c.createGain(); upperGain.gain.value = 0;
    upperGain.gain.setValueAtTime(0, now + 14);
    upperGain.gain.linearRampToValueAtTime(0.03, now + 30);
    upperOsc.connect(upperGain); upperGain.connect(overall);
    upperOsc.start(now);
    droneNodes.push(upperOsc);
  }

  function start() {
    if (started) return;
    ensureCtx();
    if (ctx.state === 'suspended') ctx.resume();
    started = true;
    startDrone();
    chatterTimer = setTimeout(scheduleChatter, 4000);
  }

  function setVolume(v) {
    if (!ctx || !masterGain) return;
    masterGain.gain.value = Math.max(0, Math.min(1, v));
  }

  function pause() {
    if (!ctx) return;
    if (ctx.state === 'running') ctx.suspend();
  }
  function resume() {
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
  }

  return { start, footstep, setVolume, pause, resume,
           isStarted: () => started, getCtx: () => ctx };
})();
window.AmbientAudio = AmbientAudio;

// Door enter cue — short bell tone
function playDoorCue() {
  if (!AmbientAudio.isStarted()) return;
  try {
    const c = AmbientAudio.getCtx();
    const now = c.currentTime;
    const o = c.createOscillator(); const g = c.createGain();
    o.type = 'triangle'; o.frequency.value = 220;
    o.frequency.exponentialRampToValueAtTime(330, now + 0.18);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.08, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    o.connect(g); g.connect(c.destination);
    o.start(now); o.stop(now + 0.6);
  } catch (e) {}
}

// ============================================================
//   GAME MUSIC — softly pause when ad plays, resume after.
// ============================================================
// (We reuse the existing /api/static/dimensionlock_theme.mp3 if available.)
let musicEl = null;
let musicWasPlaying = false;
function ensureMusic() {
  if (musicEl) return musicEl;
  musicEl = new Audio('/api/static/dimensionlock_theme.mp3');
  musicEl.loop = true;
  musicEl.volume = 0.32;
  return musicEl;
}
function startGameMusic() {
  const m = ensureMusic();
  m.play().then(() => { musicWasPlaying = true; }).catch(()=>{ /* autoplay blocked, will play on first key press */ });
}
function pauseGameMusic() {
  if (!musicEl) return;
  if (!musicEl.paused) { musicEl.pause(); musicWasPlaying = true; }
}
function resumeGameMusic() {
  if (!musicEl) return;
  if (musicWasPlaying) { musicEl.play().catch(()=>{}); }
}

// ============================================================
//   INPUT
// ============================================================
const keyMap = {
  'ArrowUp':'up', 'KeyW':'up',
  'ArrowDown':'down', 'KeyS':'down',
  'ArrowLeft':'left', 'KeyA':'left',
  'ArrowRight':'right', 'KeyD':'right',
};
window.addEventListener('keydown', e => {
  if (keyMap[e.code]) { state.keys[keyMap[e.code]] = true; e.preventDefault(); startGameMusic(); if (window.AmbientAudio) AmbientAudio.start(); }
  // SPACE skips an active cinematic
  if (e.code === 'Space' && state.cinematic && state.cinematic.active) {
    e.preventDefault();
    endCinematic();
  }
  if (e.code === 'KeyE' || e.code === 'Space' || e.code === 'Enter') {
    if (document.getElementById('modal').classList.contains('show')) closeModal();
    else interact();
    e.preventDefault();
  }
  if (e.code === 'Escape') {
    if (document.getElementById('modal').classList.contains('show')) closeModal();
  }
});
window.addEventListener('keyup', e => {
  if (keyMap[e.code]) { state.keys[keyMap[e.code]] = false; e.preventDefault(); }
});

// Dev hatch — press 1/2/3/4 to teleport between the 4 rooms (debug)
window.addEventListener('keydown', e => {
  if (e.code === 'Digit1') loadRoom('control');
  else if (e.code === 'Digit2') loadRoom('dorm_hall');
  else if (e.code === 'Digit3') loadRoom('mays_room');
  else if (e.code === 'Digit4') loadRoom('surge_hanger');
  else if (e.code === 'Digit5') loadRoom('engine_room');
  else if (e.code === 'Digit6') loadRoom('judgement_court');
  else if (e.code === 'Digit7') loadRoom('creation_leveler');
  else if (e.code === 'Digit8') loadRoom('deaths_office');
  else if (e.code === 'Digit9') loadRoom('memory_hall');
  else if (e.code === 'Digit0') loadRoom('blackbox');
  else if (e.code === 'KeyQ' && (e.ctrlKey || e.metaKey)) loadRoom('vivians_room');
  else if (e.code === 'KeyW' && (e.ctrlKey || e.metaKey)) loadRoom('cathedral');
  else if (e.code === 'KeyE' && (e.ctrlKey || e.metaKey)) loadRoom('obsidian');
  else if (e.code === 'KeyR' && (e.ctrlKey || e.metaKey)) loadRoom('navigators');
  else if (e.code === 'KeyT' && (e.ctrlKey || e.metaKey)) loadRoom('lower_deck');
});

const dpadEl = document.getElementById('dpad');
dpadEl.querySelectorAll('.btn').forEach(b => {
  const dir = b.dataset.dir;
  const press   = ev => { ev.preventDefault(); state.keys[dir] = true;  b.classList.add('active'); startGameMusic(); };
  const release = ev => { ev.preventDefault(); state.keys[dir] = false; b.classList.remove('active'); };
  b.addEventListener('touchstart', press,  { passive:false });
  b.addEventListener('touchend',   release,{ passive:false });
  b.addEventListener('touchcancel',release,{ passive:false });
  b.addEventListener('mousedown',  press);
  b.addEventListener('mouseup',    release);
  b.addEventListener('mouseleave', release);
});
document.getElementById('actionBtn').addEventListener('click', interact);
document.getElementById('actionBtn').addEventListener('touchstart', e => { e.preventDefault(); interact(); }, { passive:false });

// ============================================================
//   RESIZE + BOOT
// ============================================================
// Detect mobile/touch + small viewport. The Death's Ship rooms are very
// composition-heavy (banners, embers, sigil rings, chandeliers, braziers,
// vector NPCs) — on a phone GPU this drops 600+ frames a minute, which is
// what makes Maytradalis "look transparent" and her animation "look messed
// up" (her sprite is fine; the engine is partially-drawing each frame).
// When this flag is true, we reduce particle/effect counts and clamp DPR.
window.__DLDS_MOBILE = (
  ('ontouchstart' in window) &&
  Math.min(window.innerWidth, window.innerHeight) < 700
);

function resize(){
  // Phones get clamped to DPR 1 — the per-pixel cost was murdering animation
  // throughput. Desktops still get DPR 2 for crisp sprites.
  const maxDpr = window.__DLDS_MOBILE ? 1.0 : 2.0;
  const dpr = Math.max(1, Math.min(maxDpr, window.devicePixelRatio || 1));
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  state.width = w; state.height = h; state.dpr = dpr;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();

(async function boot(){
  try {
    await loadAllSprites();
    loadRoom('control');
    state.loaded = true;
    document.getElementById('loader').classList.add('hide');
    News.start();
    requestAnimationFrame(loop);
  } catch (err) {
    document.getElementById('loaderSub').textContent = 'Load failed: ' + err.message;
    console.error(err);
  }
})();
})();
</script>
