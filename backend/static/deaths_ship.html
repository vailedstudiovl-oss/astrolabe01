function drawSurgeHanger(ctx, room){
  // Canon-style sci-fi hanger: bronze-brown floor, cyan LED ceiling/floor strips,
  // 4 dark sleek skiffs in two rows, metal cage cargo crates, an open trapezoidal
  // bay door at the top showing a lavender-purple sky, no candles or stone.
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;

  // 1) BRONZE METAL FLOOR with subtle panel seams
  ctx.fillStyle = p.floor; ctx.fillRect(0,0,W,H);
  // diagonal hatch (very subtle)
  ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
  for (let i = 0; i < W+H; i += 32) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke();
  }
  // large panel grid (~2 tile)
  ctx.strokeStyle = 'rgba(0,0,0,0.20)'; ctx.lineWidth = 2;
  for (let y = 64; y < H; y += 128) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x = 64; x < W; x += 128) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  // gentle bronze sheen highlight
  const sheen = ctx.createLinearGradient(0, 0, 0, H);
  sheen.addColorStop(0, 'rgba(180,140,80,0.05)');
  sheen.addColorStop(0.5, 'rgba(255,210,150,0.04)');
  sheen.addColorStop(1, 'rgba(120,80,40,0.06)');
  ctx.fillStyle = sheen; ctx.fillRect(0, 0, W, H);

  // 2) WALLS — bronze-brown panels with darker seam beam
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  // Riveted seams along walls (vertical strips every 96px on the perimeter)
  ctx.fillStyle = '#2a1d10';
  for (let x = 32; x < W; x += 96) {
    ctx.fillRect(x, 0, 2, 64);
    ctx.fillRect(x, H-64, 2, 64);
  }
  for (let y = 32; y < H; y += 96) {
    ctx.fillRect(0, y, 64, 2);
    ctx.fillRect(W-64, y, 64, 2);
  }
  // Wall accent trim (deep brown)
  ctx.fillStyle = '#1a0f06';
  ctx.fillRect(0, 60, W, 4);          // top inner trim
  ctx.fillRect(0, H-64, W, 4);        // bottom inner trim
  ctx.fillRect(60, 0, 4, H);          // left
  ctx.fillRect(W-64, 0, 4, H);        // right

  // 3) OPEN BAY DOOR at top — large trapezoidal opening showing purple sky + runway.
  // We CARVE through the top wall here (so the wall is split: left piece + bay door + right piece).
  // First repaint the area above the bay door region with the sky cutout.
  drawBayDoorOpen(ctx, 6*64, 0, 16*64, 128);
  // re-add the bronze wall trim on each side of the bay door
  ctx.fillStyle = p.wall;
  ctx.fillRect(0, 0, 6*64, 64); ctx.fillRect(22*64, 0, W - 22*64, 64);
  // wall riveted seam strip again, for the side pieces
  ctx.fillStyle = '#2a1d10';
  for (let x = 32; x < 6*64; x += 96) ctx.fillRect(x, 0, 2, 64);
  for (let x = 22*64 + 32; x < W; x += 96) ctx.fillRect(x, 0, 2, 64);
  ctx.fillStyle = '#1a0f06';
  ctx.fillRect(0, 60, 6*64, 4); ctx.fillRect(22*64, 60, W - 22*64, 4);

  // 4) CYAN CEILING LIGHT STRIPS (top wall) — 6 rectangles glowing on the ceiling
  for (let i = 0; i < 6; i++) {
    drawCyanStrip(ctx, (4 + i*3.4)*64, 16, 1.6*64, 6, t, i);
  }
  // 5) CYAN FLOOR GUIDE STRIP — runs the length of the hanger down the middle
  drawCyanFloorStrip(ctx, 6.5*64, H/2 - 10, 15*64, 6, t);
  // Two side cyan strips along the inner edges of the side ship-rows
  drawCyanFloorStrip(ctx, 5.2*64, 5.5*64, 0.6*64, 5*64, t, /*vertical*/ true);
  drawCyanFloorStrip(ctx, 22.6*64, 5.5*64, 0.6*64, 5*64, t, true);

  // 6) FOUR DARK SLEEK HARVEST SKIFFS in two rows (canon look)
  drawSkiff(ctx, 1.5*64, 5.5*64, 3.5*64, 1.6*64, false /*facing right*/);
  drawSkiff(ctx, 1.5*64, 8.5*64, 3.5*64, 1.6*64, false);
  drawSkiff(ctx, 23*64,  5.5*64, 3.5*64, 1.6*64, true  /*facing left*/);
  drawSkiff(ctx, 23*64,  8.5*64, 3.5*64, 1.6*64, true);

  // 7) METAL CAGE CARGO CRATES (2 in the middle)
  drawCageCrate(ctx, 7*64, 6.5*64, 3*64, 3*64);
  drawCageCrate(ctx, 11.5*64, 6.5*64, 3*64, 3*64);

  // 8) ROMAINE'S WORKBENCH (bottom-left)
  drawWorkbench(ctx, 6*64, 11*64, 3.5*64, 1.4*64, t);

  // 9) ROMAINE NPC — now drawn via the room's npcs[] sprite pipeline (see drawNpcs)

  // 10) Skeleton-servant (placeholder, patrolling along bottom)
  const skeletX = 25*64 + Math.sin(t*0.4)*40;
  drawSkeletonServant(ctx, skeletX, 12*64);

  // 11) Floor signage
  ctx.save();
  ctx.font = 'bold 11px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(255,255,255,0.16)';
  ctx.textAlign = 'center'; ctx.fillText('▾  SURGE HANGER · BAY 03  ▾', W/2, H - 78);
  // skiff name etched plaques (in front of each ship)
  ctx.font = 'bold 9px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(62,224,224,0.55)';
  ctx.fillText('RAVENWAKE',  3.2*64, 5.5*64 - 6);
  ctx.fillText('LANTERN',    3.2*64, 8.5*64 - 6);
  ctx.fillText('BLACKHEART', 24.7*64, 5.5*64 - 6);
  ctx.fillText('UNNAMED',    24.7*64, 8.5*64 - 6);
  ctx.restore();
}

// ---- canon hanger primitives ----

function drawBayDoorOpen(ctx, x, y, w, h) {
  // Trapezoidal cutout in the top wall — shows lavender sky + bronze runway in the distance.
  ctx.save();
  // The trapezoid (narrower at top of hanger view, wider at the visible "horizon")
  const inset = 32;
  ctx.beginPath();
  ctx.moveTo(x + inset, y);
  ctx.lineTo(x + w - inset, y);
  ctx.lineTo(x + w + inset, y + h);
  ctx.lineTo(x - inset,     y + h);
  ctx.closePath();
  ctx.clip();

  // Lavender sky gradient (canon: pinkish purple haze with distant clouds)
  const sky = ctx.createLinearGradient(0, y, 0, y + h*4);
  sky.addColorStop(0, '#cfb0e8');
  sky.addColorStop(0.55, '#9c84c4');
  sky.addColorStop(1, '#5d4a82');
  ctx.fillStyle = sky;
  ctx.fillRect(x - inset, y, w + 2*inset, h + 4);

  // Distant runway/horizon line
  ctx.fillStyle = 'rgba(60,40,80,0.45)';
  ctx.fillRect(x + w/2 - 30, y + h - 8, 60, 4);
  // distant docking spire silhouette
  ctx.fillStyle = 'rgba(40,28,60,0.6)';
  ctx.beginPath();
  ctx.moveTo(x + w/2 - 8, y + h - 6);
  ctx.lineTo(x + w/2,     y + h - 14);
  ctx.lineTo(x + w/2 + 8, y + h - 6);
  ctx.closePath(); ctx.fill();
  // soft cloud streaks
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 30, y + 14, w - 60, 4);
  ctx.fillRect(x + 80, y + 30, w - 160, 3);
  ctx.fillRect(x + 50, y + 44, w - 100, 2);

  ctx.restore();

  // Trapezoid frame trim (bronze)
  ctx.save();
  ctx.strokeStyle = '#3a2510'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x + 32, y);
  ctx.lineTo(x + w - 32, y);
  ctx.lineTo(x + w + 32, y + h);
  ctx.lineTo(x - 32,     y + h);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawCyanStrip(ctx, cx, cy, w, h, t, seed) {
  ctx.save();
  const pulse = 0.75 + 0.25 * Math.sin(t*1.6 + seed);
  // base strip
  ctx.fillStyle = '#1a3838';
  ctx.fillRect(cx - w/2, cy - h/2, w, h);
  // glow rectangle
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.85 * pulse;
  ctx.fillStyle = '#3ee0e0';
  ctx.fillRect(cx - w/2 + 2, cy - h/2 + 1, w - 4, h - 2);
  // outer halo
  ctx.globalAlpha = 0.18 * pulse;
  ctx.fillStyle = '#3ee0e0';
  ctx.fillRect(cx - w/2 - 14, cy - h/2 - 8, w + 28, h + 16);
  ctx.restore();
}

function drawCyanFloorStrip(ctx, x, y, w, h, t, vertical) {
  ctx.save();
  // base etched line
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  // animated chase: chunks of cyan moving along the strip
  const chunk = 22, gap = 12, period = chunk + gap;
  const offset = (t * 60) % period;
  ctx.globalCompositeOperation = 'lighter';
  if (!vertical) {
    for (let dx = -period; dx < w + period; dx += period) {
      const px = x + dx + offset;
      const pulse = 0.7 + 0.3*Math.sin(t*3 + dx);
      ctx.globalAlpha = 0.85 * pulse;
      ctx.fillStyle = '#3ee0e0';
      ctx.fillRect(Math.max(x, px), y, Math.min(chunk, x + w - px), h);
    }
    // outer halo
    ctx.globalAlpha = 0.12;
    ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
  } else {
    for (let dy = -period; dy < h + period; dy += period) {
      const py = y + dy + offset;
      const pulse = 0.7 + 0.3*Math.sin(t*3 + dy);
      ctx.globalAlpha = 0.85 * pulse;
      ctx.fillStyle = '#3ee0e0';
      ctx.fillRect(x, Math.max(y, py), w, Math.min(chunk, y + h - py));
    }
    ctx.globalAlpha = 0.12;
    ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
  }
  ctx.restore();
}

function drawSkiff(ctx, x, y, w, h, faceLeft) {
  // Canon: dark sleek wedge-shaped skiff, top-down. Two slim cyan engine vents
  // at the rear, tinted canopy near the nose, brass underbelly trim.
  ctx.save();
  if (faceLeft) {
    ctx.translate(x + w, y);
    ctx.scale(-1, 1);
    ctx.translate(-x, -y);
  }

  // shadow underneath
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(x + w*0.5, y + h + 6, w*0.42, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // hull — angular wedge pointing right
  const hullColor = '#1c1820';
  ctx.fillStyle = hullColor;
  ctx.beginPath();
  ctx.moveTo(x + w*0.04, y + h*0.5);
  ctx.lineTo(x + w*0.14, y + h*0.10);
  ctx.lineTo(x + w*0.78, y + h*0.04);
  ctx.lineTo(x + w*1.00, y + h*0.50);
  ctx.lineTo(x + w*0.78, y + h*0.96);
  ctx.lineTo(x + w*0.14, y + h*0.90);
  ctx.closePath(); ctx.fill();

  // panel highlight along the spine
  ctx.fillStyle = '#2a2630';
  ctx.beginPath();
  ctx.moveTo(x + w*0.18, y + h*0.18);
  ctx.lineTo(x + w*0.74, y + h*0.16);
  ctx.lineTo(x + w*0.92, y + h*0.50);
  ctx.lineTo(x + w*0.74, y + h*0.84);
  ctx.lineTo(x + w*0.18, y + h*0.82);
  ctx.closePath(); ctx.fill();

  // brass underbelly trim (visible as a strip)
  ctx.fillStyle = '#5a4028';
  ctx.fillRect(x + w*0.18, y + h*0.46, w*0.62, h*0.08);

  // tinted canopy near the nose (amber-bronze tint)
  ctx.fillStyle = '#3a2818';
  ctx.beginPath();
  ctx.ellipse(x + w*0.66, y + h*0.5, w*0.16, h*0.30, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(60,224,224,0.55)';
  ctx.beginPath();
  ctx.ellipse(x + w*0.66, y + h*0.5, w*0.13, h*0.24, 0, 0, Math.PI*2); ctx.fill();

  // two cyan engine vents at the rear
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const vy of [y + h*0.30, y + h*0.70]) {
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#3ee0e0';
    ctx.fillRect(x + w*0.05, vy - 3, 8, 6);
    ctx.globalAlpha = 0.22;
    ctx.fillRect(x + w*0.04 - 12, vy - 9, 22, 18);
  }
  ctx.restore();

  // yellow ribbon (Romaine's signature) on the rear stabilizer
  ctx.fillStyle = '#ffd28b';
  ctx.fillRect(x + w*0.06, y + h*0.50 - 6, 4, 12);

  ctx.restore();
}

function drawCageCrate(ctx, x, y, w, h) {
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x + 6, y + h - 4, w - 12, 8);
  // base
  ctx.fillStyle = '#1f1a14';
  ctx.fillRect(x, y, w, h);
  // top and side cage frame (steel grey)
  ctx.fillStyle = '#3a342c';
  ctx.fillRect(x, y, w, 8);
  ctx.fillRect(x, y, 8, h);
  ctx.fillRect(x + w - 8, y, 8, h);
  ctx.fillRect(x, y + h - 8, w, 8);
  // grid bars
  ctx.strokeStyle = '#5a544c'; ctx.lineWidth = 2;
  for (let i = 1; i < 5; i++) {
    const px = x + (w * i/5);
    ctx.beginPath(); ctx.moveTo(px, y + 8); ctx.lineTo(px, y + h - 8); ctx.stroke();
  }
  for (let i = 1; i < 5; i++) {
    const py = y + (h * i/5);
    ctx.beginPath(); ctx.moveTo(x + 8, py); ctx.lineTo(x + w - 8, py); ctx.stroke();
  }
  // brass clasp (sigil-clamp) on the front
  ctx.fillStyle = '#9d6f48';
  ctx.fillRect(x + w/2 - 14, y + h - 14, 28, 8);
  ctx.fillStyle = '#d4a85a';
  ctx.fillRect(x + w/2 - 12, y + h - 12, 24, 2);
  ctx.restore();
}

function drawWorkbench(ctx, x, y, w, h, t) {
  ctx.save();

  ctx.fillStyle = '#3a2810';

  ctx.fillStyle = '#5a4028';
  ctx.fillRect(x + 4, y + 4, w - 8, 6);

  ctx.fillStyle = '#9d6f48';
  ctx.fillRect(x + 10, y + 22, 50, 5);
  ctx.fillRect(x + 70, y + 32, 38, 5);
  ctx.fillRect(x + 130, y + 22, 26, 5);

  ctx.fillStyle = '#7a5028';
  ctx.fillRect(x + w - 30, y + 14, 14, 22);
  ctx.fillStyle = '#9d6f48';
  ctx.fillRect(x + w - 30, y + 14, 14, 4);
  // carnation in tube (Romaine's signature)
  ctx.fillStyle = '#9d6f48';
  ctx.fillRect(x + w - 12, y - 14, 4, 18);
  ctx.fillStyle = '#e8b9d8';
  ctx.beginPath(); ctx.arc(x + w - 10, y - 16, 5, 0, Math.PI*2); ctx.fill();
  // small cyan computer screen on the bench
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.7 + 0.3*Math.sin(t*2.5);
  ctx.fillStyle = '#3ee0e0';
  ctx.fillRect(x + 30, y + 14, 22, 14);
  ctx.restore();
  ctx.restore();
}

function drawSkeletonServant(ctx, x, y) {
  // Tiny skeleton-servant placeholder
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(x, y + 22, 9, 3, 0, 0, Math.PI*2); ctx.fill();
  // body (dark grey robe)
  ctx.fillStyle = '#2a2420';
  ctx.fillRect(x - 5, y - 4, 10, 22);
  // skull
  ctx.fillStyle = '#d8d4cc';
  ctx.beginPath(); ctx.arc(x, y - 10, 5, 0, Math.PI*2); ctx.fill();
  // coal eye sockets
  ctx.fillStyle = '#1a1814';
  ctx.fillRect(x - 3, y - 11, 1.5, 2);
  ctx.fillRect(x + 1.5, y - 11, 1.5, 2);
  // tin pail of carnation petals
  ctx.fillStyle = '#7a5028';
  ctx.fillRect(x + 6, y + 2, 5, 6);
  ctx.fillStyle = '#e8b9d8';
  ctx.fillRect(x + 6, y + 1, 5, 1);
  ctx.restore();
}

// ============================================================
//   ASSET LOADING
// ============================================================
function loadSprite(name) {
  return new Promise((resolve, reject) => {
    const m = SPRITE_META[name];
    const img = new Image();
    img.onload = () => { sprites[name] = img; resolve(); };
    img.onerror = () => reject(new Error('sprite load fail: ' + name));
    img.src = ASSET_BASE + m.src;
  });
}
async function loadAllSprites() {
  const names = Object.keys(SPRITE_META);
  const total = names.length;
  document.getElementById('loaderSub').textContent = `Loading sprites… (0/${total})`;
  let done = 0;
  for (const name of names) {
    try { await loadSprite(name); } catch(err) { console.warn('sprite skipped:', name, err); }
    done++;
    document.getElementById('loaderSub').textContent = `Loading sprites… (${done}/${total})`;
  }
}

// ============================================================
//   GAME LOOP
// ============================================================
let t = 0; let lastT = 0;
function loop(timeMs){
  const dt = Math.min(0.05, (timeMs - lastT) / 1000 || 0);
  lastT = timeMs; t += dt;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt) {
  if (state.fading || !state.loaded) return;
  const k = state.keys;
  let vx = 0, vy = 0;
  if (k.up)    vy -= 1;
  if (k.down)  vy += 1;
  if (k.left)  vx -= 1;
  if (k.right) vx += 1;
  if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }
  const speed = 220;
  state.player.vx = vx * speed;
  state.player.vy = vy * speed;
  state.player.moving = !!(vx || vy);

  const room = state.rooms[state.currentRoom];
  const hbW = 32, hbH = 18, footOffsetY = 24;
  let nx = state.player.x + state.player.vx * dt;
  let ny = state.player.y + state.player.vy * dt;
  if (collidesAt(nx, state.player.y, hbW, hbH, footOffsetY, room)) nx = state.player.x;
  if (collidesAt(nx, ny, hbW, hbH, footOffsetY, room))             ny = state.player.y;
  // Soft clamp to room bounds — but DON'T clamp inside a door zone (doors
  // sit on the room edge by design, and the player needs to reach the
  // threshold to trigger the transition).
  const _inDoorZone = (room.doors||[]).some(dr => {
    const dx0 = dr.x*64 - 20, dx1 = (dr.x+dr.w)*64 + 20;
    const dy0 = dr.y*64 - 20, dy1 = (dr.y+dr.h)*64 + 20;
    return nx > dx0 && nx < dx1 && ny > dy0 && ny < dy1;
  });
  if (!_inDoorZone) {
    nx = Math.max(64 + hbW/2, Math.min(room.width*64 - 64 - hbW/2, nx));
    ny = Math.max(64 + hbH, Math.min(room.height*64 - 64 - hbH/2, ny));
  } else {
    // Soft outer clamp — let the player walk a bit past the inner wall into
    // the threshold, but never off-canvas.
    nx = Math.max(8, Math.min(room.width*64 - 8, nx));
    ny = Math.max(8, Math.min(room.height*64 - 8, ny));
  }
  state.player.x = nx;
  state.player.y = ny;

  if (Math.abs(vx) > Math.abs(vy)) {
    state.player.facing = vx > 0 ? 'right' : 'left';
  } else if (vy !== 0) {
    state.player.facing = vy > 0 ? 'down' : 'up';
  }
  if (state.player.moving) {
    state.player.animTime += dt;
    state.player.animFrame = Math.floor(state.player.animTime * 16) % 25;
  } else {
    state.player.animTime = 0; state.player.animFrame = 0;
  }

  // === Patrol AI — any NPC with a `patrol` waypoint list walks the loop ===
  for (const npc of (room.npcs || [])) {
    if (!Array.isArray(npc.patrol) || npc.patrol.length < 2) continue;
    if (npc._patrolIdx === undefined) { npc._patrolIdx = 0; npc._pauseT = 0; }
    if (npc._pauseT > 0) { npc._pauseT -= dt; npc._moving = false; continue; }
    const target = npc.patrol[npc._patrolIdx];
    const dx = target.x - npc.x, dy = target.y - npc.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 0.08) {
      // Reached waypoint — small pause, then advance
      npc._patrolIdx = (npc._patrolIdx + 1) % npc.patrol.length;
      npc._pauseT = 0.6 + Math.random() * 1.2;
      npc._moving = false;
      continue;
    }
    const step = (npc.speed || 1.5) * dt;
    const nx = dx / dist, ny = dy / dist;
    npc.x += nx * step;
    npc.y += ny * step;
    npc._moving = true;
    npc.flip = nx < 0;
  }

  // interactables (use generous radius)
  state.nearInteract = null;
  // NPCs first (proximity → speak)
  for (const npc of (room.npcs||[])) {
    const dx = state.player.x - npc.x*64, dy = (state.player.y + footOffsetY) - npc.y*64;
    if (dx*dx + dy*dy < 110*110) {
      state.nearInteract = {
        title: npc.plaqueTitle || (npc.label||'').toUpperCase() || 'CREW MEMBER',
        body:  npc.plaqueBody  || `${npc.label||'A reaper'} acknowledges you with a slight nod.`,
        __npc: npc,
      };
      break;
    }
  }
  if (!state.nearInteract) {
    for (const it of (room.interactables||[])) {
      const dx = state.player.x - it.x*64, dy = (state.player.y + footOffsetY) - it.y*64;
      if (dx*dx + dy*dy < 110*110) { state.nearInteract = it; break; }
    }
  }
  for (const dr of (room.doors||[])) {
    const cx = (dr.x + dr.w/2) * 64, cy = (dr.y + dr.h/2) * 64;
    const dx = state.player.x - cx, dy = (state.player.y + footOffsetY) - cy;
    if (Math.abs(dx) < dr.w*32 + 18 && Math.abs(dy) < dr.h*32 + 22) {
      enterDoor(dr); return;
    }
  }

  // camera follow + clamp
  const targetCx = state.player.x;
  const targetCy = state.player.y;
  state.camera.x += (targetCx - state.camera.x) * Math.min(1, dt*6);
  state.camera.y += (targetCy - state.camera.y) * Math.min(1, dt*6);
  const halfW = state.width/2, halfH = state.height/2;
  const roomW = room.width*64, roomH = room.height*64;
  if (roomW <= state.width)  state.camera.x = roomW/2;
  else state.camera.x = Math.max(halfW, Math.min(roomW - halfW, state.camera.x));
  if (roomH <= state.height) state.camera.y = roomH/2;
  else state.camera.y = Math.max(halfH, Math.min(roomH - halfH, state.camera.y));

  const actBtn = document.getElementById('actionBtn');
  if (state.nearInteract) {
    actBtn.classList.remove('disabled');
    showHint(state.nearInteract.title);
  } else {
    actBtn.classList.add('disabled');
    hideHint();
  }
}

function collidesAt(px, py, hbW, hbH, footY, room) {
  const left = px - hbW/2, right = px + hbW/2;
  const top = py + footY - hbH/2, bottom = py + footY + hbH/2;
  // If the player's foot box overlaps a door zone, treat it as passable —
  // doors are visual gaps cut through the room walls.
  for (const dr of (room.doors||[])) {
    const dx = dr.x * 64, dy = dr.y * 64, dW = dr.w * 64, dH = dr.h * 64;
    const margin = 18;   // small buffer so the player can stand at the threshold
    if (right > dx - margin && left < dx + dW + margin &&
        bottom > dy - margin && top < dy + dH + margin) {
      // We're inside a door — ignore wall blocks here.
      return false;
    }
  }
  for (const w of room.walls) {
    const wx = w.x * 64, wy = w.y * 64, wW = w.w * 64, wH = w.h * 64;
    if (right > wx && left < wx + wW && bottom > wy && top < wy + wH) return true;
  }
  return false;
}

function render(){
  const W = state.width, H = state.height, dpr = state.dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  if (!state.loaded || !state.currentRoom) return;
  const room = state.rooms[state.currentRoom];
  const camX = state.camera.x - W/2;
  const camY = state.camera.y - H/2;
  ctx.save();
  ctx.translate(-camX, -camY);
  room.draw(ctx, room);
  for (const it of (room.interactables||[])) {
    drawInteractableMarker(it.x*64, it.y*64, it === state.nearInteract);
  }
  for (const dr of (room.doors||[])) drawDoorMarker(dr);
  // Y-sort NPCs and the player so closer-to-camera sprites occlude further ones
  const drawList = [];
  drawList.push({ y: state.player.y, kind: 'player' });
  for (const n of (room.npcs||[])) drawList.push({ y: n.y * 64, kind: 'npc', npc: n });
  drawList.sort((a, b) => a.y - b.y);
  for (const item of drawList) {
    if (item.kind === 'player') drawPlayer();
    else drawNpc(item.npc);
  }
  ctx.restore();
  drawVignette();
}

function drawInteractableMarker(x, y, near){
  // Warm candle-flicker at floor level (no neon)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const flicker = 0.65 + 0.35*Math.sin(t*7 + x*.01);
  ctx.globalAlpha = (near ? 0.85 : 0.32) * flicker;
  ctx.fillStyle = near ? '#ffd28b' : '#d4a85a';
  ctx.beginPath(); ctx.arc(x, y, near ? 9 : 5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = (near ? 0.22 : 0.12) * flicker;
  ctx.beginPath(); ctx.arc(x, y, near ? 28 : 14, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  if (near) {
    ctx.save();
    ctx.fillStyle = '#ffe9b3';
    ctx.font = 'bold 11px Cinzel,Georgia,serif';
    ctx.textAlign = 'center';
    ctx.fillText('✦  EXAMINE', x, y - 22);
    ctx.restore();
  }
}

function drawDoorMarker(dr){
  // Real gothic archway opening — a stone-cut hallway through the wall.
  // Pulses warm amber from the corridor beyond. The visible threshold sells
  // the door as a physical passage, not just a glow.
  const cx = (dr.x + dr.w/2)*64, cy = (dr.y + dr.h/2)*64;
  const w  = Math.max(48, dr.w*64);
  const h  = Math.max(48, dr.h*64);
  ctx.save();
  // 1) Dark recessed jamb (the inner cavity of the archway)
  ctx.fillStyle = '#0b0610';
  const x0 = cx - w/2, y0 = cy - h/2;
  ctx.beginPath();
  ctx.moveTo(x0,            y0 + h*0.32);
  ctx.quadraticCurveTo(cx,  y0 - h*0.10, x0 + w, y0 + h*0.32);
  ctx.lineTo(x0 + w,        y0 + h);
  ctx.lineTo(x0,            y0 + h);
  ctx.closePath();
  ctx.fill();
  // 2) Stone arch trim (brass-bronze frame)
  ctx.strokeStyle = '#5a3a20'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x0,            y0 + h*0.32);
  ctx.quadraticCurveTo(cx,  y0 - h*0.10, x0 + w, y0 + h*0.32);
  ctx.stroke();
  // 3) Soft warm corridor light spilling out
  ctx.globalCompositeOperation = 'lighter';
  const flicker = 0.55 + 0.35*Math.sin(t*3 + cx*.01);
  const grad = ctx.createRadialGradient(cx, y0 + h*0.55, 2, cx, y0 + h*0.55, w*0.7);
  grad.addColorStop(0, 'rgba(255,196,118,' + (0.55*flicker).toFixed(3) + ')');
  grad.addColorStop(1, 'rgba(255,196,118,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x0 - 20, y0 - 20, w + 40, h + 40);
  // 4) Door-sigil "EXIT" pip at the apex
  ctx.globalAlpha = 0.65 + 0.25*Math.sin(t*4);
  ctx.fillStyle = '#ffd28b';
  ctx.font = 'bold 11px Cinzel,Georgia,serif';
  ctx.textAlign = 'center';
  ctx.fillText('◆', cx, y0 + h*0.18);
  ctx.restore();
  // 5) Threshold prompt when the player stands near
  const dx = state.player.x - cx, dy = (state.player.y + 24) - cy;
  if (Math.abs(dx) < w/2 + 30 && Math.abs(dy) < h/2 + 30) {
    ctx.save();
    ctx.fillStyle = '#ffe9b3';
    ctx.font = 'bold 10px Cinzel,Georgia,serif';
    ctx.textAlign = 'center';
    const label = (dr.to||'').replace(/_/g,' ').toUpperCase();
    ctx.fillText('▾ ' + label + ' ▾', cx, y0 - 4);
    ctx.restore();
  }
}

function drawPlayer(){
  const p = state.player;
  let sheet, flipped = false, frameIdx;
  const facing = p.facing;
  const isMoving = p.moving;
  if (!isMoving) {
    if (facing === 'down') { sheet = 'idle_down'; frameIdx = Math.floor(t*5) % SPRITE_META.idle_down.frames; }
    else if (facing === 'up')   { sheet = 'idle_up'; frameIdx = Math.floor(t*5) % SPRITE_META.idle_up.frames; }
    else { sheet = 'idle_right'; frameIdx = Math.floor(t*5) % SPRITE_META.idle_right.frames; flipped = (facing === 'left'); }
  } else if (facing === 'down') {
    sheet = 'run_down';  frameIdx = p.animFrame % SPRITE_META.run_down.frames;
  } else if (facing === 'up') {
    sheet = 'run_up';    frameIdx = p.animFrame % SPRITE_META.run_up.frames;
  } else if (facing === 'right') {
    sheet = 'run_right'; frameIdx = p.animFrame % SPRITE_META.run_right.frames;
  } else {
    sheet = 'run_right'; flipped = true; frameIdx = p.animFrame % SPRITE_META.run_right.frames;
  }
  const meta = SPRITE_META[sheet];
  const img = sprites[sheet];
  if (!img) return;
  const fIdx = frameIdx;
  // === Consistent character size across animation sheets ===
  // Each Maytradalis sheet has a slightly different frame_h (192 / 182 /
  // 145 etc.). Using a single `scale` against frame_h would make her
  // visibly grow and shrink as she switches poses. Instead we normalise
  // by deriving the per-sheet scale from a CANONICAL target height — the
  // tallest sheet (run_down at 192) multiplied by playerScale.
  const refH = SPRITE_META.run_down.frame_h;       // 192 — canonical
  const targetH = refH * state.playerScale;        // ~106 px on-screen
  const effScale = targetH / meta.frame_h;
  const drawW = meta.frame_w * effScale;
  const drawH = meta.frame_h * effScale;
  const drawX = p.x - drawW/2;
  // Subtle idle "breathing" bob — only when not moving
  const bob = isMoving ? 0 : Math.sin(t * 2.3) * 1.6;
  const drawY = p.y - drawH + 20 + bob;

  // shadow
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(p.x, p.y + 18, drawW*0.32, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  if (flipped) {
    ctx.translate(drawX + drawW/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(drawX + drawW/2), 0);
  }
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, fIdx * meta.frame_w, 0, meta.frame_w, meta.frame_h, drawX, drawY, drawW, drawH);
  ctx.restore();
}

// Sprite-based NPCs (Death, Elystria, Cryious, Romaine, ...) — Y-sorted with player
// Each NPC has a canonical `refSheet` (defaults to its idle sheet, falling
// back to its walk sheet) whose frame_h is used as the reference height —
// so the character keeps a CONSISTENT on-screen height when its animation
// swaps between idle and walking.
function drawNpc(npc) {
  // Custom vector-drawn NPCs (hooded reapers, skeletons, etc.) — no sprite sheet.
  if (npc.customDraw) {
    const px = npc.x * 64;
    const py = npc.y * 64;
    const scale = npc.scale || 1.0;
    const drawer = NPC_DRAW[npc.customDraw];
    if (drawer) {
      // Shadow
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(px, py + 18, 18*scale, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // Custom drawer — they handle the entire sprite render at (px, py)
      drawer(ctx, px, py, t, scale, npc);
      // Speak hint
      const near = (state.nearInteract && state.nearInteract.__npc === npc);
      if (near) {
        ctx.save();
        ctx.font = 'bold 11px Cinzel,Georgia,serif';
        ctx.fillStyle = '#ffe9b3';
        ctx.textAlign = 'center';
        ctx.fillText('✦  SPEAK · ' + (npc.label || ''), px, py - 110*scale);
        ctx.restore();
      }
    }
    return;
  }
  const isMoving = !!npc._moving;
  const sheetName = (!isMoving && npc.idleSheet) ? npc.idleSheet : npc.sheet;
  const meta = SPRITE_META[sheetName];
  const img = sprites[sheetName];
  if (!meta || !img) return;
  const refSheetName = npc.refSheet || npc.idleSheet || npc.sheet;
  const refMeta = SPRITE_META[refSheetName] || meta;
  const baseScale = npc.scale || 0.55;
  const targetH = refMeta.frame_h * baseScale;
  const effScale = targetH / meta.frame_h;
  const drawW = meta.frame_w * effScale;
  const drawH = meta.frame_h * effScale;
  const px = npc.x * 64;
  const py = npc.y * 64;
  const speed = npc.animSpeed || 5;
  const frame = Math.floor(t * speed) % meta.frames;
  const bob = isMoving ? 0 : Math.sin(t * 1.8 + npc.x*0.7) * 1.4;
  const drawX = px - drawW/2;
  const drawY = py - drawH + 20 + bob;
  // shadow
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(px, py + 18, drawW*0.32, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // sprite
  ctx.save();
  if (npc.flip) {
    ctx.translate(drawX + drawW/2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(drawX + drawW/2), 0);
  }
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, frame * meta.frame_w, 0, meta.frame_w, meta.frame_h, drawX, drawY, drawW, drawH);
  ctx.restore();
  // floating "•" indicator above an NPC the player is near
  const near = (state.nearInteract && state.nearInteract.__npc === npc);
  if (near) {
    ctx.save();
    ctx.font = 'bold 11px Cinzel,Georgia,serif';
    ctx.fillStyle = '#ffe9b3';
    ctx.textAlign = 'center';
    ctx.fillText('✦  SPEAK · ' + (npc.label || ''), px, drawY - 4);
    ctx.restore();
  }
}

function drawVignette(){
  const W = state.width, H = state.height;
  const grad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.32, W/2, H/2, Math.max(W,H)*0.78);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

// ============================================================
//   ROOM + DOOR LOGIC
// ============================================================
function loadRoom(id, spawn) {
  const def = ROOM_DEFS[id];
  if (!def) return;
  state.currentRoom = id;
  state.rooms[id] = def;
  state.visited.add(id);
  const sx = (spawn && typeof spawn.x === 'number') ? spawn.x : def.spawn.x;
  const sy = (spawn && typeof spawn.y === 'number') ? spawn.y : def.spawn.y;
  state.player.x = sx * 64;
  state.player.y = sy * 64;
  state.player.vx = 0; state.player.vy = 0;
  state.player.moving = false;
  state.player.animFrame = 0; state.player.animTime = 0;
  state.camera.x = state.player.x;
  state.camera.y = state.player.y;
  document.getElementById('roomName').textContent = def.name;
  document.getElementById('roomSub').textContent  = def.sub;
  // count visit for ad system pacing
  News.onRoomEnter();
}
function enterDoor(door){
  state.fading = true;
  const fade = document.getElementById('fade');
  fade.classList.add('show');
  setTimeout(() => {
    loadRoom(door.to, door.spawn);
    setTimeout(() => { fade.classList.remove('show'); state.fading = false; }, 250);
  }, 350);
}

// ============================================================
//   INTERACTION + MODALS
// ============================================================
function interact(){
  if (!state.nearInteract || state.fading) return;
  const it = state.nearInteract;
  openModal(it.title, it.body, 'LORE FRAGMENT');
}
function openModal(title, body, eyebrow){
  document.getElementById('modalEye').textContent = eyebrow || 'LORE FRAGMENT';
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modal').classList.add('show');
}
window.closeModal = function(){
  document.getElementById('modal').classList.remove('show');
};

let hintCurrent = '';
function showHint(text){
  if (hintCurrent === text) return;
  hintCurrent = text;
  const h = document.getElementById('hint');
  h.textContent = '✦  EXAMINE · ' + text;
  h.classList.add('show');
}
function hideHint(){
  hintCurrent = '';
  document.getElementById('hint').classList.remove('show');
}

// ============================================================
//   NEWS NETWORK AD POPUP (revenue placeholder)
// ============================================================
// Miniature TV-news broadcast that slides in from the corner.
// Music pauses while it plays a short audio jingle + headline,
// then auto-resumes. Designed so the user can swap NEWS_QUEUE
// content for a real ad provider later (e.g., AdSense, custom
// affiliate links, or a fetch() to /api/ads/next).
const News = (function(){
  const popup    = document.getElementById('newsPopup');
  const channel  = document.getElementById('newsChannel');
  const portrait = document.getElementById('newsPortrait');
  const headline = document.getElementById('newsHeadline');
  const body     = document.getElementById('newsBody');
  const cta      = document.getElementById('newsCta');
  const ticker   = document.getElementById('newsTicker');
  const closeBtn = document.getElementById('newsClose');

  // Lore-flavored ads — these double as flavor and as monetization slots.
  // NOTE FOR FUTURE: swap this constant array with a fetch() to a real
  // ad provider (AdSense, custom affiliate, sponsor JSON) when ready.
  const NEWS_QUEUE = [
    {
      channel: "DLN · DIMENSIONLOCK NEWS",
      portrait: "⚜",
      headline: "READ DIMENSIONLOCK ON GLOBALCOMIX — NEW ISSUE WEDNESDAY.",
      body: "Catch up on May, Death, and the Lurker before the next strata-rift drops.",
      cta_label: "Open Globalcomix",
      cta_href: "https://globalcomix.com/c/dimensionlock",
      ticker: "BREAKING — Reality 47 sealed pending review · The Lurker spotted near Strata -71 · Vivian still missing — community tips wanted",
      tone: "promo"
    },
    {
      channel: "REAPER NETWORK · INTERNAL",
      portrait: "☥",
      headline: "RECRUITMENT OPEN: APPLY FOR REAPER AMBASSADORSHIP.",
      body: "Submit characters and factions to the canon. Top contributors get cited in the comic.",
      cta_label: "Become an Ambassador",
      cta_href: "/api/lore",
      ticker: "Lore Archive now accepts community submissions · Admin reviews within 48 hours · See your faction join the canon",
      tone: "lore"
    },
    {
      channel: "STRATA WEATHER · NIGHTLY",
      portrait: "✶",
      headline: "STRATA -47 CLEAR · STRATA +30 ANGELIC FRONT MOVING NORTH.",
      body: "Skiff pilots advised to delay non-essential runs. Romaine is on standby in the hanger.",
      cta_label: "View the Astrolabe",
      cta_href: "/api/astrolabe-game",
      ticker: "Strata weather sponsored by the Centurion Order · The Surge Engine pulses on time · Skiff Lantern grounded for service",
      tone: "weather"
    },
    {
      channel: "DLN · DIMENSIONLOCK NEWS",
      portrait: "⚜",
      headline: "JOIN THE DIMENSIONLOCK COMMUNITY.",
      body: "Discord, social, comic — every story-thread starts on globalcomix and ends here.",
      cta_label: "Read the Comic",
      cta_href: "https://globalcomix.com/c/dimensionlock",
      ticker: "Featured tonight: Death's Ship interior tour · New character drops Thursday · Maytradalis answers fan questions",
      tone: "promo"
    },
    {
      channel: "ROMAINE'S HANGER UPDATE",
      portrait: "⚙",
      headline: "SKIFF LANTERN — LEFT THRUSTER BEARING SERVICED.",
      body: "Pickup ready Tuesday. Tip jar (and lavender oil) on the workbench.",
      cta_label: "Visit the Hanger",
      cta_href: "javascript:window.location.reload();",
      ticker: "Hanger maintenance log: Ravenwake hull patched · Blackheart canopy still cracked · 1 carnation replaced today",
      tone: "internal"
    },
  ];

  let idx = 0;
  let active = false;
  let roomEnters = 0;
  let timer = null;
  let dismissTimer = null;
  let audioCtx = null;

  function show(adIndex) {
    if (active) return;
    const ad = NEWS_QUEUE[adIndex % NEWS_QUEUE.length];
    channel.textContent  = ad.channel;
    portrait.textContent = ad.portrait;
    headline.textContent = ad.headline;
    body.textContent     = ad.body;
    cta.textContent      = '▸ ' + ad.cta_label;
    cta.href             = ad.cta_href;
    ticker.textContent   = ad.ticker;
    popup.classList.add('show');
    active = true;
    pauseGameMusic();
    playJingle(ad.tone);
    // auto-dismiss after 14s
    clearTimeout(dismissTimer);
    dismissTimer = setTimeout(hide, 14000);
  }

  function hide() {
    popup.classList.remove('show');
    active = false;
    clearTimeout(dismissTimer);
    resumeGameMusic();
  }

  closeBtn.addEventListener('click', hide);

  function tick() {
    show(idx); idx++;
  }

  function start() {
    // First ad ~25s in (gives the player a moment to read the room),
    // then every 90s after.
    timer = setTimeout(() => { tick(); timer = setInterval(tick, 90000); }, 25000);
  }

  function onRoomEnter() {
    roomEnters++;
    // Every 4th room change also nudges an ad (in addition to the timer).
    if (roomEnters > 1 && roomEnters % 4 === 0 && !active) {
      tick();
    }
  }

  // Audio: small Web-Audio jingle then auto-stop. We don't try to do
  // TTS — the user reads the headline. Music pauses for the duration.
  function playJingle(tone) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const notes = (tone === 'lore')   ? [392, 466, 587]
                  : (tone === 'weather')? [523, 622, 784]
                  : (tone === 'internal')? [349, 440, 523]
                                         : [440, 554, 659];
      notes.forEach((f, i) => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.value = 0;
        o.connect(g); g.connect(ctx.destination);
        const start = now + i * 0.18;
        o.start(start);
        g.gain.linearRampToValueAtTime(0.10, start + 0.04);
        g.gain.exponentialRampToValueAtTime(0.0008, start + 0.55);
        o.stop(start + 0.6);
      });
    } catch (e) { /* swallow audio errors */ }
  }

  return { show, hide, tick, start, onRoomEnter, isActive: () => active };
})();
window.News = News; // expose for debugging / programmatic trigger

// ============================================================
//   GAME MUSIC — softly pause when ad plays, resume after.
// ============================================================
// (We reuse the existing /api/static/dimensionlock_theme.mp3 if available.)
let musicEl = null;
let musicWasPlaying = false;
function ensureMusic() {
  if (musicEl) return musicEl;
  musicEl = new Audio('/api/static/dimensionlock_theme.mp3');
  musicEl.loop = true;
  musicEl.volume = 0.32;
  return musicEl;
}
function startGameMusic() {
  const m = ensureMusic();
  m.play().then(() => { musicWasPlaying = true; }).catch(()=>{ /* autoplay blocked, will play on first key press */ });
}
function pauseGameMusic() {
  if (!musicEl) return;
  if (!musicEl.paused) { musicEl.pause(); musicWasPlaying = true; }
}
function resumeGameMusic() {
  if (!musicEl) return;
  if (musicWasPlaying) { musicEl.play().catch(()=>{}); }
}

// ============================================================
//   INPUT
// ============================================================
const keyMap = {
  'ArrowUp':'up', 'KeyW':'up',
  'ArrowDown':'down', 'KeyS':'down',
  'ArrowLeft':'left', 'KeyA':'left',
  'ArrowRight':'right', 'KeyD':'right',
};
window.addEventListener('keydown', e => {
  if (keyMap[e.code]) { state.keys[keyMap[e.code]] = true; e.preventDefault(); startGameMusic(); }
  if (e.code === 'KeyE' || e.code === 'Space' || e.code === 'Enter') {
    if (document.getElementById('modal').classList.contains('show')) closeModal();
    else interact();
    e.preventDefault();
  }
  if (e.code === 'Escape') {
    if (document.getElementById('modal').classList.contains('show')) closeModal();
  }
});
window.addEventListener('keyup', e => {
  if (keyMap[e.code]) { state.keys[keyMap[e.code]] = false; e.preventDefault(); }
});

// Dev hatch — press 1/2/3/4 to teleport between the 4 rooms (debug)
window.addEventListener('keydown', e => {
  if (e.code === 'Digit1') loadRoom('control');
  else if (e.code === 'Digit2') loadRoom('dorm_hall');
  else if (e.code === 'Digit3') loadRoom('mays_room');
  else if (e.code === 'Digit4') loadRoom('surge_hanger');
});

const dpadEl = document.getElementById('dpad');
dpadEl.querySelectorAll('.btn').forEach(b => {
  const dir = b.dataset.dir;
  const press   = ev => { ev.preventDefault(); state.keys[dir] = true;  b.classList.add('active'); startGameMusic(); };
  const release = ev => { ev.preventDefault(); state.keys[dir] = false; b.classList.remove('active'); };
  b.addEventListener('touchstart', press,  { passive:false });
  b.addEventListener('touchend',   release,{ passive:false });
  b.addEventListener('touchcancel',release,{ passive:false });
  b.addEventListener('mousedown',  press);
  b.addEventListener('mouseup',    release);
  b.addEventListener('mouseleave', release);
});
document.getElementById('actionBtn').addEventListener('click', interact);
document.getElementById('actionBtn').addEventListener('touchstart', e => { e.preventDefault(); interact(); }, { passive:false });

// ============================================================
//   RESIZE + BOOT
// ============================================================
function resize(){
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  state.width = w; state.height = h; state.dpr = dpr;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();

(async function boot(){
  try {
    await loadAllSprites();
    loadRoom('control');
    state.loaded = true;
    document.getElementById('loader').classList.add('hide');
    News.start();
    requestAnimationFrame(loop);
  } catch (err) {
    document.getElementById('loaderSub').textContent = 'Load failed: ' + err.message;
    console.error(err);
  }
})();
})();
</script>
