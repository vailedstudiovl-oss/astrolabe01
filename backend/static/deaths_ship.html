}

function drawDormDoor(ctx, x, y, side, p, occ){
  // Tall pointed gothic door inset into the wall, with the reaper's magic sigil
  // glowing above it. A DECEASED reaper's sigil goes cold and stops glowing.
  ctx.save();
  // arched recess
  ctx.fillStyle = '#0a0518';
  ctx.beginPath();
  ctx.moveTo(x-26, y+10);
  ctx.quadraticCurveTo(x, y-14, x+26, y+10);
  ctx.lineTo(x+26, y+58);
  ctx.lineTo(x-26, y+58);
  ctx.closePath();
  ctx.fill();
  // SEALED dorm — stone-welded plate over the recess
  if (occ && occ.kind === 'sealed') {
    ctx.fillStyle = '#2a1828';
    ctx.fillRect(x-22, y+14, 44, 40);
    // iron rivets
    ctx.fillStyle = '#0a0518';
    for (let r = 0; r < 8; r++) {
      const rx = x - 18 + (r%4)*12;
      const ry = y + 18 + Math.floor(r/4)*28;
      ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.fill();
    }
    // Welded-over "X"
    ctx.strokeStyle = '#5a3a52'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x-16, y+20); ctx.lineTo(x+16, y+48); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+16, y+20); ctx.lineTo(x-16, y+48); ctx.stroke();
    ctx.restore();
    return;
  }
  // wooden door
  ctx.fillStyle = '#3a1c2c';
  ctx.beginPath();
  ctx.moveTo(x-22, y+14);
  ctx.quadraticCurveTo(x, y-4, x+22, y+14);
  ctx.lineTo(x+22, y+54);
  ctx.lineTo(x-22, y+54);
  ctx.closePath();
  ctx.fill();
  // iron banding
  ctx.strokeStyle = '#1a0e2c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x-20, y+22); ctx.lineTo(x+20, y+22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-20, y+38); ctx.lineTo(x+20, y+38); ctx.stroke();
  // small viewing slit (warm amber light, very subtle — dim if deceased)
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(x-3, y+18, 6, 6);
  if (!(occ && occ.deceased)) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.45 + 0.35*Math.sin(t*2 + x*.01);
    ctx.fillStyle = p.candle;
    ctx.fillRect(x-2.5, y+19, 5, 5);
    ctx.restore();
  }
  // === REAPER MAGIC SIGIL — drawn ABOVE the door arch, glows if INTACT ===
  if (occ && occ.sigil) {
    const sigY = side === 'top' ? y + 36 : y + 36;          // upper-mid of door
    const intact = !occ.deceased;
    const immortal = !!occ.immortal;
    // Sigil colour: immortal = warm gold, normal-intact = pale violet, deceased = ash
    let sigCol = intact ? (immortal ? '#ffd86a' : '#d4a3ff') : '#5a4860';
    ctx.save();
    ctx.font = 'bold 18px Cinzel,Georgia,serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (intact) {
      // pulsing glow halo behind the sigil
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const pulse = immortal
        ? (0.78 + 0.22 * Math.sin(t * 1.4 + x*0.013))
        : (0.55 + 0.45 * Math.sin(t * 2.2 + x*0.021));
      ctx.globalAlpha = 0.35 * pulse;
      const grad = ctx.createRadialGradient(x, sigY, 1, x, sigY, 22);
      grad.addColorStop(0, sigCol);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x - 22, sigY - 22, 44, 44);
      ctx.restore();
      // Crisp sigil glyph on top
      ctx.shadowColor = sigCol;
      ctx.shadowBlur = immortal ? 14 : 8;
    } else {
      ctx.globalAlpha = 0.45;
    }
    ctx.fillStyle = sigCol;
    ctx.fillText(occ.sigil, x, sigY);
    ctx.restore();
    // Deceased: a faint trail of soft ashen smoke rising from the sigil
    if (!intact) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#6a5470';
      for (let k = 0; k < 3; k++) {
        const dy = -k*8 + ((t*22 + k*5) % 16);
        const dx = Math.sin(t*1.5 + k*2 + x*0.05) * 3;
        ctx.beginPath(); ctx.arc(x + dx, sigY - 18 - dy, 2 - k*0.4, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawMaysRoom(ctx, room){
  // Mays Room — rebuilt from the user's canon reference image:
  // ▸ Purple walls + light-blue arched alcoves on the LEFT wall
  // ▸ Black wrought-iron candle chandelier overhead
  // ▸ 4-poster canopy bed with purple drapes, centre of room
  // ▸ Burgundy chaise/bench at the foot of the bed
  // ▸ White vanity desk (mirror + candelabra + jewellery) on the RIGHT
  // ▸ Gallery wall of mirrors / frames (right wall)
  // ▸ Bat decoration on the wall, white wedding-dress mannequin (left)
  // ▸ Pink area rug with books, candle, scrolls, cushion
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;

  // ===== 1) FLOOR — warm dark hardwood plank =====
  ctx.fillStyle = '#2a1a35';
  ctx.fillRect(0,0,W,H);
  for (let y = 0; y < H; y += 26) {
    for (let x = 0; x < W; x += 92) {
      const off = ((y/26) % 2) * 46;
      const px2 = x - off;
      const v = Math.abs(Math.sin(px2*0.05 + y*0.06))*7;
      ctx.fillStyle = `rgb(${48+v}, ${28+v*.5}, ${62+v})`;
      ctx.fillRect(px2+1, y+1, 92-3, 26-3);
    }
  }

  // ===== 2) WALLS — deep purple with deeper trim =====
  ctx.fillStyle = '#5a2c80';
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  // wall sheen
  const wgrad = ctx.createLinearGradient(0, 0, 0, 64);
  wgrad.addColorStop(0, 'rgba(140,80,180,0.40)');
  wgrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = wgrad;
  ctx.fillRect(64, 0, W-128, 64);
  // dark baseboard trim
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(0, 60, W, 4);
  ctx.fillRect(0, H-64, W, 4);
  ctx.fillRect(60, 0, 4, H);
  ctx.fillRect(W-64, 0, 4, H);

  // ===== 3) LEFT-WALL ARCHED ALCOVES (3 tall light-blue arches) =====
  // These are inset niches in the purple wall, glowing soft cyan from within.
  const archX = 64;       // flush with the inside of the left wall
  const archY0 = 2*64;
  for (let i = 0; i < 3; i++) {
    const ay = archY0 + i * 2.6*64;
    drawArchAlcove(ctx, archX, ay, 0.5*64, 2.2*64, t, i);
  }

  // ===== 4) RIGHT-WALL GALLERY (mirrors + framed portraits + bat) =====
  // A symmetrical 3×3 cluster of small frames on the right wall.
  const gx = W - 64 - 22;
  for (let row = 0; row < 4; row++) {
    for (let col = 0; col < 2; col++) {
      const px2 = gx - col*36;
      const py2 = 1.4*64 + row*42;
      ctx.fillStyle = '#1a0e2c';
      ctx.fillRect(px2, py2, 24, 30);
      // alternate: mirror / portrait
      if ((row+col)%2 === 0) {
        // Mirror — pale lavender glass
        ctx.fillStyle = '#d8b4f4';
        ctx.fillRect(px2+2, py2+2, 20, 26);
        ctx.strokeStyle = '#e8b9d8'; ctx.lineWidth = 1; ctx.strokeRect(px2+0.5, py2+0.5, 23, 29);
      } else {
        // Portrait — burgundy
        ctx.fillStyle = '#5a1f3a';
        ctx.fillRect(px2+2, py2+2, 20, 26);
        ctx.fillStyle = '#0a0518';
        ctx.beginPath(); ctx.arc(px2+12, py2+13, 4, Math.PI, 0); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(px2+6, py2+28); ctx.lineTo(px2+18, py2+28);
        ctx.lineTo(px2+16, py2+17); ctx.lineTo(px2+8, py2+17);
        ctx.closePath(); ctx.fill();
      }
    }
  }
  // ▸ Wrought-iron BAT decoration on the right wall, between the gallery rows
  drawWallBat(ctx, gx - 16, 0.8*64);

  // ===== 5) THE 4-POSTER CANOPY BED (centred) =====
  // Bed footprint matches the wall-collider (1.2..5.2, 2..5).
  const bedX = 1.2*64, bedY = 2*64, bedW = 4*64, bedH = 3*64;
  // Bed posts (4 tall ones — drawn before the canopy)
  ctx.fillStyle = '#0a0518';
  ctx.fillRect(bedX - 6,            bedY - 26, 10, bedH + 30);
  ctx.fillRect(bedX + bedW - 4,     bedY - 26, 10, bedH + 30);
  // Canopy frame (top cross-rail with two sweeping drapes)
  ctx.fillStyle = '#0a0518';
  ctx.fillRect(bedX - 6, bedY - 30, bedW + 14, 8);
  // Bed frame
  ctx.fillStyle = '#1a0e2c';
  roundRect(ctx, bedX, bedY + 20, bedW, bedH - 20, 6); ctx.fill();
  // Mattress (rich purple)
  ctx.fillStyle = '#7a3aa8';
  roundRect(ctx, bedX + 12, bedY + 36, bedW - 24, bedH - 50, 5); ctx.fill();
  // Wrinkled bedding — soft purple sheet thrown across
  ctx.fillStyle = 'rgba(220,180,240,0.55)';
  ctx.beginPath();
  ctx.moveTo(bedX + 14, bedY + bedH - 26);
  ctx.bezierCurveTo(bedX + bedW*0.30, bedY + bedH - 6,
                    bedX + bedW*0.55, bedY + bedH - 30,
                    bedX + bedW*0.85, bedY + bedH - 14);
  ctx.lineTo(bedX + bedW - 14, bedY + bedH - 18);
  ctx.lineTo(bedX + bedW - 14, bedY + bedH - 8);
  ctx.lineTo(bedX + 14, bedY + bedH - 8);
  ctx.closePath();
  ctx.fill();
  // Crumpled pillows at the head
  ctx.fillStyle = '#d8b4f4';
  ctx.beginPath(); ctx.ellipse(bedX + 0.6*64, bedY + 0.85*64, 24, 16, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bedX + 1.3*64, bedY + 0.80*64, 22, 14, 0.10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#7a3aa8';
  ctx.beginPath(); ctx.ellipse(bedX + 1.0*64, bedY + 0.75*64, 18, 11, 0.0, 0, Math.PI*2); ctx.fill();
  // Twin curtain drapes hanging from canopy
  ctx.fillStyle = 'rgba(118,52,178,0.78)';
  ctx.beginPath();
  ctx.moveTo(bedX - 8, bedY - 22);
  ctx.lineTo(bedX + 36, bedY - 22);
  ctx.lineTo(bedX + 22, bedY + 1.6*64);
  ctx.lineTo(bedX,       bedY + 2.4*64);
  ctx.lineTo(bedX - 8,   bedY + 2.4*64);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bedX + bedW + 4, bedY - 22);
  ctx.lineTo(bedX + bedW - 36, bedY - 22);
  ctx.lineTo(bedX + bedW - 22, bedY + 1.6*64);
  ctx.lineTo(bedX + bedW,       bedY + 2.4*64);
  ctx.lineTo(bedX + bedW + 4,   bedY + 2.4*64);
  ctx.closePath();
  ctx.fill();
  // Drape vertical pleat lines
  ctx.strokeStyle = 'rgba(60,20,90,0.7)'; ctx.lineWidth = 1.4;
  for (let k = 0; k < 4; k++) {
    ctx.beginPath();
    ctx.moveTo(bedX - 8 + k*10, bedY - 18);
    ctx.lineTo(bedX - 4 + k*10, bedY + 1.4*64);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bedX + bedW + 4 - k*10, bedY - 18);
    ctx.lineTo(bedX + bedW - k*10, bedY + 1.4*64);
    ctx.stroke();
  }
  // FlyButt's plush butterfly at the head (canon detail)
  drawPlushButterfly(ctx, bedX + 0.4*64, bedY + 0.55*64, 0.8);

  // ===== 6) BURGUNDY CHAISE / BENCH at the foot of the bed =====
  drawChaiseBench(ctx, bedX + 0.5*64, bedY + bedH + 10, bedW - 1.0*64, 0.8*64);

  // ===== 7) THE VANITY DESK on the right wall =====
  const vX = 13*64, vY = 1.5*64, vW = 3.5*64, vH = 2*64;
  // Desk body — bone white with gold trim
  ctx.fillStyle = '#e8d4b8';
  roundRect(ctx, vX, vY, vW, vH, 6); ctx.fill();
  ctx.fillStyle = '#d4b896';
  ctx.fillRect(vX + 6, vY + 6, vW - 12, vH - 12);
  // Drawer fronts
  ctx.fillStyle = '#c9a47e';
  ctx.fillRect(vX + 12, vY + vH - 36, vW - 24, 18);
  ctx.fillStyle = '#7a5226';
  ctx.beginPath(); ctx.arc(vX + vW*0.30, vY + vH - 27, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(vX + vW*0.70, vY + vH - 27, 3, 0, Math.PI*2); ctx.fill();
  // Tall ornate mirror with arch
  ctx.fillStyle = '#1a0e2c';
  ctx.beginPath();
  ctx.moveTo(vX + 0.4*64,  vY - 70);
  ctx.quadraticCurveTo(vX + vW/2, vY - 110, vX + vW - 0.4*64, vY - 70);
  ctx.lineTo(vX + vW - 0.4*64, vY);
  ctx.lineTo(vX + 0.4*64, vY);
  ctx.closePath(); ctx.fill();
  // Mirror glass — pale lavender reflection
  ctx.fillStyle = 'rgba(220,200,240,0.55)';
  ctx.beginPath();
  ctx.moveTo(vX + 0.5*64,  vY - 64);
  ctx.quadraticCurveTo(vX + vW/2, vY - 100, vX + vW - 0.5*64, vY - 64);
  ctx.lineTo(vX + vW - 0.5*64, vY - 6);
  ctx.lineTo(vX + 0.5*64, vY - 6);
  ctx.closePath(); ctx.fill();
  // Gold frame trim
  ctx.strokeStyle = '#d8a548'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(vX + 0.4*64,  vY - 70);
  ctx.quadraticCurveTo(vX + vW/2, vY - 110, vX + vW - 0.4*64, vY - 70);
  ctx.lineTo(vX + vW - 0.4*64, vY);
  ctx.lineTo(vX + 0.4*64, vY);
  ctx.closePath(); ctx.stroke();
  // Candelabra (3 candles) on the vanity
  drawVanityCandelabra(ctx, vX + 0.55*64, vY + 0.3*64, t, 3);
  // Small perfume bottles + jewellery box
  ctx.fillStyle = '#8a5cb8'; ctx.fillRect(vX + vW - 60, vY + 18, 9, 22);    // tall perfume
  ctx.fillStyle = '#d4b896'; ctx.fillRect(vX + vW - 60, vY + 16, 9, 4);
  ctx.fillStyle = '#a83a14'; ctx.fillRect(vX + vW - 44, vY + 22, 11, 18);   // red bottle
  ctx.fillStyle = '#d8a548'; ctx.fillRect(vX + vW - 44, vY + 20, 11, 4);
  ctx.fillStyle = '#7a5226';                                                // jewellery box
  ctx.fillRect(vX + vW - 28, vY + 22, 18, 16);
  ctx.fillStyle = '#d8a548';
  ctx.fillRect(vX + vW - 27, vY + 24, 16, 2);

  // ===== 8) WHITE WEDDING-DRESS MANNEQUIN (left foreground) =====
  drawDressMannequin(ctx, 2.5*64, 9.2*64);

  // ===== 9) PINK AREA RUG with FRINGE — bottom centre =====
  const rugX = 5.4*64, rugY = 8.8*64, rugW = 7.2*64, rugH = 3.4*64;
  drawCarpet(ctx, rugX, rugY, rugW, rugH, '#c45c80');
  // Rug fringe
  ctx.fillStyle = '#e8b9d8';
  for (let i = 0; i < rugW; i += 6) {
    ctx.fillRect(rugX + i, rugY - 4, 4, 6);
    ctx.fillRect(rugX + i, rugY + rugH - 2, 4, 6);
  }
  // Pile of books on the rug (open + closed)
  drawBookPile(ctx, rugX + 0.6*64, rugY + 1.6*64);
  drawScroll(ctx,   rugX + 2.6*64, rugY + 2.0*64);
  drawScroll(ctx,   rugX + 4.4*64, rugY + 2.6*64);
  // Plush round cushion
  ctx.fillStyle = '#7a3aa8';
  ctx.beginPath(); ctx.ellipse(rugX + 5.6*64, rugY + 0.8*64, 26, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#9854c8';
  ctx.beginPath(); ctx.ellipse(rugX + 5.6*64, rugY + 0.75*64, 22, 14, 0, 0, Math.PI*2); ctx.fill();
  // Black iron candleholder with single candle on the rug
  drawIronCandle(ctx, rugX + 1.3*64, rugY + 2.4*64, t, 11);

  // ===== 10) BLACK IRON CHANDELIER overhead (centred above the rug) =====
  drawBigIronChandelier(ctx, 9*64, 3.6*64, 1.0, t);

  // Two simple sconces flanking the top
  drawSconce(ctx, 4*64, 64, p.candle, t, 31);
  drawSconce(ctx, 13*64, 64, p.candle, t, 17);

  // Faint floor stencil
  ctx.save();
  ctx.font = 'bold 11px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(220,170,220,0.15)';
  ctx.textAlign = 'center';
  ctx.fillText("· MAY'S ROOM ·", W/2, H - 76);
  ctx.restore();
}

// Tall pointed-arch alcove in the left wall — light-blue interior, candle inside.
function drawArchAlcove(ctx, x, y, w, h, t, seed) {
  ctx.save();
  // Outer frame (deep purple to match wall)
  ctx.fillStyle = '#1a0e2c';
  ctx.beginPath();
  ctx.moveTo(x - 4,     y + h*0.18);
  ctx.quadraticCurveTo(x + w/2, y - 12, x + w + 4, y + h*0.18);
  ctx.lineTo(x + w + 4, y + h);
  ctx.lineTo(x - 4,     y + h);
  ctx.closePath();
  ctx.fill();
  // Interior — pale-blue glow (light-blue paint)
  ctx.fillStyle = '#a8c4e8';
  ctx.beginPath();
  ctx.moveTo(x,         y + h*0.22);
  ctx.quadraticCurveTo(x + w/2, y - 4, x + w, y + h*0.22);
  ctx.lineTo(x + w, y + h - 4);
  ctx.lineTo(x,     y + h - 4);
  ctx.closePath();
  ctx.fill();
  // Sheen overlay
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.20 + 0.10*Math.sin(t*1.5 + seed);
  ctx.fillStyle = '#d8ecff';
  ctx.fillRect(x + 2, y + 4, w - 4, h - 8);
  ctx.restore();
  // A single candle inside the alcove
  drawCandle(ctx, x + w/2, y + h - 18, t, seed * 3);
  ctx.restore();
}

// Wrought-iron bat decoration mounted on the wall.
function drawWallBat(ctx, x, y) {
  ctx.save();
  ctx.fillStyle = '#0a0518';
  // body
  ctx.beginPath(); ctx.ellipse(x, y, 5, 8, 0, 0, Math.PI*2); ctx.fill();
  // wings
  ctx.beginPath();
  ctx.moveTo(x, y - 2);
  ctx.quadraticCurveTo(x - 18, y - 14, x - 22, y - 4);
  ctx.quadraticCurveTo(x - 16, y, x - 10, y + 4);
  ctx.lineTo(x, y + 2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y - 2);
  ctx.quadraticCurveTo(x + 18, y - 14, x + 22, y - 4);
  ctx.quadraticCurveTo(x + 16, y, x + 10, y + 4);
  ctx.lineTo(x, y + 2);
  ctx.closePath(); ctx.fill();
  // ears
  ctx.beginPath();
  ctx.moveTo(x - 3, y - 6); ctx.lineTo(x - 5, y - 12); ctx.lineTo(x, y - 7);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 3, y - 6); ctx.lineTo(x + 5, y - 12); ctx.lineTo(x, y - 7);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// Small plush butterfly — purple wings, white spots
function drawPlushButterfly(ctx, x, y, scale) {
  scale = scale || 1.0;
  ctx.save();
  ctx.translate(x, y); ctx.scale(scale, scale);
  // body
  ctx.fillStyle = '#5a3070';
  ctx.beginPath(); ctx.ellipse(0, 0, 3, 8, 0, 0, Math.PI*2); ctx.fill();
  // wings
  ctx.fillStyle = '#9854c8';
  ctx.beginPath(); ctx.ellipse(-10, -3, 9, 7, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(+10, -3, 9, 7, +0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-8,  +5, 6, 5, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(+8,  +5, 6, 5, +0.4, 0, Math.PI*2); ctx.fill();
  // wing spots
  ctx.fillStyle = '#e8b9d8';
  ctx.beginPath(); ctx.arc(-9, -3, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(+9, -3, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// Tufted burgundy chaise / bench at the foot of the bed.
function drawChaiseBench(ctx, x, y, w, h) {
  ctx.save();
  // Underframe legs
  ctx.fillStyle = '#1a0a14';
  ctx.fillRect(x + 6, y + h - 6, 6, 12);
  ctx.fillRect(x + w - 12, y + h - 6, 6, 12);
  // Burgundy cushion
  ctx.fillStyle = '#7a1f1a';
  roundRect(ctx, x, y, w, h, 8); ctx.fill();
  // Lighter highlight strip
  ctx.fillStyle = '#a83a14';
  roundRect(ctx, x + 4, y + 4, w - 8, h*0.55, 6); ctx.fill();
  // Tufted button dots
  ctx.fillStyle = '#3a0a14';
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 4; c++) {
      const px2 = x + 16 + c * (w - 32) / 3;
      const py2 = y + 12 + r * (h - 22) / 2;
      ctx.beginPath(); ctx.arc(px2, py2, 1.6, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

// Three-candle gold candelabra on the vanity.
function drawVanityCandelabra(ctx, x, y, t, seed) {
  ctx.save();
  // base
  ctx.fillStyle = '#7a5226';
  ctx.fillRect(x - 12, y + 24, 24, 4);
  // stem
  ctx.fillStyle = '#d8a548';
  ctx.fillRect(x - 1, y + 4, 2, 22);
  // arms (3 candles)
  for (let i = -1; i <= 1; i++) {
    const cx = x + i*10;
    const cy = y - 6;
    // candle stick (gold cup)
    ctx.fillStyle = '#d8a548';
    ctx.fillRect(cx - 2, cy + 4, 4, 5);
    // wax candle (white)
    ctx.fillStyle = '#f4e9c8';
    ctx.fillRect(cx - 1.6, cy - 6, 3.2, 10);
    // flame
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const flick = 0.85 + 0.18*Math.sin(t*8 + seed + i);
    ctx.globalAlpha = 0.85 * flick;
    ctx.fillStyle = '#ffd66e';
    ctx.beginPath(); ctx.ellipse(cx, cy - 9, 1.4, 3.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

// White wedding-dress mannequin on a stand.
function drawDressMannequin(ctx, x, y) {
  ctx.save();
  // Stand (dark wood pole)
  ctx.fillStyle = '#1a0a14';
  ctx.fillRect(x - 2, y, 4, 50);
  ctx.fillStyle = '#3a1c2c';
  ctx.beginPath(); ctx.ellipse(x, y + 52, 14, 4, 0, 0, Math.PI*2); ctx.fill();
  // Bust (skin-tone neck)
  ctx.fillStyle = '#e8d4b8';
  ctx.fillRect(x - 4, y - 12, 8, 14);
  // Bodice (white satin with lace details)
  ctx.fillStyle = '#f4e9d8';
  ctx.beginPath();
  ctx.moveTo(x - 18, y);
  ctx.lineTo(x + 18, y);
  ctx.lineTo(x + 16, y + 24);
  ctx.lineTo(x - 16, y + 24);
  ctx.closePath(); ctx.fill();
  // Lace cuff lines
  ctx.strokeStyle = '#d4b896'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x - 14, y + 6);  ctx.lineTo(x + 14, y + 6);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - 13, y + 12); ctx.lineTo(x + 13, y + 12); ctx.stroke();
  // Layered skirt (wide, draping down)
  ctx.fillStyle = '#f4e9d8';
  ctx.beginPath();
  ctx.moveTo(x - 16, y + 24);
  ctx.lineTo(x + 16, y + 24);
  ctx.lineTo(x + 36, y + 84);
  ctx.lineTo(x - 36, y + 84);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e8d4b8';
  ctx.beginPath();
  ctx.moveTo(x - 30, y + 80);
  ctx.lineTo(x + 30, y + 80);
  ctx.lineTo(x + 42, y + 96);
  ctx.lineTo(x - 42, y + 96);
  ctx.closePath(); ctx.fill();
  // Skirt pleat lines
  ctx.strokeStyle = '#c9a47e'; ctx.lineWidth = 0.8;
  for (let k = -3; k <= 3; k++) {
    ctx.beginPath();
    ctx.moveTo(x + k*5, y + 24);
    ctx.lineTo(x + k*10, y + 96);
    ctx.stroke();
  }
  ctx.restore();
}

// Pile of 3 open + closed books on the rug.
function drawBookPile(ctx, x, y) {
  ctx.save();
  // Green book (large, base)
  ctx.fillStyle = '#3a6b3a';
  ctx.fillRect(x, y, 56, 14);
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(x + 2, y + 2, 52, 10);
  ctx.fillStyle = '#d8a548';
  ctx.fillRect(x + 4, y + 5, 22, 1);
  // Yellow book (offset on top)
  ctx.fillStyle = '#9a8a3a';
  ctx.fillRect(x + 6, y - 14, 44, 14);
  ctx.fillStyle = '#7a6a1a';
  ctx.fillRect(x + 8, y - 12, 40, 10);
  // Purple open book (small, beside)
  ctx.fillStyle = '#2a1a4a';
  ctx.fillRect(x - 18, y + 4, 22, 12);
  ctx.fillStyle = '#f4e9d8';
  ctx.fillRect(x - 16, y + 6, 18, 8);
  ctx.strokeStyle = '#7a6a4a'; ctx.lineWidth = 0.6;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(x - 15, y + 7 + i*1.5); ctx.lineTo(x + 1, y + 7 + i*1.5); ctx.stroke();
  }
  ctx.restore();
}

// Single rolled parchment scroll with red wax seal.
function drawScroll(ctx, x, y) {
  ctx.save();
  ctx.fillStyle = '#e8d4b8';
  ctx.beginPath(); ctx.ellipse(x, y, 22, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d4b896';
  ctx.beginPath(); ctx.ellipse(x - 18, y, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 18, y, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  // Red wax seal centred
  ctx.fillStyle = '#a8101a';
  ctx.beginPath(); ctx.arc(x, y - 1, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// Black iron candleholder with a single live candle.
function drawIronCandle(ctx, x, y, t, seed) {
  ctx.save();
  // Base
  ctx.fillStyle = '#0a0518';
  ctx.beginPath(); ctx.ellipse(x, y + 14, 12, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(x - 1, y - 4, 2, 18);
  // Cup
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(x - 6, y - 6, 12, 4);
  // Candle
  ctx.fillStyle = '#f4e9c8';
  ctx.fillRect(x - 2, y - 18, 4, 14);
  // Flame
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const flick = 0.85 + 0.20*Math.sin(t*8 + seed);
  ctx.globalAlpha = 0.85 * flick;
  ctx.fillStyle = '#ffd66e';
  ctx.beginPath(); ctx.ellipse(x, y - 22, 2.2, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.55 * flick;
  ctx.fillStyle = '#ff8050';
  ctx.beginPath(); ctx.ellipse(x, y - 24, 3, 6.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
}

// Larger wrought-iron candle chandelier (the one in Mays Room ref art).
function drawBigIronChandelier(ctx, x, y, scale, t) {
  scale = scale || 1.0;
  ctx.save();
  // Chain up to ceiling
  ctx.strokeStyle = '#0a0518'; ctx.lineWidth = 2*scale;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, y - 26*scale); ctx.stroke();
  // Outer iron ring
  ctx.strokeStyle = '#0a0518'; ctx.lineWidth = 3*scale;
  ctx.beginPath(); ctx.ellipse(x, y, 48*scale, 12*scale, 0, 0, Math.PI*2); ctx.stroke();
  // Inner iron ring (smaller)
  ctx.beginPath(); ctx.ellipse(x, y - 6*scale, 30*scale, 7*scale, 0, 0, Math.PI*2); ctx.stroke();
  // Vertical iron struts crossing the rings
  for (let k = 0; k < 6; k++) {
    const ang = (k / 6) * Math.PI * 2;
    const x1 = x + Math.cos(ang) * 48 * scale;
    const x2 = x + Math.cos(ang) * 30 * scale;
    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y - 6*scale); ctx.stroke();
  }
  // 6 candles standing on the outer ring
  for (let k = 0; k < 6; k++) {
    const ang = (k / 6) * Math.PI * 2;
    const cx = x + Math.cos(ang) * 48 * scale;
    const cy = y + Math.sin(ang) * 12 * scale;
    // Candle (cream)
    ctx.fillStyle = '#f4e9c8';
    ctx.fillRect(cx - 2, cy - 14*scale, 4*scale, 14*scale);
    // Wax drip down the chandelier ring
    ctx.fillStyle = '#e8d4a8';
    ctx.fillRect(cx - 1, cy, 2*scale, 6*scale);
    // Flame
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const flick = 0.85 + 0.18 * Math.sin(t*7 + k);
    ctx.globalAlpha = 0.80 * flick;
    ctx.fillStyle = '#ffd66e';
    ctx.beginPath(); ctx.ellipse(cx, cy - 17*scale, 1.6*scale, 3.5*scale, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.55 * flick;
    ctx.fillStyle = '#ff8050';
    ctx.beginPath(); ctx.ellipse(cx, cy - 19*scale, 2.4*scale, 4.5*scale, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawSurgeHanger(ctx, room){
  // CINEMATIC PROCEDURAL HANGAR (v2 — full rebuild)
  //
  // The hangar is rendered procedurally as a bronze-walled interior with a
  // central runway running south→north. The hangar_backdrop.png reference
  // plate is NOT used as a flat full-screen background (which was making
  // overlay sprites look "floating"). Instead it is clipped to the
  // TRAPEZOIDAL BAY DOOR opening at the north wall so that ONLY the
  // visible slice of the Endless reads through the doorway. Everything
  // else — runway, side bulkheads, ceiling beams, cargo, ships — is drawn
  // procedurally so the props sit properly on the floor.
  //
  // Coordinate system: 1 tile = 64px. Room is 24w × 18h (1536 × 1152 px).
  // North/top = bay door (y = 0). South/bottom = back wall (y = 17).
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;

  // ============================================================
  // 1. SKY THROUGH THE BAY DOOR  — clipped trapezoid using the
  //    user-supplied hangar_backdrop.png. This is the ONLY place
  //    that reference plate is used.
  // ============================================================
  // Trapezoid coordinates (in pixels). The bay door is centred at the top.
  const bayInnerTop_x1 = 8.5 * 64;   // 544
  const bayInnerTop_x2 = 15.5 * 64;  // 992
  const bayInnerBot_y  = 4.5 * 64;   // 288  (threshold-strip line)
  const bayOuterBot_x1 = 6.0 * 64;   // 384
  const bayOuterBot_x2 = 18.0 * 64;  // 1152
  const bayTop_y       = 0.5 * 64;   // 32   (just below the wall trim)

  ctx.save();
  // Clip to the trapezoid so the Endless image only fills the doorway.
  ctx.beginPath();
  ctx.moveTo(bayInnerTop_x1, bayTop_y);
  ctx.lineTo(bayInnerTop_x2, bayTop_y);
  ctx.lineTo(bayOuterBot_x2, bayInnerBot_y);
  ctx.lineTo(bayOuterBot_x1, bayInnerBot_y);
  ctx.closePath();
  ctx.clip();

  if (window.HANGAR_BACKDROP_IMG && window.HANGAR_BACKDROP_IMG.complete) {
    // Use the LOWER-MIDDLE portion of the reference plate (the lavender
    // Endless sky framed between the pyramid spires) and scale-fit it
    // across the trapezoid. Slice is roughly y=30%..80% of the source.
    const img = window.HANGAR_BACKDROP_IMG;
    const trapW = bayOuterBot_x2 - bayOuterBot_x1;
    const trapH = bayInnerBot_y - bayTop_y;
    const srcY0 = img.height * 0.50;
    const srcY1 = img.height * 0.98;
    const srcSliceH = srcY1 - srcY0;
    const srcSliceW = img.width * 0.92;
    const sx = (img.width - srcSliceW) / 2;
    const sy = srcY0;
    // Tiny parallax drift (very slow)
    const drift = Math.sin(t * 0.18) * 18;
    ctx.drawImage(img,
      sx, sy, srcSliceW, srcSliceH,
      bayOuterBot_x1 - 6, bayTop_y - 8 + drift, trapW + 12, trapH + 16);
  } else {
    // Fallback: procedural lavender sky if the image hasn't loaded yet.
    const sky = ctx.createLinearGradient(0, bayTop_y, 0, bayInnerBot_y);
    sky.addColorStop(0,    '#cfb0e8');
    sky.addColorStop(0.55, '#9c84c4');
    sky.addColorStop(1,    '#5d4a82');
    ctx.fillStyle = sky;
    ctx.fillRect(bayOuterBot_x1 - 8, bayTop_y - 8, bayOuterBot_x2 - bayOuterBot_x1 + 16, bayInnerBot_y - bayTop_y + 16);
    // distant pyramid spire silhouette
    ctx.fillStyle = 'rgba(36, 24, 56, 0.7)';
    ctx.beginPath();
    ctx.moveTo((bayOuterBot_x1 + bayOuterBot_x2)/2 - 36, bayInnerBot_y - 4);
    ctx.lineTo((bayOuterBot_x1 + bayOuterBot_x2)/2,      bayInnerBot_y - 70);
    ctx.lineTo((bayOuterBot_x1 + bayOuterBot_x2)/2 + 36, bayInnerBot_y - 4);
    ctx.closePath(); ctx.fill();
  }

  // Subtle vignette inside the trapezoid (darker at edges so the sky
  // reads as cinematic and recedes).
  const tg = ctx.createRadialGradient(
    (bayOuterBot_x1 + bayOuterBot_x2)/2, bayInnerBot_y - 60, 30,
    (bayOuterBot_x1 + bayOuterBot_x2)/2, bayInnerBot_y - 30, 360);
  tg.addColorStop(0, 'rgba(0,0,0,0)');
  tg.addColorStop(1, 'rgba(8,4,12,0.6)');
  ctx.fillStyle = tg;
  ctx.fillRect(bayOuterBot_x1 - 8, bayTop_y - 8,
               bayOuterBot_x2 - bayOuterBot_x1 + 16,
               bayInnerBot_y - bayTop_y + 16);
  ctx.restore();

  // ============================================================
  // 2. HANGAR INTERIOR — north wall around the bay door (bronze
  //    bulkhead with rivets) + the trapezoidal door frame.
  // ============================================================
  ctx.save();
  // Solid bronze bulkhead spans the north wall, with a trapezoidal CUTOUT
  // that exposes the sky we just painted. We paint the bulkhead as two
  // panels — left of the doorway and right of the doorway — plus a
  // narrow header band above the door.
  const wallTop = 0;
  const wallBaseY = bayInnerBot_y; // wall extends from y=0 to threshold

  // Left bulkhead panel
  ctx.fillStyle = '#1a0e08';
  ctx.beginPath();
  ctx.moveTo(0, wallTop);
  ctx.lineTo(bayInnerTop_x1, wallTop);
  ctx.lineTo(bayOuterBot_x1, wallBaseY);
  ctx.lineTo(0, wallBaseY);
  ctx.closePath();
  ctx.fill();
  // Right bulkhead panel
  ctx.beginPath();
  ctx.moveTo(bayInnerTop_x2, wallTop);
  ctx.lineTo(W, wallTop);
  ctx.lineTo(W, wallBaseY);
  ctx.lineTo(bayOuterBot_x2, wallBaseY);
  ctx.closePath();
  ctx.fill();
  // Header band above the bay door (tight, only between the inner top corners)
  ctx.fillStyle = '#150a06';
  ctx.fillRect(bayInnerTop_x1, 0, bayInnerTop_x2 - bayInnerTop_x1, 28);

  // Panel seams + rivets on the bulkheads to break up the flat black.
  ctx.strokeStyle = 'rgba(160,110,60,0.18)'; ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    // Left side vertical seams
    const fx = (i / 8) * bayInnerTop_x1;
    ctx.beginPath(); ctx.moveTo(fx, 0); ctx.lineTo(fx * 1.05, wallBaseY); ctx.stroke();
    // Right side vertical seams
    const rx = bayInnerTop_x2 + (i / 8) * (W - bayInnerTop_x2);
    ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx * 0.99, wallBaseY); ctx.stroke();
  }
  // Rivet dots
  ctx.fillStyle = 'rgba(180,130,70,0.35)';
  for (let i = 0; i < 12; i++) {
    const lx = 12 + (i / 12) * (bayInnerTop_x1 - 12);
    const rx = bayInnerTop_x2 + 8 + (i / 12) * (W - bayInnerTop_x2 - 8);
    ctx.fillRect(lx, 14, 2, 2);
    ctx.fillRect(rx, 14, 2, 2);
    ctx.fillRect(lx, 70, 2, 2);
    ctx.fillRect(rx, 70, 2, 2);
  }

  // Heavy bronze trapezoidal door frame
  ctx.strokeStyle = '#6a4a22';
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(bayInnerTop_x1, bayTop_y);
  ctx.lineTo(bayInnerTop_x2, bayTop_y);
  ctx.lineTo(bayOuterBot_x2, bayInnerBot_y);
  ctx.lineTo(bayOuterBot_x1, bayInnerBot_y);
  ctx.closePath();
  ctx.stroke();
  ctx.strokeStyle = '#3a2510';
  ctx.lineWidth = 2.4;
  ctx.stroke();
  // Inner highlight on the door frame (top edge catches the Endless light)
  ctx.strokeStyle = 'rgba(220,200,180,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(bayInnerTop_x1 + 2, bayTop_y + 2);
  ctx.lineTo(bayInnerTop_x2 - 2, bayTop_y + 2);
  ctx.stroke();

  // Two warning lamps mounted on either side of the bay-door header,
  // pulsing in the cyan threshold strip's rhythm.
  const lampPulse = 0.65 + 0.35 * Math.sin(t * 2.1);
  ctx.fillStyle = `rgba(255,120,40,${0.55 * lampPulse})`;
  ctx.beginPath(); ctx.arc(bayInnerTop_x1 - 18, 22, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bayInnerTop_x2 + 18, 22, 5, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(255,180,60,${0.35 * lampPulse})`;
  ctx.beginPath(); ctx.arc(bayInnerTop_x1 - 18, 22, 12, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bayInnerTop_x2 + 18, 22, 12, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ============================================================
  // 3. SIDE BULKHEADS (east + west walls) — bronze panels with
  //    rivet rows, conduit pipes, and warning hazard stripes.
  // ============================================================
  function drawSideBulkhead(side) {
    // side: 'left' or 'right'
    const isLeft = side === 'left';
    const wx = isLeft ? 0 : (W - 64);
    const ww = 64;
    ctx.save();
    // Base wall colour
    ctx.fillStyle = '#1d130a'; ctx.fillRect(wx, bayInnerBot_y, ww, H - bayInnerBot_y);
    // Bronze gradient highlight (catches light from the runway)
    const g = ctx.createLinearGradient(wx, 0, wx + ww, 0);
    if (isLeft) {
      g.addColorStop(0, 'rgba(120,80,40,0.0)');
      g.addColorStop(1, 'rgba(120,80,40,0.45)');
    } else {
      g.addColorStop(0, 'rgba(120,80,40,0.45)');
      g.addColorStop(1, 'rgba(120,80,40,0.0)');
    }
    ctx.fillStyle = g; ctx.fillRect(wx, bayInnerBot_y, ww, H - bayInnerBot_y);
    // Hazard stripe band running floor-to-mid
    ctx.fillStyle = '#2a1c0a';
    ctx.fillRect(wx + (isLeft ? 50 : 6), bayInnerBot_y + 40, 8, H - bayInnerBot_y - 80);
    // Diagonal yellow hazard chevrons
    ctx.save();
    ctx.beginPath();
    ctx.rect(wx + (isLeft ? 50 : 6), bayInnerBot_y + 40, 8, H - bayInnerBot_y - 80);
    ctx.clip();
    for (let yy = bayInnerBot_y - 20; yy < H; yy += 14) {
      ctx.fillStyle = '#d4a85a';
      ctx.beginPath();
      ctx.moveTo(wx + (isLeft ? 50 : 6), yy);
      ctx.lineTo(wx + (isLeft ? 58 : 14), yy + 6);
      ctx.lineTo(wx + (isLeft ? 58 : 14), yy + 12);
      ctx.lineTo(wx + (isLeft ? 50 : 6), yy + 6);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    // Conduit pipe running along the inner edge
    ctx.fillStyle = '#3a2510';
    ctx.fillRect(wx + (isLeft ? 56 : 0), bayInnerBot_y + 8, 8, H - bayInnerBot_y - 16);
    ctx.fillStyle = 'rgba(220,180,120,0.25)';
    ctx.fillRect(wx + (isLeft ? 58 : 2), bayInnerBot_y + 8, 2, H - bayInnerBot_y - 16);
    // Rivets along the conduit
    ctx.fillStyle = 'rgba(180,130,70,0.55)';
    for (let yy = bayInnerBot_y + 24; yy < H - 16; yy += 28) {
      ctx.fillRect(wx + (isLeft ? 60 : 2), yy, 2, 2);
    }
    ctx.restore();
  }
  drawSideBulkhead('left');
  drawSideBulkhead('right');

  // ============================================================
  // 4. HANGAR FLOOR — bronze plating with vanishing-point seams
  //    that converge toward the bay door (sells the depth).
  // ============================================================
  ctx.save();
  const floorTopY = bayInnerBot_y;        // 288
  const floorBotY = H;
  // Base bronze plating
  ctx.fillStyle = p.floor; ctx.fillRect(64, floorTopY, W - 128, floorBotY - floorTopY);
  // Floor gradient (darker at the back/north, brighter near the camera)
  const fg = ctx.createLinearGradient(0, floorTopY, 0, floorBotY);
  fg.addColorStop(0, 'rgba(28,18,10,0.55)');
  fg.addColorStop(1, 'rgba(58,40,24,0.10)');
  ctx.fillStyle = fg; ctx.fillRect(64, floorTopY, W - 128, floorBotY - floorTopY);

  // Vanishing-point perspective lines on the floor.
  // All lines radiate from the centre of the bay door threshold and fan
  // outward to the foreground floor edges, creating the runway perspective.
  const vpX = (bayInnerTop_x1 + bayInnerTop_x2) / 2;
  const vpY = bayInnerBot_y - 20;
  // Lateral (left-right) panel seams — perspective fan
  ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 1;
  for (let i = -7; i <= 7; i++) {
    const fx = W/2 + i * 90;
    ctx.beginPath();
    ctx.moveTo(vpX + i * 24, vpY);
    ctx.lineTo(fx, floorBotY);
    ctx.stroke();
  }
  // Horizontal cross-seams (closer together at the back, wider near camera)
  ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 1;
  const crossSteps = 8;
  for (let i = 1; i <= crossSteps; i++) {
    const u = i / crossSteps;
    // Convex spacing — easeOutQuad so seams get more spaced near the camera
    const k = Math.pow(u, 0.55);
    const yy = floorTopY + k * (floorBotY - floorTopY);
    const inset = 64 + (1 - k) * (W/2 - 64) * 0.55;
    ctx.beginPath();
    ctx.moveTo(inset, yy);
    ctx.lineTo(W - inset, yy);
    ctx.stroke();
  }

  // Runway centre stripe — two wide cyan guide lights running from the
  // back wall north toward the bay door. Animated chase chunks.
  const runwayCenterX = W / 2;
  const stripWidth = 4;
  const stripeLeftX  = runwayCenterX - 96;
  const stripeRightX = runwayCenterX + 96 - stripWidth;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const chunk = 28, gap = 14, period = chunk + gap;
  const offset = (t * 64) % period;
  for (let yy = floorTopY + 16; yy < floorBotY - 32; yy += period) {
    const py = yy + offset;
    const distFromTop = (py - floorTopY) / (floorBotY - floorTopY);
    const alpha = 0.55 + 0.35 * Math.sin(t * 1.8 + yy * 0.01);
    // Strips taper near the vanishing point — thinner at the back
    const taper = 0.45 + 0.55 * distFromTop;
    ctx.fillStyle = `rgba(60,224,224,${alpha * 0.85})`;
    ctx.fillRect(stripeLeftX,  py, stripWidth * taper, chunk);
    ctx.fillRect(stripeRightX, py, stripWidth * taper, chunk);
    // Outer halo
    ctx.fillStyle = `rgba(60,224,224,${alpha * 0.25})`;
    ctx.fillRect(stripeLeftX  - 4, py, (stripWidth + 8) * taper, chunk);
    ctx.fillRect(stripeRightX - 4, py, (stripWidth + 8) * taper, chunk);
  }
  ctx.restore();

  // Cyan threshold strip across the bay-door floor line (pulsing).
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const thresholdY = bayInnerBot_y - 4;
  ctx.fillStyle = `rgba(60,240,240,${0.7 + 0.22 * Math.sin(t * 1.6)})`;
  ctx.fillRect(bayOuterBot_x1 + 8, thresholdY, bayOuterBot_x2 - bayOuterBot_x1 - 16, 4);
  ctx.fillStyle = `rgba(120,255,255,${0.4 + 0.22 * Math.sin(t * 1.6 + 1)})`;
  ctx.fillRect(bayOuterBot_x1 + 16, thresholdY - 8, bayOuterBot_x2 - bayOuterBot_x1 - 32, 2);
  ctx.restore();

  // Floor sigil etched at the back of the runway (bay number)
  ctx.font = 'bold 16px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(255,220,160,0.22)';
  ctx.textAlign = 'center';
  ctx.fillText('▾  BAY 03 · SURGE HANGER  ▾', W/2, floorBotY - 28);

  ctx.restore();

  // ============================================================
  // 5. CEILING — narrow band at the top edge with hanging cyan
  //    strip lights that frame the bay door.
  // ============================================================
  ctx.save();
  // Ceiling band (the strip above the wall trim, only visible because the
  // camera tilt suggests we look slightly down)
  ctx.fillStyle = 'rgba(8,4,4,0.85)';
  ctx.fillRect(0, 0, W, 10);
  ctx.fillStyle = 'rgba(40,28,18,0.6)';
  ctx.fillRect(0, 10, W, 4);
  // Two strip lights flanking the bay door
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const stripPulse = 0.7 + 0.25 * Math.sin(t * 2);
  ctx.fillStyle = `rgba(60,224,224,${0.7 * stripPulse})`;
  ctx.fillRect(64, 16, bayInnerTop_x1 - 80, 3);
  ctx.fillRect(bayInnerTop_x2 + 16, 16, W - 80 - bayInnerTop_x2, 3);
  ctx.fillStyle = `rgba(120,255,255,${0.28 * stripPulse})`;
  ctx.fillRect(56, 14, bayInnerTop_x1 - 72, 6);
  ctx.fillRect(bayInnerTop_x2 + 8, 14, W - 64 - bayInnerTop_x2, 6);
  ctx.restore();
  ctx.restore();

  // ============================================================
  // 6. PROPS — hover-ships, cargo cages, fuel cells, workbench.
  //    Drawn SOLIDLY now (no transparent silhouettes) so they sit
  //    properly on the bronze floor.
  // ============================================================
  // Port hover-ships (parked nose-east, facing the runway)
  drawHoverShip(ctx, 1.2*64,  3.5*64, 4.2*64, 3.2*64, false, t);
  drawHoverShip(ctx, 1.2*64,  9.5*64, 4.2*64, 3.2*64, false, t);
  // Starboard hover-ships (parked nose-west, mirrored)
  drawHoverShip(ctx, 18.6*64, 3.5*64, 4.2*64, 3.2*64, true,  t);
  drawHoverShip(ctx, 18.6*64, 9.5*64, 4.2*64, 3.2*64, true,  t);

  // Back-line props (workbench + fuel cells against the south wall)
  drawWorkbench(ctx, 1.6*64,  13.6*64, 4.5*64, 1.4*64, t);
  drawFuelCells(ctx, 17.6*64, 13.6*64, 4.6*64, 1.4*64, t);
  // RUNWAY cargo — cages sit ON the central runway as obstacles the
  // player must navigate around (matches the reference image).
  drawCageCrate(ctx, 7.8*64,  7.5*64, 3.0*64, 2.4*64);
  drawCageCrate(ctx, 13.2*64, 9.6*64, 3.0*64, 2.4*64);

  // ============================================================
  // 7. ATMOSPHERIC LAYERS — beam of light from the bay door,
  //    drifting dust motes, vignette on the lateral edges.
  // ============================================================
  // Beam of Endless-light spilling down onto the runway
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const beam = ctx.createLinearGradient(0, bayInnerBot_y, 0, floorBotY);
  beam.addColorStop(0, 'rgba(220,180,255,0.12)');
  beam.addColorStop(0.6, 'rgba(180,140,220,0.04)');
  beam.addColorStop(1, 'rgba(120,80,160,0)');
  ctx.fillStyle = beam;
  ctx.beginPath();
  ctx.moveTo(bayOuterBot_x1, bayInnerBot_y);
  ctx.lineTo(bayOuterBot_x2, bayInnerBot_y);
  ctx.lineTo(bayOuterBot_x2 + 40, floorBotY);
  ctx.lineTo(bayOuterBot_x1 - 40, floorBotY);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Drifting dust motes within the beam
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 22; i++) {
    const u = ((i * 113 + t * 26) % (bayOuterBot_x2 - bayOuterBot_x1));
    const v = ((i * 71  + t * 11) % (floorBotY - bayInnerBot_y));
    const mx = bayOuterBot_x1 + u;
    const my = bayInnerBot_y + v;
    ctx.fillStyle = `rgba(200,180,230,${0.10 + 0.06 * Math.sin(t * 1.4 + i)})`;
    ctx.fillRect(mx, my, 1.5, 1.5);
  }
  ctx.restore();

  // Lateral edge darkening (frames the runway, cinematic feel)
  ctx.save();
  const leftEdge = ctx.createLinearGradient(0, 0, 110, 0);
  leftEdge.addColorStop(0, 'rgba(0,0,0,0.55)'); leftEdge.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = leftEdge; ctx.fillRect(0, 0, 110, H);
  const rightEdge = ctx.createLinearGradient(W - 110, 0, W, 0);
  rightEdge.addColorStop(0, 'rgba(0,0,0,0)'); rightEdge.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = rightEdge; ctx.fillRect(W - 110, 0, 110, H);
  ctx.restore();

  // ============================================================
  // 8. FLOOR SIGNAGE — skiff name etchings on the runway in front
  //    of each parked hover-ship + the row of cyan guide lights.
  // ============================================================
  ctx.save();
  ctx.font = 'bold 9px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(62,224,224,0.55)';
  ctx.textAlign = 'center';
  ctx.fillText('RAVENWAKE',  3.3 * 64, 7.0 * 64 - 4);
  ctx.fillText('LANTERN',    3.3 * 64, 13.0 * 64 - 4);
  ctx.fillText('BLACKHEART', 20.7 * 64, 7.0 * 64 - 4);
  ctx.fillText('UNNAMED',    20.7 * 64, 13.0 * 64 - 4);
  ctx.restore();
}

// ====== Fuel Cell Cluster (new prop for back-starboard corner) ======
function drawFuelCells(ctx, x, y, w, h, t) {
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x + 6, y + h - 4, w - 12, 8);
  // base platform
  ctx.fillStyle = '#1a120a';
  roundRect(ctx, x, y + h * 0.5, w, h * 0.5, 4); ctx.fill();
  // three cylindrical cells side by side
  const cellW = (w - 24) / 3;
  for (let i = 0; i < 3; i++) {
    const cx = x + 12 + i * cellW;
    // body
    ctx.fillStyle = '#3a2510';
    roundRect(ctx, cx, y - 8, cellW - 6, h + 4, 6); ctx.fill();
    // brass band top
    ctx.fillStyle = '#9d6f48';
    ctx.fillRect(cx, y - 4, cellW - 6, 4);
    // brass band middle
    ctx.fillStyle = '#7a5028';
    ctx.fillRect(cx, y + h * 0.3, cellW - 6, 3);
    // pulsing cyan readout
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 2 + i * 1.7);
    ctx.fillStyle = '#3ee0e0';
    ctx.fillRect(cx + cellW * 0.3 - 3, y + h * 0.55, cellW * 0.4, 4);
    ctx.restore();
    // sigil-oil amber liquid hint at top
    ctx.fillStyle = 'rgba(212,168,90,0.35)';
    ctx.fillRect(cx + 3, y - 2, cellW - 12, 2);
  }
  // ledger book leaning on the side
  ctx.fillStyle = '#5a3a20';
  ctx.fillRect(x + w - 18, y + h - 18, 14, 16);
  ctx.fillStyle = '#d4a85a';
  ctx.fillRect(x + w - 18, y + h - 18, 14, 2);
  ctx.restore();
}

// Hover-ship — solid bronze-and-purple harvest skiff with cyan canopy.
// Drawn as a top-down silhouette properly grounded on its hover-pad so it
// reads as a real prop on the runway (no more semi-transparent silhouette).
function drawHoverShip(ctx, x, y, w, h, flip, t) {
  ctx.save();
  if (flip) { ctx.translate(x + w, y); ctx.scale(-1, 1); } else { ctx.translate(x, y); }

  // 1) Hover-pad on the floor under the ship — dark steel plate with
  //    glowing cyan landing rings.
  ctx.save();
  ctx.fillStyle = '#0e0a06';
  roundRect(ctx, 6, h - 18, w - 12, 16, 6); ctx.fill();
  ctx.strokeStyle = '#3a2510'; ctx.lineWidth = 2;
  roundRect(ctx, 6, h - 18, w - 12, 16, 6); ctx.stroke();
  // Cyan landing rings (pulse)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const ringPulse = 0.6 + 0.35 * Math.sin(t * 1.7);
  ctx.strokeStyle = `rgba(60,224,224,${0.7 * ringPulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(w * 0.5, h - 10, w * 0.34, 6, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = `rgba(120,255,255,${0.45 * ringPulse})`;
  ctx.beginPath();
  ctx.ellipse(w * 0.5, h - 10, w * 0.28, 4, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
  ctx.restore();

  // 2) Hover glow underneath (fades into the floor)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const hoverPulse = 0.55 + 0.25 * Math.sin(t * 1.3);
  const hovGrad = ctx.createRadialGradient(w * 0.5, h - 4, 4, w * 0.5, h - 4, w * 0.45);
  hovGrad.addColorStop(0, `rgba(80,200,220,${0.30 * hoverPulse})`);
  hovGrad.addColorStop(1, 'rgba(60,140,200,0)');
  ctx.fillStyle = hovGrad;
  ctx.beginPath();
  ctx.ellipse(w * 0.5, h - 4, w * 0.5, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 3) Ship shadow (sharper, just under the hull)
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.ellipse(w * 0.5, h * 0.82, w * 0.42, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // 4) Main hull — SOLID dark hex wedge with bronze panel highlights.
  // Hull base (bronze undertone)
  ctx.fillStyle = '#3a2510';
  ctx.beginPath();
  ctx.moveTo(0,          h * 0.45);
  ctx.lineTo(w * 0.20,   h * 0.20);
  ctx.lineTo(w * 0.80,   h * 0.18);
  ctx.lineTo(w,          h * 0.45);
  ctx.lineTo(w * 0.96,   h * 0.78);
  ctx.lineTo(w * 0.04,   h * 0.78);
  ctx.closePath(); ctx.fill();
  // Hull dark top plating
  ctx.fillStyle = '#1a0e08';
  ctx.beginPath();
  ctx.moveTo(w * 0.06,  h * 0.42);
  ctx.lineTo(w * 0.24,  h * 0.24);
  ctx.lineTo(w * 0.76,  h * 0.22);
  ctx.lineTo(w * 0.94,  h * 0.42);
  ctx.lineTo(w * 0.90,  h * 0.62);
  ctx.lineTo(w * 0.10,  h * 0.62);
  ctx.closePath(); ctx.fill();
  // Bronze trim line along the hull edge
  ctx.strokeStyle = '#7a5028'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(0,          h * 0.45);
  ctx.lineTo(w * 0.20,   h * 0.20);
  ctx.lineTo(w * 0.80,   h * 0.18);
  ctx.lineTo(w,          h * 0.45);
  ctx.stroke();
  // Panel seams
  ctx.strokeStyle = 'rgba(120,80,40,0.45)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(w * 0.5, h * 0.20); ctx.lineTo(w * 0.5, h * 0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w * 0.30, h * 0.40); ctx.lineTo(w * 0.30, h * 0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w * 0.70, h * 0.40); ctx.lineTo(w * 0.70, h * 0.78); ctx.stroke();

  // 5) Cyan canopy — solid glass strip with bright inner glow
  ctx.save();
  ctx.fillStyle = '#0e2a30';
  roundRect(ctx, w * 0.30, h * 0.30, w * 0.40, 10, 3); ctx.fill();
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const canopyPulse = 0.65 + 0.30 * Math.sin(t * 1.3);
  ctx.fillStyle = `rgba(60,224,224,${0.55 * canopyPulse})`;
  ctx.fillRect(w * 0.32, h * 0.32, w * 0.36, 5);
  ctx.fillStyle = `rgba(180,255,255,${0.35 * canopyPulse})`;
  ctx.fillRect(w * 0.34, h * 0.33, w * 0.32, 2);
  ctx.restore();
  ctx.restore();

  // 6) Forward (right-facing) sigil + tail fins
  // Tail-fin port
  ctx.fillStyle = '#2a1c0e';
  ctx.beginPath();
  ctx.moveTo(w * 0.04, h * 0.55);
  ctx.lineTo(w * 0.18, h * 0.45);
  ctx.lineTo(w * 0.18, h * 0.78);
  ctx.lineTo(w * 0.04, h * 0.78);
  ctx.closePath(); ctx.fill();
  // Tail-fin starboard
  ctx.beginPath();
  ctx.moveTo(w * 0.96, h * 0.55);
  ctx.lineTo(w * 0.82, h * 0.45);
  ctx.lineTo(w * 0.82, h * 0.78);
  ctx.lineTo(w * 0.96, h * 0.78);
  ctx.closePath(); ctx.fill();
  // Sigil on the prow (small carnation-mark stamp Romaine paints on each skiff)
  ctx.fillStyle = '#d4a85a';
  ctx.beginPath(); ctx.arc(w * 0.5, h * 0.50, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e8b9d8';
  ctx.beginPath(); ctx.arc(w * 0.5, h * 0.50, 1.6, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ---- canon hanger primitives ----

function drawBayDoorOpen(ctx, x, y, w, h) {
  // Trapezoidal cutout in the top wall — shows lavender sky + bronze runway in the distance.
  ctx.save();
  // The trapezoid (narrower at top of hanger view, wider at the visible "horizon")
  const inset = 32;
  ctx.beginPath();
  ctx.moveTo(x + inset, y);
  ctx.lineTo(x + w - inset, y);
  ctx.lineTo(x + w + inset, y + h);
  ctx.lineTo(x - inset,     y + h);
  ctx.closePath();
  ctx.clip();

  // Lavender sky gradient (canon: pinkish purple haze with distant clouds)
  const sky = ctx.createLinearGradient(0, y, 0, y + h*4);
  sky.addColorStop(0, '#cfb0e8');
  sky.addColorStop(0.55, '#9c84c4');
  sky.addColorStop(1, '#5d4a82');
  ctx.fillStyle = sky;
  ctx.fillRect(x - inset, y, w + 2*inset, h + 4);

  // Distant runway/horizon line
  ctx.fillStyle = 'rgba(60,40,80,0.45)';
  ctx.fillRect(x + w/2 - 30, y + h - 8, 60, 4);
  // distant docking spire silhouette
  ctx.fillStyle = 'rgba(40,28,60,0.6)';
  ctx.beginPath();
  ctx.moveTo(x + w/2 - 8, y + h - 6);
  ctx.lineTo(x + w/2,     y + h - 14);
  ctx.lineTo(x + w/2 + 8, y + h - 6);
  ctx.closePath(); ctx.fill();
  // soft cloud streaks
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 30, y + 14, w - 60, 4);
  ctx.fillRect(x + 80, y + 30, w - 160, 3);
  ctx.fillRect(x + 50, y + 44, w - 100, 2);

  ctx.restore();

  // Trapezoid frame trim (bronze)
  ctx.save();
  ctx.strokeStyle = '#3a2510'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x + 32, y);
  ctx.lineTo(x + w - 32, y);
  ctx.lineTo(x + w + 32, y + h);
  ctx.lineTo(x - 32,     y + h);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawCyanStrip(ctx, cx, cy, w, h, t, seed) {
  ctx.save();
  const pulse = 0.75 + 0.25 * Math.sin(t*1.6 + seed);
  // base strip
  ctx.fillStyle = '#1a3838';
  ctx.fillRect(cx - w/2, cy - h/2, w, h);
  // glow rectangle
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.85 * pulse;
  ctx.fillStyle = '#3ee0e0';
  ctx.fillRect(cx - w/2 + 2, cy - h/2 + 1, w - 4, h - 2);
  // outer halo
  ctx.globalAlpha = 0.18 * pulse;
  ctx.fillStyle = '#3ee0e0';
  ctx.fillRect(cx - w/2 - 14, cy - h/2 - 8, w + 28, h + 16);
  ctx.restore();
}

function drawCyanFloorStrip(ctx, x, y, w, h, t, vertical) {
  ctx.save();
  // base etched line
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  // animated chase: chunks of cyan moving along the strip
  const chunk = 22, gap = 12, period = chunk + gap;
  const offset = (t * 60) % period;
  ctx.globalCompositeOperation = 'lighter';
  if (!vertical) {
    for (let dx = -period; dx < w + period; dx += period) {
      const px = x + dx + offset;
      const pulse = 0.7 + 0.3*Math.sin(t*3 + dx);
      ctx.globalAlpha = 0.85 * pulse;
      ctx.fillStyle = '#3ee0e0';
      ctx.fillRect(Math.max(x, px), y, Math.min(chunk, x + w - px), h);
    }
    // outer halo
    ctx.globalAlpha = 0.12;
    ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
  } else {
    for (let dy = -period; dy < h + period; dy += period) {
      const py = y + dy + offset;
      const pulse = 0.7 + 0.3*Math.sin(t*3 + dy);
      ctx.globalAlpha = 0.85 * pulse;
      ctx.fillStyle = '#3ee0e0';
      ctx.fillRect(x, Math.max(y, py), w, Math.min(chunk, y + h - py));
    }
    ctx.globalAlpha = 0.12;
    ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
  }
  ctx.restore();
}

function drawSkiff(ctx, x, y, w, h, faceLeft) {
  // Canon: dark sleek wedge-shaped skiff, top-down. Two slim cyan engine vents
  // at the rear, tinted canopy near the nose, brass underbelly trim.
  ctx.save();
  if (faceLeft) {
    ctx.translate(x + w, y);
    ctx.scale(-1, 1);
    ctx.translate(-x, -y);
  }

  // shadow underneath
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(x + w*0.5, y + h + 6, w*0.42, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // hull — angular wedge pointing right
  const hullColor = '#1c1820';
  ctx.fillStyle = hullColor;
  ctx.beginPath();
  ctx.moveTo(x + w*0.04, y + h*0.5);
  ctx.lineTo(x + w*0.14, y + h*0.10);
  ctx.lineTo(x + w*0.78, y + h*0.04);
  ctx.lineTo(x + w*1.00, y + h*0.50);
  ctx.lineTo(x + w*0.78, y + h*0.96);
  ctx.lineTo(x + w*0.14, y + h*0.90);
  ctx.closePath(); ctx.fill();

  // panel highlight along the spine
  ctx.fillStyle = '#2a2630';
  ctx.beginPath();
  ctx.moveTo(x + w*0.18, y + h*0.18);
  ctx.lineTo(x + w*0.74, y + h*0.16);
  ctx.lineTo(x + w*0.92, y + h*0.50);
  ctx.lineTo(x + w*0.74, y + h*0.84);
  ctx.lineTo(x + w*0.18, y + h*0.82);
  ctx.closePath(); ctx.fill();

  // brass underbelly trim (visible as a strip)
  ctx.fillStyle = '#5a4028';
  ctx.fillRect(x + w*0.18, y + h*0.46, w*0.62, h*0.08);

  // tinted canopy near the nose (amber-bronze tint)
  ctx.fillStyle = '#3a2818';
  ctx.beginPath();
  ctx.ellipse(x + w*0.66, y + h*0.5, w*0.16, h*0.30, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(60,224,224,0.55)';
  ctx.beginPath();
  ctx.ellipse(x + w*0.66, y + h*0.5, w*0.13, h*0.24, 0, 0, Math.PI*2); ctx.fill();

  // two cyan engine vents at the rear
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const vy of [y + h*0.30, y + h*0.70]) {
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#3ee0e0';
    ctx.fillRect(x + w*0.05, vy - 3, 8, 6);
    ctx.globalAlpha = 0.22;
    ctx.fillRect(x + w*0.04 - 12, vy - 9, 22, 18);
  }
  ctx.restore();

  // yellow ribbon (Romaine's signature) on the rear stabilizer
  ctx.fillStyle = '#ffd28b';
  ctx.fillRect(x + w*0.06, y + h*0.50 - 6, 4, 12);

  ctx.restore();
}

function drawCageCrate(ctx, x, y, w, h) {
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x + 6, y + h - 4, w - 12, 8);
  // base
  ctx.fillStyle = '#1f1a14';
  ctx.fillRect(x, y, w, h);
  // top and side cage frame (steel grey)
  ctx.fillStyle = '#3a342c';
  ctx.fillRect(x, y, w, 8);
  ctx.fillRect(x, y, 8, h);
  ctx.fillRect(x + w - 8, y, 8, h);
  ctx.fillRect(x, y + h - 8, w, 8);
  // grid bars
  ctx.strokeStyle = '#5a544c'; ctx.lineWidth = 2;
  for (let i = 1; i < 5; i++) {
    const px = x + (w * i/5);
    ctx.beginPath(); ctx.moveTo(px, y + 8); ctx.lineTo(px, y + h - 8); ctx.stroke();
  }
  for (let i = 1; i < 5; i++) {
    const py = y + (h * i/5);
    ctx.beginPath(); ctx.moveTo(x + 8, py); ctx.lineTo(x + w - 8, py); ctx.stroke();
  }
  // brass clasp (sigil-clamp) on the front
  ctx.fillStyle = '#9d6f48';
  ctx.fillRect(x + w/2 - 14, y + h - 14, 28, 8);
  ctx.fillStyle = '#d4a85a';
  ctx.fillRect(x + w/2 - 12, y + h - 12, 24, 2);
  ctx.restore();
}

function drawWorkbench(ctx, x, y, w, h, t) {

  ctx.fillStyle = '#5a4028';

  ctx.fillRect(x + w - 30, y + 14, 14, 22);
  ctx.fillStyle = '#9d6f48';
  ctx.fillRect(x + w - 30, y + 14, 14, 4);

  ctx.fillRect(x + w - 12, y - 14, 4, 18);

  // small cyan computer screen on the bench

  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.7 + 0.3*Math.sin(t*2.5);

  ctx.restore();

function drawSkeletonServant(ctx, x, y) {

// ============================================================
//   ENGINE ROOM — THE DREGE ENGINE
//   Gothic cathedral interior dominated by a violet-cored cylinder
//   engine, brass gears, copper pipework, and a stained-glass rose
//   window on the port wall.
// ============================================================
function drawEngineRoom(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  // dark stone floor with cool indigo veining
  drawStoneFloor(ctx, W, H, p, 11);
  // walls
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#080414');
  // Vaulted gothic arches in the back wall
  for (let i = 0; i < 5; i++) {
    const ax = 64 + i * ((W - 128) / 5);
    const aw = (W - 128) / 5 - 4;
    drawArchPath(ctx, ax+2, 12, aw-4, 90);
    ctx.fillStyle = '#0a0810';
    ctx.fill();
    ctx.strokeStyle = '#1a1428';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  // Stained-glass rose window on the port wall (frame x≈3 tiles, y≈3 tiles)
  drawRoseStainedGlass(ctx, 96, 192, 220, 280, t);
  // Pressure pipes leaving the engine and feeding up into the ceiling
  ctx.save();
  for (const pipeX of [W*0.62, W*0.72, W*0.82]) {
    ctx.fillStyle = '#3c2818';
    ctx.fillRect(pipeX - 14, 64, 28, H - 200);
    ctx.fillStyle = '#1a1208';
    ctx.fillRect(pipeX - 14, 64, 4, H - 200);
    ctx.fillRect(pipeX + 10, 64, 4, H - 200);
    // brass collars every 80px
    for (let py = 100; py < H - 220; py += 80) {
      ctx.fillStyle = '#7e5a28';
      ctx.fillRect(pipeX - 18, py, 36, 8);
    }
  }
  ctx.restore();
  // Side machinery (housings at the collidable squares — render iron boxes)
  drawIronHousing(ctx, 2*64+8, 3*64+8, 2*64-16, 2*64-16, '#221a32');
  drawIronHousing(ctx, 2*64+8, 9*64+8, 2*64-16, 2*64-16, '#221a32');
  drawIronHousing(ctx, 24*64+8, 3*64+8, 2*64-16, 2*64-16, '#221a32');
  drawIronHousing(ctx, 24*64+8, 10*64+8, 2*64-16, 2*64-16, '#221a32');
  // The DREGE ENGINE — massive cylinder at tile region (14..23, 4..9)
  drawDregeEngine(ctx, 14*64, 4*64, 9*64, 5*64, t);
  // Floor sigil-rings glowing under the engine front
  drawFloorSigilRings(ctx, (14+4.5)*64, 9.5*64, [55, 95, 140], t);
  // Iron catwalk railing along the front catwalk (y=11.6 to 11.9)
  ctx.save();
  ctx.strokeStyle = '#5a4030';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(6*64, 11.6*64 + 8); ctx.lineTo(22*64, 11.6*64 + 8);
  ctx.stroke();
  ctx.fillStyle = '#3a2818';
  for (let cx = 6*64; cx <= 22*64; cx += 48) {
    ctx.fillRect(cx - 2, 11.6*64 + 8, 4, 16);
  }
  ctx.restore();
  // Violet motes floating around the engine
  drawCommandEmbers(ctx, W, H, t);
}

function drawDregeEngine(ctx, x, y, w, h, t) {
  ctx.save();
  // shadow under the engine
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h + 4, w*0.46, 22, 0, 0, Math.PI*2);
  ctx.fill();
  // outer iron frame
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, '#1c1424');
  grad.addColorStop(0.5, '#3a2840');
  grad.addColorStop(1, '#160e1c');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y + 24, w, h - 36);
  // top dome
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + 24, w/2, 28, 0, Math.PI, 0);
  ctx.fill();
  // bottom plate
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h - 12, w/2, 14, 0, 0, Math.PI);
  ctx.fill();
  // iron banding
  ctx.strokeStyle = '#0a0612';
  ctx.lineWidth = 3;
  for (let i = 1; i < 6; i++) {
    const by = y + 24 + i * (h - 60) / 6;
    ctx.beginPath();
    ctx.ellipse(x + w/2, by, w/2 - 4, 6, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  // VIOLET CORE — inner glowing window
  const coreX = x + w*0.18, coreY = y + 60, coreW = w*0.64, coreH = h - 110;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.65 + 0.25 * Math.sin(t * 1.5);
  // halo
  ctx.fillStyle = `rgba(180,120,255,${0.18 * pulse})`;
  ctx.fillRect(coreX - 30, coreY - 20, coreW + 60, coreH + 40);
  // bright core column
  const cg = ctx.createLinearGradient(coreX, 0, coreX + coreW, 0);
  cg.addColorStop(0, 'rgba(120,40,200,0.95)');
  cg.addColorStop(0.5, `rgba(220,170,255,${pulse})`);
  cg.addColorStop(1, 'rgba(120,40,200,0.95)');
  ctx.fillStyle = cg;
  ctx.fillRect(coreX, coreY, coreW, coreH);
  ctx.restore();
  // rune ribbons floating in the core
  ctx.save();
  ctx.fillStyle = `rgba(255,230,255,${0.7 + 0.2*Math.sin(t*2)})`;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  const runes = ['☥','✶','◈','✟','♰'];
  for (let i = 0; i < 5; i++) {
    const ry = coreY + 22 + ((t * 18 + i * 60) % (coreH - 20));
    ctx.fillText(runes[i], x + w/2, ry);
  }
  ctx.restore();
  // gear assembly on the right side of the engine
  for (let i = 0; i < 3; i++) {
    drawEngineGear(ctx, x + w + 14 + (i%2)*8, y + 80 + i * 70, 30 + (i%2)*8, t * (0.4 + i*0.1) * (i%2 ? -1 : 1));
  }
  ctx.restore();
}

function drawEngineGear(ctx, cx, cy, r, rot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.fillStyle = '#5a4028';
  // teeth
  for (let i = 0; i < 12; i++) {
    ctx.save();
    ctx.rotate(i * Math.PI / 6);
    ctx.fillRect(-4, -r - 4, 8, 8);
    ctx.restore();
  }
  // body
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a2818';
  ctx.beginPath(); ctx.arc(0, 0, r*0.7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1008';
  ctx.beginPath(); ctx.arc(0, 0, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawIronHousing(ctx, x, y, w, h, fill) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(x+4, y+h-6, w-8, 8);
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#0a0612';
  ctx.lineWidth = 2;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
  // grille slats
  ctx.fillStyle = '#0a0612';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(x + 8 + i*((w-16)/5), y + 10, 4, h - 20);
  }
  ctx.restore();
}

function drawRoseStainedGlass(ctx, x, y, w, h, t) {
  ctx.save();
  // dark frame
  ctx.fillStyle = '#1a0e22';
  ctx.fillRect(x - 8, y - 8, w + 16, h + 16);
  // arch top
  ctx.beginPath();
  ctx.moveTo(x - 8, y);
  ctx.lineTo(x - 8, y + h);
  ctx.lineTo(x + w + 8, y + h);
  ctx.lineTo(x + w + 8, y);
  ctx.fill();
  // rose petals
  const cx = x + w/2, cy = y + h/2 - 30;
  const rOuter = Math.min(w, h)*0.32;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(t * 0.05);
  const colors = ['#a060d0','#5acaff','#ff7090','#ffa0ff','#7a40b8','#5acaff','#a060d0','#ff7090'];
  for (let i = 0; i < 8; i++) {
    ctx.save();
    ctx.rotate(i * Math.PI / 4);
    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.ellipse(0, -rOuter*0.6, rOuter*0.32, rOuter*0.55, 0, 0, Math.PI*2);
    ctx.globalAlpha = 0.65 + 0.2 * Math.sin(t*0.8 + i);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  // central glowing sun
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = 'rgba(255,220,255,0.7)';
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  // long stained-glass shaft below the rose
  for (let i = 0; i < 4; i++) {
    const sx = x + 14 + i * (w-28)/4, sw = (w-28)/4 - 4;
    const sy = cy + 36, sh = y + h - sy - 10;
    const grad = ctx.createLinearGradient(0, sy, 0, sy+sh);
    grad.addColorStop(0, ['#9a55d8','#ff6090','#5acaff','#9a55d8'][i]);
    grad.addColorStop(1, '#1a0820');
    ctx.fillStyle = grad;
    ctx.fillRect(sx, sy, sw, sh);
  }
  // leading
  ctx.strokeStyle = '#080410';
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, w, h);
  ctx.restore();
}

// ============================================================
//   COURT OF JUDGEMENT — Gothic court with cyan holo glyphs
// ============================================================
function drawJudgementCourt(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 13);
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#02060a');
  // Vaulted back wall with arched alcoves — cyan stained-glass slivers
  for (let i = 0; i < 4; i++) {
    const ax = 64 + 80 + i * ((W - 288) / 4);
    const aw = (W - 288) / 4 - 8;
    drawArchPath(ctx, ax, 16, aw, 110);
    const grad = ctx.createLinearGradient(0, 16, 0, 126);
    grad.addColorStop(0, 'rgba(70,220,255,0.85)');
    grad.addColorStop(1, 'rgba(10,40,80,0.4)');
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = '#0a182c'; ctx.lineWidth = 3; ctx.stroke();
  }
  // The Magistrate's dais (raised obsidian platform at x=9..15, y=2..4)
  drawMagistrateDais(ctx, 9*64, 2*64, 6*64, 2*64, t);
  // Witness gear pillars at (3,5)(20,5)(3,9)(20,9) — collidable 1x1 tiles
  for (const [px, py] of [[3,5],[20,5],[3,9],[20,9]]) {
    drawWitnessPillar(ctx, px*64+8, py*64+8, 48, 48, t);
  }
  // THE STAND — accused's iron ring at floor centre (around y=9 tile)
  drawAccusedRing(ctx, 12*64, 9*64, 110, t);
  // Floating cyan glyph readout above the dais
  drawCyanGlyphs(ctx, 12*64, 3.4*64, t);
  // Floor inlaid sigils between pillars (decorative)
  drawFloorSigilRings(ctx, 12*64, 7*64, [40, 70, 100], t);
  // Cool cyan motes
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 36; i++) {
    const mx = (i * 67 + (t*16)) % W;
    const my = (i * 113 + (t*22)) % H;
    ctx.fillStyle = `rgba(120,240,255,${0.18 + 0.15*Math.sin(t+i)})`;
    ctx.fillRect(mx, my, 2, 2);
  }
  ctx.restore();
}

function drawMagistrateDais(ctx, x, y, w, h, t) {
  ctx.save();
  // three iron steps
  for (let s = 0; s < 3; s++) {
    ctx.fillStyle = ['#1a1828','#252238','#322e48'][s];
    ctx.fillRect(x - 6 + s*4, y + h - 12 + s*4, w + 12 - s*8, 8);
  }
  // dais top (obsidian)
  const grad = ctx.createLinearGradient(0, y, 0, y+h);
  grad.addColorStop(0, '#0a0814');
  grad.addColorStop(1, '#181628');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);
  // cyan edge glow
  ctx.strokeStyle = `rgba(90,220,255,${0.6+0.25*Math.sin(t*1.5)})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(x+1.5, y+1.5, w-3, h-3);
  // central sigil pulse
  ctx.fillStyle = `rgba(90,220,255,${0.4 + 0.2*Math.sin(t*2)})`;
  ctx.beginPath(); ctx.arc(x + w/2, y + h*0.55, 16, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawWitnessPillar(ctx, x, y, w, h, t) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(x+2, y+h-6, w-4, 8);
  ctx.fillStyle = '#0e1828';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#06101a'; ctx.lineWidth = 2;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
  // cyan rune-cables threaded vertically
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++) {
    const cx = x + 10 + i * (w-20)/2;
    ctx.fillStyle = `rgba(90,220,255,${0.55 + 0.25*Math.sin(t*2 + i)})`;
    ctx.fillRect(cx-1, y+6, 2, h-12);
  }
  ctx.restore();
}

function drawAccusedRing(ctx, cx, cy, r, t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.strokeStyle = `rgba(120,240,255,${0.55+0.25*Math.sin(t*2)})`;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy, r*0.5, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = `rgba(90,220,255,${0.35+0.2*Math.sin(t*2.4)})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r*0.55, 0, Math.PI*2); ctx.stroke();
  // 4 cardinal sigils around the ring
  const sigs = ['⚖','✟','◊','✶'];
  ctx.font = 'bold 18px Cinzel,Georgia,serif';
  ctx.fillStyle = `rgba(180,250,255,${0.7+0.2*Math.sin(t*2)})`;
  ctx.textAlign = 'center';
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI/2 + Math.PI/2;
    ctx.fillText(sigs[i], cx + Math.cos(a)*(r*0.5+12), cy + Math.sin(a)*(r*0.5+12) + 6);
  }
  ctx.restore();
}

function drawCyanGlyphs(ctx, cx, cy, t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  // three columns of scrolling glyphs
  for (let col = 0; col < 3; col++) {
    const x = cx + (col - 1) * 56;
    for (let row = 0; row < 6; row++) {
      const ch = ['◇','⌬','▢','▣','⌖','⊞'][(row+col*7) % 6];
      const y = cy - 28 + ((row * 14 + (t*22 - col*8)) % 90);
      ctx.fillStyle = `rgba(110,230,255,${0.35 + 0.3*Math.sin(t*2 + row + col)})`;
      ctx.fillText(ch, x, y);
    }
  }
  ctx.restore();
}

// ============================================================
//   CREATION LEVELER ENGINE — neon turquoise & pink cathedral
//   The ancient engine that lets Death\'s Ship walk strata.
// ============================================================
function drawCreationLeveler(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 19);
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#02060a');
  // Back-wall vaulted arches with deep night-sky tint
  for (let i = 0; i < 7; i++) {
    const ax = 80 + i * ((W - 160) / 7);
    const aw = (W - 160) / 7 - 6;
    drawArchPath(ctx, ax, 16, aw, 110);
    const grad = ctx.createLinearGradient(0, 16, 0, 126);
    grad.addColorStop(0, 'rgba(40,20,70,0.95)');
    grad.addColorStop(1, 'rgba(10,30,60,0.4)');
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = '#08101a'; ctx.lineWidth = 2; ctx.stroke();
  }
  // Central LEVELER COLUMN (collidable 6x6 at tile 12..18, 5..11)
  drawLevelerColumn(ctx, 12*64, 5*64, 6*64, 6*64, t);
  // Pink rotors (3*64 area at 3..6,7..10 and 24..27,7..10)
  drawLevelerRotor(ctx, 3*64+8, 7*64+8, 3*64-16, 3*64-16, t, false);
  drawLevelerRotor(ctx, 24*64+8, 7*64+8, 3*64-16, 3*64-16, t, true);
  // Lattice scaffolding mini-cells
  drawIronHousing(ctx, 9*64+8, 12*64+8, 48, 48, '#0a1418');
  drawIronHousing(ctx, 20*64+8, 12*64+8, 48, 48, '#0a1418');
  // Strata readout floor panel near (15,12)
  drawStrataReadout(ctx, 15*64, 12.4*64, t);
  // Cool sparkle motes drifting up
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 60; i++) {
    const mx = (i * 89 + 0.4*t*40) % W;
    const phase = (i * 0.7 + t * 0.6) % 1;
    const my = H - phase * H;
    const tint = i % 3 === 0 ? 'rgba(255,120,200,' : 'rgba(80,240,220,';
    ctx.fillStyle = tint + (0.25 + 0.2*Math.sin(t*2 + i)) + ')';
    ctx.fillRect(mx, my, 2, 2);
  }
  ctx.restore();
}

function drawLevelerColumn(ctx, x, y, w, h, t) {
  ctx.save();
  // halo behind column
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.55 + 0.25 * Math.sin(t * 1.2);
  ctx.fillStyle = `rgba(60,240,210,${0.12 * pulse})`;
  ctx.fillRect(x - 40, y - 16, w + 80, h + 32);
  ctx.globalCompositeOperation = 'source-over';
  // iron scaffolding frame
  ctx.fillStyle = '#08101a';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#142028'; ctx.lineWidth = 3;
  ctx.strokeRect(x+1.5, y+1.5, w-3, h-3);
  // diagonal lattice
  ctx.strokeStyle = '#1c2c38'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(x, y + i * (h/8));
    ctx.lineTo(x + w, y + (i+1) * (h/8));
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w, y + i * (h/8));
    ctx.lineTo(x, y + (i+1) * (h/8));
    ctx.stroke();
  }
  // glowing teal core
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const cg = ctx.createLinearGradient(x + w*0.3, 0, x + w*0.7, 0);
  cg.addColorStop(0, 'rgba(20,80,90,0.9)');
  cg.addColorStop(0.5, `rgba(120,255,230,${pulse})`);
  cg.addColorStop(1, 'rgba(20,80,90,0.9)');
  ctx.fillStyle = cg;
  ctx.fillRect(x + w*0.3, y + 8, w*0.4, h - 16);
  ctx.restore();
  // central floating rune
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.font = 'bold 32px Cinzel,Georgia,serif';
  ctx.fillStyle = `rgba(220,255,250,${0.8 + 0.15*Math.sin(t*2.4)})`;
  ctx.textAlign = 'center';
  ctx.fillText((Math.floor(t*0.3) % 2 === 0) ? '▽' : '△', x + w/2, y + h/2 + 10);
  ctx.restore();
  ctx.restore();
}

function drawLevelerRotor(ctx, x, y, w, h, t, cw) {
  const cx = x + w/2, cy = y + h/2;
  const r = Math.min(w, h)/2;
  ctx.save();
  // base disc
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.arc(cx, cy + 4, r*0.95, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0818';
  ctx.beginPath(); ctx.arc(cx, cy, r*0.95, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1c1828'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r*0.95, 0, Math.PI*2); ctx.stroke();
  // rotating sigil ring
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((cw ? 1 : -1) * t * 0.4);
  ctx.globalCompositeOperation = 'lighter';
  ctx.strokeStyle = `rgba(255,90,180,${0.65 + 0.2*Math.sin(t*1.6)})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, 0, r*0.7, 0, Math.PI*2); ctx.stroke();
  // sigil notches
  ctx.fillStyle = `rgba(255,150,220,${0.85})`;
  for (let i = 0; i < 12; i++) {
    ctx.save();
    ctx.rotate(i * Math.PI / 6);
    ctx.fillRect(-3, -r*0.86, 6, 14);
    ctx.restore();
  }
  // inner star
  ctx.strokeStyle = `rgba(255,110,200,0.8)`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    const x1 = Math.cos(a) * r*0.5, y1 = Math.sin(a) * r*0.5;
    const a2 = a + Math.PI;
    ctx.moveTo(x1, y1); ctx.lineTo(Math.cos(a2)*r*0.5, Math.sin(a2)*r*0.5);
  }
  ctx.stroke();
  // central hub
  ctx.fillStyle = `rgba(255,180,230,${0.9})`;
  ctx.beginPath(); ctx.arc(0, 0, r*0.18, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
}

function drawStrataReadout(ctx, cx, cy, t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(80,240,220,${0.85+0.15*Math.sin(t*2)})`;
  ctx.fillText('-47 · DESCENDING', cx, cy);
  ctx.fillStyle = `rgba(80,240,220,${0.6+0.2*Math.sin(t*2.5)})`;
  ctx.fillText('LOCK STABLE', cx, cy + 14);
  ctx.restore();
}

// ============================================================
//   DEATH'S OFFICE
// ============================================================
function drawDeathsOffice(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 31);
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#0a0510');
  // The long window in the rear wall — a narrow violet field
  ctx.save();
  ctx.fillStyle = '#1a0c2a';
  ctx.fillRect(W*0.30, 70, W*0.40, 60);
  ctx.globalCompositeOperation = 'lighter';
  const wg = ctx.createLinearGradient(0, 70, 0, 130);
  wg.addColorStop(0, 'rgba(160,90,220,0.7)');
  wg.addColorStop(1, 'rgba(60,30,90,0.3)');
  ctx.fillStyle = wg;
  ctx.fillRect(W*0.30, 70, W*0.40, 60);

  drawBookshelf(ctx, 16*64+8, 5*64+8, 2*64-16, 3*64-16);
  // Reading lectern
  drawWoodSlab(ctx, 9*64+8, 8*64+8, 2*64-16, 1*64-16, '#221416', '#42201a');
  // Open book on lectern (glowing pages)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = `rgba(255,210,140,${0.5+0.2*Math.sin(t*1.5)})`;
  ctx.fillRect(10*64-30, 8.4*64, 60, 10);
  ctx.restore();
  // Sconces on both pillars
  drawCandle(ctx, 64+8, H*0.5, t, 1);
  drawCandle(ctx, W-64-12, H*0.5, t, 2);
}

function drawWoodSlab(ctx, x, y, w, h, dark, mid) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x+4, y+h-4, w-8, 8);
  const g = ctx.createLinearGradient(0, y, 0, y+h);
  g.addColorStop(0, mid);
  g.addColorStop(1, dark);
  ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#0a0408'; ctx.lineWidth = 2;
  ctx.strokeRect(x+1, y+1, w-2, h-2);
  // wood grain
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#1a0a04';
  for (let i = 0; i < 5; i++) ctx.fillRect(x+8, y+8+i*((h-16)/5), w-16, 1);
  ctx.restore();
}

function drawBookshelf(ctx, x, y, w, h) {
  ctx.save();
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#0a0408'; ctx.lineWidth = 2;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
  // books — vertical strips of varied colour
  const colours = ['#5a1620','#3a1830','#1e2c4a','#4a3018','#2a2218','#5a3020','#3a1620'];
  let cx = x + 4;
  while (cx < x + w - 8) {
    const bw = 6 + Math.floor((cx * 7 % 5));
    const bh = h - 16 - ((cx % 17) % 8);
    ctx.fillStyle = colours[(cx) % colours.length];
    ctx.fillRect(cx, y + 8 + (h-16-bh), bw, bh);
    cx += bw + 1;
  }
  ctx.restore();
}

// ============================================================
//   VIVIAN'S ROOM
// ============================================================
function drawViviansRoom(ctx, room) {
  const W = room.width * 64, H = room.height * 64;

  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
