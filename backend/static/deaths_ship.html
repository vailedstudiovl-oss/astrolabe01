<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>DEATH'S SHIP — Dimensionlock</title>
<link rel="icon" type="image/png" sizes="192x192" href="/api/static/icon-192.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;width:100%;overflow:hidden;background:#0c0719;color:#e2d4f4;
            font-family:'Cinzel','Cormorant Garamond',Georgia,serif;
            user-select:none;-webkit-user-select:none;}
  /* preferred body type for non-decorative UI text */
  .ui-text { font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
  #game{position:fixed;inset:0;background:#0c0719;display:block;width:100%;height:100%;touch-action:none;image-rendering:auto;}
  /* Top-left HUD: gothic plaque */
  .hud{position:fixed;left:14px;top:calc(14px + env(safe-area-inset-top));z-index:5;pointer-events:none;
       background:linear-gradient(180deg,rgba(28,15,55,.78) 0%,rgba(18,10,38,.78) 100%);
       padding:10px 14px;border-radius:3px;border:1px solid rgba(180,140,220,.28);
       box-shadow:0 4px 18px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.04);
       max-width:78vw;}
  .hud .room-label{font-size:10px;letter-spacing:5px;color:#c8a8e8;text-transform:uppercase;font-weight:600;}
  .hud .room-name{font-size:20px;font-weight:700;color:#fff;margin-top:2px;letter-spacing:1px;text-shadow:0 1px 8px rgba(0,0,0,.7);font-family:'Cinzel',Georgia,serif;}
  .hud .room-sub{font-size:11px;color:#a594bf;margin-top:3px;font-style:italic;letter-spacing:.5px;}

  /* Top-right buttons: gothic icons */
  .icon-btn{position:fixed;z-index:6;width:42px;height:42px;border-radius:3px;
            background:rgba(20,12,40,.7);border:1px solid rgba(180,140,220,.35);
            color:#c8a8e8;font-size:18px;display:flex;align-items:center;justify-content:center;
            cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
            transition:all .2s ease;box-shadow:0 2px 10px rgba(0,0,0,.5);}
  .icon-btn:hover,.icon-btn:active{background:rgba(48,26,80,.92);color:#fff;border-color:rgba(220,180,255,.55);}
  .back-btn{top:calc(14px + env(safe-area-inset-top));right:14px;}
  .map-btn{top:calc(64px + env(safe-area-inset-top));right:14px;}
  .codex-btn{top:calc(114px + env(safe-area-inset-top));right:14px;}

  /* Mobile D-pad */
  .dpad{position:fixed;left:max(18px,env(safe-area-inset-left));bottom:max(18px,env(safe-area-inset-bottom));z-index:7;width:170px;height:170px;display:none;}
  .dpad .btn{position:absolute;width:54px;height:54px;
             background:rgba(22,12,40,.72);border:1px solid rgba(180,140,220,.32);
             border-radius:6px;color:#c8a8e8;display:flex;align-items:center;justify-content:center;
             font-size:22px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .dpad .btn.active{background:rgba(82,42,132,.85);color:#fff;border-color:rgba(220,180,255,.7);}
  .dpad .btn.up{top:0;left:58px;} .dpad .btn.left{top:58px;left:0;}
  .dpad .btn.right{top:58px;right:0;} .dpad .btn.down{bottom:0;left:58px;}

  .action-btn{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:max(28px,env(safe-area-inset-bottom));z-index:7;width:80px;height:80px;border-radius:50%;
              background:radial-gradient(circle at 35% 35%,#8c5fc6 0%,#3a1f6a 80%);
              border:2px solid rgba(220,180,255,.55);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;display:none;
              align-items:center;justify-content:center;text-align:center;
              box-shadow:0 0 20px rgba(140,90,200,.45),inset 0 0 0 1px rgba(255,255,255,.1);
              cursor:pointer;flex-direction:column;font-family:'Cinzel',Georgia,serif;}
  .action-btn:active{transform:scale(.94);}
  .action-btn .glyph{font-size:24px;line-height:1;margin-bottom:3px;}
  .action-btn.disabled{opacity:.32;}
  @media (pointer:coarse){ .dpad{display:block;} .action-btn{display:flex;} }

  /* Floating hint pill */
  .hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;
        background:rgba(18,10,38,.88);border:1px solid rgba(220,170,90,.5);padding:7px 16px;border-radius:2px;
        font-size:12px;color:#ffe9b3;letter-spacing:3px;text-transform:uppercase;pointer-events:none;
        opacity:0;transition:opacity .2s ease;font-weight:600;
        text-shadow:0 0 6px rgba(255,200,100,.5);
        box-shadow:0 4px 14px rgba(255,180,80,.18);}
  .hint.show{opacity:1;}

  /* Modal */
  .modal{position:fixed;inset:0;z-index:9;background:rgba(6,3,16,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:24px;}
  .modal.show{display:flex;}
  .modal-content{max-width:520px;width:100%;
                 background:linear-gradient(160deg,#1f1238 0%,#0e0820 100%);
                 border:1px solid rgba(190,150,90,.35);border-radius:4px;
                 padding:24px 26px;
                 box-shadow:0 24px 70px rgba(0,0,0,.7),inset 0 0 0 1px rgba(220,170,90,.08);
                 max-height:84vh;overflow-y:auto;position:relative;}
  /* Gothic frame corners */
  .modal-content::before, .modal-content::after{content:'';position:absolute;width:18px;height:18px;
                 border:1px solid rgba(220,170,90,.5);}
  .modal-content::before{top:6px;left:6px;border-right:none;border-bottom:none;}
  .modal-content::after{bottom:6px;right:6px;border-left:none;border-top:none;}
  .modal-eyebrow{font-size:10px;letter-spacing:5px;color:#d4a85a;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
  .modal-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:16px;
               font-family:'Cinzel',Georgia,serif;letter-spacing:1px;
               text-shadow:0 1px 12px rgba(0,0,0,.6);}
  .modal-body{font-size:14px;line-height:1.7;color:#cdb8e4;white-space:pre-wrap;
              font-family:'Cormorant Garamond',Georgia,serif;}
  .modal-close{margin-top:20px;width:100%;padding:11px;
               background:rgba(60,32,108,.4);border:1px solid rgba(220,170,90,.45);
               border-radius:2px;color:#fff;font-size:11px;letter-spacing:4px;text-transform:uppercase;
               cursor:pointer;font-weight:700;font-family:'Cinzel',Georgia,serif;
               transition:background .2s ease;}
  .modal-close:hover,.modal-close:active{background:rgba(110,60,180,.6);border-color:rgba(255,200,100,.6);}

  /* Codex modal — log of discovered locations */
  .codex-list{margin:14px 0 8px 0;padding:0;list-style:none;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;color:#cdb8e4;line-height:1.85;}
  .codex-list li{padding:4px 0;border-bottom:1px dotted rgba(180,140,220,.18);}
  .codex-list li.cur{color:#ffe9b3;}
  .codex-list li.sealed{color:#5b4878;font-style:italic;}

  /* Loader */
  .loader{position:fixed;inset:0;z-index:99;background:#0c0719;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#c8a8e8;font-size:12px;letter-spacing:4px;text-transform:uppercase;transition:opacity .5s ease;font-family:'Cinzel',Georgia,serif;}
  .loader .ring{width:60px;height:60px;border:3px solid rgba(180,140,220,.18);border-top-color:#c8a8e8;border-radius:50%;animation:spin 1.1s linear infinite;margin-bottom:18px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader.hide{opacity:0;pointer-events:none;}
  .loader .sub{font-size:10px;letter-spacing:3px;color:#5b4878;margin-top:8px;}

  /* Door fade */
  .fade-overlay{position:fixed;inset:0;z-index:8;background:#000;opacity:0;transition:opacity .5s ease;pointer-events:none;}
  .fade-overlay.show{opacity:1;}

  /* News Network ad popup — bottom-left, miniature TV news broadcast */
  .news-popup{position:fixed;
              left:max(14px,env(safe-area-inset-left));
              bottom:max(14px,env(safe-area-inset-bottom));
              z-index:6;width:300px;
              background:linear-gradient(180deg,#0e0820 0%,#1c1138 100%);
              border:1px solid rgba(220,170,90,.45);border-radius:3px;
              box-shadow:0 8px 30px rgba(0,0,0,.7),inset 0 0 0 1px rgba(220,170,90,.1);
              transform:translateY(140%);opacity:0;
              transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .35s ease;
              overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;}
  .news-popup.show{transform:translateY(0);opacity:1;}
  /* hide on small screens when D-pad is active to avoid covering controls */
  @media (pointer:coarse) {
    .news-popup{ left:auto; right:max(14px,env(safe-area-inset-right));
                 bottom:auto; top:calc(170px + env(safe-area-inset-top));
                 width:280px; }
  }
  .news-header{display:flex;align-items:center;gap:8px;padding:7px 10px;
               background:linear-gradient(90deg,#5a1a1a 0%,#3a0e0e 100%);
               border-bottom:1px solid rgba(220,170,90,.3);}
  .news-live{display:inline-block;font-size:9px;letter-spacing:2px;color:#fff;font-weight:800;
             background:#c41a1a;padding:2px 7px;border-radius:2px;text-transform:uppercase;
             animation:livepulse 1.4s ease-in-out infinite;}
  @keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.55;}}
  .news-channel{font-size:11px;color:#ffe9b3;letter-spacing:1.4px;font-weight:700;text-transform:uppercase;flex:1;}
  .news-close{background:none;border:none;color:#cdb8e4;font-size:18px;cursor:pointer;line-height:1;padding:0 2px;}
  .news-close:hover{color:#fff;}
  .news-stage{padding:12px 12px 6px 12px;}
  .news-anchor{display:flex;gap:10px;align-items:flex-start;}
  .news-portrait{width:46px;height:46px;border-radius:2px;flex-shrink:0;
                 background:linear-gradient(180deg,#3a2160 0%,#1c0e30 100%);
                 border:1px solid rgba(220,170,90,.35);
                 display:flex;align-items:center;justify-content:center;font-size:24px;color:#ffe9b3;}
  .news-headline{flex:1;font-size:13px;color:#fff;line-height:1.35;font-weight:600;font-family:'Cinzel',Georgia,serif;letter-spacing:.3px;}
  .news-body{font-size:12px;color:#bba8d4;margin-top:8px;line-height:1.45;font-family:'Cormorant Garamond',Georgia,serif;}
  .news-cta{display:block;margin-top:10px;padding:7px 10px;text-align:center;
            background:rgba(60,32,108,.4);border:1px solid rgba(220,170,90,.45);
            color:#ffe9b3;font-size:10px;letter-spacing:2.5px;font-weight:700;text-transform:uppercase;
            cursor:pointer;text-decoration:none;border-radius:2px;font-family:'Cinzel',Georgia,serif;}
  .news-cta:hover{background:rgba(110,60,180,.6);color:#fff;}
  .news-ticker{height:18px;background:#0a061a;color:#d4a85a;font-size:10px;
               border-top:1px solid rgba(220,170,90,.2);
               overflow:hidden;position:relative;}
  .news-ticker-inner{position:absolute;white-space:nowrap;line-height:18px;padding-left:100%;
                     animation:tickerScroll 18s linear infinite;letter-spacing:1.5px;}
  @keyframes tickerScroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="room-label">DEATH'S SHIP · DECK</div>
    <div class="room-name" id="roomName">Loading…</div>
    <div class="room-sub" id="roomSub"></div>
  </div>

  <button class="icon-btn back-btn" onclick="window.location.href='/api/astrolabe'" title="Return to main menu">⨯</button>
  <button class="icon-btn map-btn" id="mapBtn" title="Ship map">⊞</button>
  <button class="icon-btn codex-btn" id="codexBtn" title="Lore codex">☥</button>

  <div class="dpad" id="dpad">
    <div class="btn up"    data-dir="up">▲</div>
    <div class="btn left"  data-dir="left">◀</div>
    <div class="btn right" data-dir="right">▶</div>
    <div class="btn down"  data-dir="down">▼</div>
  </div>
  <button class="action-btn disabled" id="actionBtn">
    <span class="glyph">✦</span>
    <span>ACT</span>
  </button>

  <div class="hint" id="hint">Press E to interact</div>

  <div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <div class="modal-eyebrow" id="modalEye">LORE FRAGMENT</div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-body" id="modalBody"></div>
      <button class="modal-close" onclick="closeModal()">⨯ DISMISS</button>
    </div>
  </div>

  <!-- News Network ad popup (miniature TV broadcast) -->
  <div class="news-popup" id="newsPopup" role="dialog" aria-live="polite">
    <div class="news-header">
      <span class="news-live">LIVE</span>
      <span class="news-channel" id="newsChannel">DLN · Dimensionlock News</span>
      <button class="news-close" id="newsClose" aria-label="Close">×</button>
    </div>
    <div class="news-stage">
      <div class="news-anchor">
        <div class="news-portrait" id="newsPortrait">⚜</div>
        <div class="news-headline" id="newsHeadline"></div>
      </div>
      <div class="news-body" id="newsBody"></div>
      <a class="news-cta" id="newsCta" href="#" target="_blank" rel="noopener">▸ More</a>
    </div>
    <div class="news-ticker"><div class="news-ticker-inner" id="newsTicker"></div></div>
  </div>

  <div class="fade-overlay" id="fade"></div>

  <div class="loader" id="loader">
    <div class="ring"></div>
    <div>Boarding Death's Ship</div>
    <div class="sub" id="loaderSub">Loading sprites…</div>
  </div>

<script>
/* ============================================================
   DEATH'S SHIP — 2D top-down gothic exploration
   Playing as Maytradalis, exploring a gothic sci-fi spaceship.
   ============================================================ */
(() => {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ASSET_BASE = '/api/static/deaths_ship/sprites/';

// ---- Sprite manifest ----
const SPRITE_META = {
  // Maytradalis (player)
  run_down:   { src: 'may_run_down.png',   frame_w: 86,  frame_h: 192, frames: 25 },
  run_right:  { src: 'may_run_right.png',  frame_w: 112, frame_h: 187, frames: 25 },
  run_up:     { src: 'may_run_up.png',     frame_w: 70,  frame_h: 182, frames: 25 },
  idle_right: { src: 'may_idle_right.png', frame_w: 48,  frame_h: 182, frames: 25 },
  idle_up:    { src: 'may_idle_up.png',    frame_w: 67,  frame_h: 178, frames: 25 },
  idle_down:  { src: 'may_idle_down.png',  frame_w: 140, frame_h: 188, frames: 25 },
  // Master Death
  death_idle: { src: 'death_idle.png',     frame_w: 81,  frame_h: 168, frames: 25 },
  death_walk: { src: 'death_walk.png',     frame_w: 87,  frame_h: 138, frames: 25 },
  // Grim Elystria
  elystria_idle:      { src: 'elystria_idle.png',      frame_w: 62,  frame_h: 179, frames: 25 },
  elystria_idle_down: { src: 'elystria_idle_down.png', frame_w: 73,  frame_h: 182, frames: 25 },
  elystria_walk:      { src: 'elystria_walk.png',      frame_w: 93,  frame_h: 169, frames: 25 },
  elystria_run:       { src: 'elystria_run.png',       frame_w: 148, frame_h: 148, frames: 25 },
  // Romaine
  romaine_idle:  { src: 'romaine_idle.png',  frame_w: 62,  frame_h: 192, frames: 25 },
  romaine_walk:  { src: 'romaine_walk.png',  frame_w: 105, frame_h: 192, frames: 25 },
  romaine_run:   { src: 'romaine_run.png',   frame_w: 159, frame_h: 188, frames: 25 },
  romaine_sleep: { src: 'romaine_sleep.png', frame_w: 223, frame_h: 76,  frames: 25 },
  romaine_wave:  { src: 'romaine_wave.png',  frame_w: 106, frame_h: 192, frames: 25 },
  // Grim Cryious
  cryious_idle:      { src: 'cryious_idle.png',      frame_w: 71, frame_h: 163, frames: 25 },
  cryious_idle_up:   { src: 'cryious_idle_up.png',   frame_w: 96, frame_h: 142, frames: 25 },
  cryious_idle_down: { src: 'cryious_idle_down.png', frame_w: 91, frame_h: 174, frames: 25 },
  cryious_walk:      { src: 'cryious_walk.png',      frame_w: 93, frame_h: 157, frames: 25 },
  cryious_run:       { src: 'cryious_run.png',       frame_w: 125,frame_h: 125, frames: 25 },
};
const sprites = {};   // name -> Image

// ============================================================
//   PROCEDURAL REAPER ROSTER (mirrors the Astrolabe terminal)
// ============================================================
// The Astrolabe terminal generates reapers per-strata with name + sigil + status.
// On the ship, off-duty reapers sleep in the Dorm Hall. We mirror the same name
// pool here so the dorms feel canon-consistent with the map.
// Each door has a magic sigil; it GLOWS while the reaper is INTACT, and goes
// COLD/EXTINGUISHED when the reaper is DECEASED. Major characters (Cryious,
// Maytradalis, Elystria, Flybutt) cannot die — their sigil always glows.
// ------------------------------------------------------------
const REAPER_FIRST_PARTS = ['Mordren','Harrow','Sephira','Thane','Korax','Veilwing','Sloth','Null','Obol','Cresh','Marrow','Echtor','Pyx','Quill','Sallow','Wraith','Zinder','Helix','Vren','Iris','Cantor','Bellum','Hush','Pallor','Tenebris','Murk','Caul','Stoss','Vesper','Halt','Wend','Threnody','Coda','Knell','Veil','Suth','Reek','Mir'];
const REAPER_SUF_PARTS   = ['','-7','-12','-3X','-IX','-Δ','-9','-V','-Ω','-α','-13','-K','-77','-Σ','-2','-X','-Δ7'];
const REAPER_EPITHETS    = ['the Quiet','the Patient','of the Threshold','the Solemn','Pale-Handed','of the Hush','the Folded','Twice-Vowed','the Untouched','the Cold','of the Long Walk','the Ferryman','Bone-Footed','Shroud-Eyed','of Last Whispers','the Mourner','of Stilled Wings','the Without','the Empty-Cup'];
const REAPER_SIGILS      = ['☠','☥','✟','✶','◈','⚖','◊','✸','⊛','✻','♰','♱','✝','⚚','✠','✦','⚜','✺'];
const REAPER_SCYTHES     = ['Crescent-Blade','Twin-Crescent','Hooked Glaive','Curved Sickle','Obsidian Reapinghook','Folded-Steel Crescent','Voidedge Scythe','Bone-Inlaid Hook','Mirror-Edge','Shard-Sickle','Singing Curve','Soundless Edge','Bloodglass Crescent'];

// Deterministic seeded RNG keyed to a dorm slot
function _doorSeed(side, idx, salt=0) {
  const s = (side === 'top' ? 17 : 41) * (idx + 7) + salt * 13 + 9001;
  return Math.abs(Math.sin(s)) * 9999 % 1;
}
function _genProceduralReaper(side, idx) {
  const fi = Math.floor(_doorSeed(side, idx, 1) * REAPER_FIRST_PARTS.length);
  const si = Math.floor(_doorSeed(side, idx, 2) * REAPER_SUF_PARTS.length);
  const ei = Math.floor(_doorSeed(side, idx, 3) * REAPER_EPITHETS.length);
  const sigIdx = Math.floor(_doorSeed(side, idx, 4) * REAPER_SIGILS.length);
  const scIdx  = Math.floor(_doorSeed(side, idx, 5) * REAPER_SCYTHES.length);
  const useEp  = _doorSeed(side, idx, 6) > 0.45;
  const fn = REAPER_FIRST_PARTS[fi] + REAPER_SUF_PARTS[si];
  const name = useEp ? `${fn}, ${REAPER_EPITHETS[ei]}` : fn;
  // ~20% chance the reaper of this dorm has been lost in the field (canon: about 1 in 5)
  const deceased = _doorSeed(side, idx, 7) < 0.20;
  const strata = Math.floor(_doorSeed(side, idx, 8) * 99) * (_doorSeed(side, idx, 9) > 0.5 ? -1 : 1);
  return {
    name, sigil: REAPER_SIGILS[sigIdx], scythe: REAPER_SCYTHES[scIdx],
    deceased, immortal: false, strata, kind: 'procedural',
  };
}

// Fixed canon assignments — Major characters never die.
const CANON_DORMS = {
  // top row, slot index → fixed occupant
  top: {
    2: { name: 'Cryious Death', sigil: '❄', kind: 'major', immortal: true, deceased: false,
         lore: 'A frozen mist seeps out from under the door. Inside, Cryious dreams in equations the rest of the crew can not read. Knock at his door at your own risk — the last reaper who knocked spent a week thinking in ice.' },
    3: { name: 'Grim Elystria', sigil: '♪', kind: 'major', immortal: true, deceased: false,
         lore: 'Music plays softly behind the door — a song May does not recognise, in a language that may not exist outside of this corridor. Elystria is May\'s closest ally. Some nights she opens the door without being knocked on, and they share tea in silence.' },
    5: { name: 'Flybutt', sigil: '✿', kind: 'major', immortal: true, deceased: false,
         lore: 'A faint thrum of wings. Flybutt sleeps suspended from the ceiling of his dorm, a constellation of small luminous moths circling around him.\n\nHe is the only reaper on the ship that cannot die — the contract he signed predates Death\'s own.' },
  },
  bottom: {
    // bottom row — keep the existing sealed/common/skeleton canon
    2: { name: 'SEALED ALCOVE', sigil: '✕', kind: 'sealed', immortal: false, deceased: false,
         lore: 'An empty alcove. There never was a dorm here — the door is welded over the stone, a placeholder from the ship\'s original build.\n\nMay tries the handle anyway. It does not yield, and was never meant to.' },
    3: { name: 'The Common Reapers', sigil: '⚔', kind: 'common', immortal: false, deceased: false,
         lore: 'A single shared dorm for the dozen common reapers — the ones who pilot the harvest skiffs and tend to the smaller souls. The door is always slightly ajar. Inside, twelve thin beds in two rows, each with a small bone token at the foot.\n\nThe tokens are how the reapers find their way home from a strata they did not return whole from.' },
    4: { name: 'Skeleton Alcove', sigil: '☩', kind: 'skeleton', immortal: false, deceased: false,
         lore: 'A small recess in the wall where one of the ship\'s skeleton-servants stands at rest. Its jaw is loose; a scrap of parchment is pinned to its sternum reading "OFF-DUTY · DO NOT DISTURB."\n\nThe skeletons are part of the ship\'s permanent crew — older than May, older than most of the reapers. Death does not say where they came from.' },
  },
};

// Build the full 12-door roster (top 0..5, bottom 0..5)
const DORM_ROSTER = (() => {
  const out = [];
  ['top','bottom'].forEach(side => {
    for (let i = 0; i < 6; i++) {
      const canon = (CANON_DORMS[side] || {})[i];
      const occ = canon ? Object.assign({ kind: 'major' }, canon) : _genProceduralReaper(side, i);
      // World coordinates of the door arch (centre)
      const cx = (4.5 + i*4) * 64;
      const cyTop = 0;                    // top of room (drawn from y=0 down)
      const cyBot = (10-1) * 64;          // bottom row offset (room height 10)
      out.push({
        side, idx: i,
        worldX: cx,
        worldY: side === 'top' ? cyTop : cyBot,
        // Plaque trigger position (in tile units) — just in front of the door
        plaqueTileX: (4.5 + i*4),
        plaqueTileY: side === 'top' ? 1.7 : 8.0,
        occupant: occ,
      });
    }
  });
  return out;
})();

// ============================================================
//   ASTROLABE ↔ DEATH'S SHIP — LIVE REAPER STATUS SYNC
// ============================================================
// When a reaper "dies" inside the Astrolabe (procedural events or scripted
// outcomes), the Astrolabe writes its ID into a localStorage list called
// `dlds_killed_reapers`. We mirror that into the ship's dorm roster: any
// occupant whose canonical name (or generated ID) shows up in that list
// gets `deceased=true`, which immediately extinguishes their door sigil.
// Major characters (Cryious / Maytradalis / Elystria / Flybutt) are
// IMMORTAL — their entries are ignored even if force-written.
// ------------------------------------------------------------
function _killedReaperSet() {
  try {
    const raw = localStorage.getItem('dlds_killed_reapers');
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    if (Array.isArray(arr)) return new Set(arr.map(s => String(s).trim().toUpperCase()));
  } catch (e) { /* swallow — corrupt JSON shouldn't break the game */ }
  return new Set();
}
function applyKilledReapersToRoster() {
  const killed = _killedReaperSet();
  for (const slot of DORM_ROSTER) {
    const occ = slot.occupant;
    if (occ.immortal) continue;                  // majors can't die
    if (occ.kind === 'sealed' || occ.kind === 'common' || occ.kind === 'skeleton') continue;
    const nameKey = String(occ.name || '').trim().toUpperCase();
    if (killed.has(nameKey)) occ.deceased = true;
    // We deliberately DON'T revive — once cold, stays cold this session.
  }
}
applyKilledReapersToRoster();
window.addEventListener('storage', (e) => {
  if (e.key !== 'dlds_killed_reapers') return;
  applyKilledReapersToRoster();
});
// Same-tab dispatcher (storage event only fires cross-tab; expose a helper
// the Astrolabe can call from the same window if both share an iframe).
window.dlds_markReaperDead = function (name) {
  try {
    const k = 'dlds_killed_reapers';
    const cur = JSON.parse(localStorage.getItem(k) || '[]');
    const u = String(name || '').trim();
    if (u && !cur.includes(u)) {
      cur.push(u);
      localStorage.setItem(k, JSON.stringify(cur));
    }
  } catch (e) {}
  applyKilledReapersToRoster();
};

// ============================================================
//   NPC sprite-based rendering (Death, Elystria, Romaine, ...)
// ============================================================
// An NPC entry per room has: x, y (tile units), sheet (sprite key in SPRITE_META),
// optional flip, optional anim speed, optional plaqueTitle / plaqueBody (else
// uses the colocated interactable already present in the room).
// They get drawn between background and player with Y-sort.
// An NPC can also use a `customDraw` vector renderer via NPC_DRAW below.
// ------------------------------------------------------------

// Vector NPC renderers — used by `customDraw: 'name'` on an NPC entry.
// Each draws at (cx, cy) where cy is the FOOT position. The drawer is
// responsible for the entire silhouette (cloak/hood/scythe/etc).
const NPC_DRAW = {
  // Tall, hooded, scythe-bearing initiate reaper. Animated subtle sway.
  // Total height ~100 * scale px.
  hoodedReaper(ctx, cx, cy, t, scale, npc) {
    scale = scale || 1.0;
    const moving = !!(npc && npc._moving);
    const flip = !!(npc && npc.flip);
    // Walking gait — slight horizontal sway + step bob
    const sway = moving ? Math.sin(t * 6 + cx*0.01) * 1.5 * scale : 0;
    const bob  = moving ? Math.abs(Math.sin(t * 6 + cx*0.01)) * 2 * scale
                        : Math.sin(t * 1.8 + cx*0.01) * 1.2 * scale;
    ctx.save();
    if (flip) { ctx.translate(cx, 0); ctx.scale(-1, 1); ctx.translate(-cx, 0); }
    ctx.translate(sway, bob - 4 * scale);
    // Long cloak silhouette (trapezoid)
    ctx.fillStyle = '#0a0a14';
    ctx.beginPath();
    ctx.moveTo(cx - 26*scale, cy);
    ctx.lineTo(cx + 26*scale, cy);
    ctx.lineTo(cx + 19*scale, cy - 80*scale);
    ctx.lineTo(cx - 19*scale, cy - 80*scale);
    ctx.closePath();
    ctx.fill();
    // Cloak inner shadow seam
    ctx.fillStyle = '#15131e';
    ctx.beginPath();
    ctx.moveTo(cx - 22*scale, cy - 2*scale);
    ctx.lineTo(cx + 22*scale, cy - 2*scale);
    ctx.lineTo(cx + 16*scale, cy - 60*scale);
    ctx.lineTo(cx - 16*scale, cy - 60*scale);
    ctx.closePath();
    ctx.fill();
    // Sash / belt with sigil
    ctx.fillStyle = '#3a1c2c';
    ctx.fillRect(cx - 22*scale, cy - 44*scale, 44*scale, 6*scale);
    ctx.fillStyle = '#a05038';
    ctx.fillRect(cx - 2*scale, cy - 44*scale, 4*scale, 6*scale);
    // Hood
    ctx.fillStyle = '#06060c';
    ctx.beginPath();
    ctx.moveTo(cx - 22*scale, cy - 78*scale);
    ctx.quadraticCurveTo(cx, cy - 110*scale, cx + 22*scale, cy - 78*scale);
    ctx.lineTo(cx + 18*scale, cy - 60*scale);
    ctx.lineTo(cx - 18*scale, cy - 60*scale);
    ctx.closePath();
    ctx.fill();
    // Hood opening (darkest)
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 80*scale, 11*scale, 14*scale, 0, 0, Math.PI*2);
    ctx.fill();
    // Twin glowing eyes inside the hood
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const eyePulse = 0.7 + 0.3*Math.sin(t * 2 + cx);
    ctx.fillStyle = '#ff4040';
    ctx.globalAlpha = eyePulse;
    ctx.beginPath(); ctx.arc(cx - 4*scale, cy - 82*scale, 1.4*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 4*scale, cy - 82*scale, 1.4*scale, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Scythe over the shoulder — diagonal pole + curved blade tip
    ctx.save();
    ctx.translate(cx + 14*scale, cy - 30*scale);
    ctx.rotate(-0.42);
    // pole
    ctx.fillStyle = '#3a2a18';
    ctx.fillRect(-1.5*scale, -68*scale, 3*scale, 80*scale);
    // bone end-cap
    ctx.fillStyle = '#d9c79a';
    ctx.fillRect(-2*scale, 10*scale, 4*scale, 4*scale);
    // crescent blade
    ctx.strokeStyle = '#cfcfd5'; ctx.lineWidth = 3*scale;
    ctx.beginPath();
    ctx.moveTo(0, -68*scale);
    ctx.quadraticCurveTo(-22*scale, -76*scale, -32*scale, -56*scale);
    ctx.stroke();
    // inner blade shadow
    ctx.strokeStyle = '#8a8a96'; ctx.lineWidth = 1*scale;
    ctx.beginPath();
    ctx.moveTo(-2*scale, -68*scale);
    ctx.quadraticCurveTo(-22*scale, -74*scale, -30*scale, -57*scale);
    ctx.stroke();
    ctx.restore();
    ctx.restore();
  },
  // Static skeleton-servant standing in an alcove or patrol point.
  skeletonServant(ctx, cx, cy, t, scale, npc) {
    scale = scale || 1.0;
    ctx.save();
    ctx.translate(0, Math.sin(t*1.5 + cx*0.02) * 0.8);
    // tattered cloak/robe stub
    ctx.fillStyle = '#2a1828';
    ctx.beginPath();
    ctx.moveTo(cx - 18*scale, cy);
    ctx.lineTo(cx + 18*scale, cy);
    ctx.lineTo(cx + 12*scale, cy - 60*scale);
    ctx.lineTo(cx - 12*scale, cy - 60*scale);
    ctx.closePath();
    ctx.fill();
    // skull
    ctx.fillStyle = '#e8dfc6';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 70*scale, 9*scale, 11*scale, 0, 0, Math.PI*2);
    ctx.fill();
    // eye sockets
    ctx.fillStyle = '#0a0a14';
    ctx.beginPath(); ctx.arc(cx - 3.5*scale, cy - 71*scale, 1.8*scale, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3.5*scale, cy - 71*scale, 1.8*scale, 0, Math.PI*2); ctx.fill();
    // jaw line
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(cx - 3*scale, cy - 64*scale, 6*scale, 1.2*scale);
    // OFF-DUTY parchment pin
    ctx.fillStyle = '#e8dfc6';
    ctx.fillRect(cx - 6*scale, cy - 40*scale, 12*scale, 6*scale);
    ctx.fillStyle = '#3a2a18';
    ctx.font = `${Math.round(3.6*scale)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('OFF-DUTY', cx, cy - 36*scale);
    ctx.restore();
  },
};

// ============================================================
//   GOTHIC BACKGROUND DRAWING
// ============================================================
// All drawing happens in WORLD coords (px = tile*64).

// === GRAND CORRIDOR — long candle-lit hallway between bridge & Grand Hall ===
function drawGrandCorridor(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 5);
  // Outer walls
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#0a0518');
  // Long carpet runner down the centre — crimson with gold sigil trim
  drawCarpet(ctx, 64, H/2 - 64, W - 128, 128, '#5a1f3a');
  ctx.save();
  ctx.fillStyle = 'rgba(220,170,90,0.30)';
  ctx.font = 'bold 10px Cinzel,Georgia,serif';
  ctx.textAlign = 'center';
  for (let i = 80; i < W - 80; i += 96) {
    ctx.fillText('☩', i, H/2 - 14);
    ctx.fillText('☩', i, H/2 + 22);
  }
  ctx.restore();
  // Tall pillars on either side of the carpet
  const pillarX = [4, 9, 14, 18];
  for (const xt of pillarX) {
    drawCorridorPillar(ctx, xt*64 + 32, 2*64,  t);
    drawCorridorPillar(ctx, xt*64 + 32, 6*64,  t);
  }
  // Wall sconces between pillars
  for (let i = 0; i < 5; i++) {
    drawSconce(ctx, (3 + i*4)*64, 72,    p.candle, t, i*5);
    drawSconce(ctx, (3 + i*4)*64, H - 72, p.candle, t, i*7);
  }
  // Portrait frames hanging on the walls between pillars
  drawCorridorPortrait(ctx, 6.5*64 + 16, 80,  '#5a1f3a');
  drawCorridorPortrait(ctx, 11.5*64 + 16, 80, '#3a1c2c');
  drawCorridorPortrait(ctx, 16*64 + 16, 80,   '#5a1f3a');
  drawCorridorPortrait(ctx, 6.5*64 + 16, H - 168,  '#3a1c2c');
  drawCorridorPortrait(ctx, 11.5*64 + 16, H - 168, '#5a1f3a');
  drawCorridorPortrait(ctx, 16*64 + 16, H - 168,   '#3a1c2c');
  // Central bronze brazier mid-corridor
  drawBrazier(ctx, 16*64,  4.5*64, 0.7, t, 4);
  drawBrazier(ctx, 6.5*64, 4.5*64, 0.7, t, 9);
  // Floor stencil
  ctx.save();
  ctx.font = 'bold 12px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(220,170,90,0.18)';
  ctx.textAlign = 'center';
  ctx.fillText('— THE GRAND CORRIDOR —', W/2, H/2 + 38);
  ctx.restore();
  // Ambient dust motes
  drawCommandEmbers(ctx, W, H, t);
}

function drawCorridorPillar(ctx, cx, cy, t) {
  ctx.save();
  // base
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(cx - 18, cy + 30, 36, 6);
  // shaft
  ctx.fillStyle = '#2c1832';
  ctx.fillRect(cx - 12, cy - 22, 24, 56);
  ctx.fillStyle = '#3a1c40';
  ctx.fillRect(cx - 10, cy - 22, 4,  56);   // left highlight
  ctx.fillRect(cx - 4,  cy - 22, 2,  56);   // mid fluting line
  ctx.fillRect(cx + 4,  cy - 22, 2,  56);   // mid fluting line
  // capital
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(cx - 18, cy - 28, 36, 8);
  // small bronze brand
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.55 + 0.30*Math.sin(t*1.7 + cx*0.01);
  ctx.fillStyle = '#ffa050';
  ctx.font = 'bold 12px Cinzel,Georgia,serif';
  ctx.textAlign = 'center';
  ctx.fillText('☩', cx, cy + 8);
  ctx.restore();
  ctx.restore();
}

function drawCorridorPortrait(ctx, x, y, frameColor) {
  ctx.save();
  // gilded frame
  ctx.fillStyle = '#7a5226';
  ctx.fillRect(x, y, 32, 44);
  ctx.fillStyle = '#3a2418';
  ctx.fillRect(x + 3, y + 3, 26, 38);
  // canvas (dark portrait silhouette of a reaper)
  ctx.fillStyle = frameColor;
  ctx.fillRect(x + 5, y + 5, 22, 34);
  ctx.fillStyle = '#0a0a14';
  // hood + shoulders silhouette
  ctx.beginPath();
  ctx.arc(x + 16, y + 16, 5, Math.PI, 0); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 38); ctx.lineTo(x + 24, y + 38);
  ctx.lineTo(x + 22, y + 20); ctx.lineTo(x + 10, y + 20);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// === GRAND HALL — cathedral with pews, banners, altar, skylight sigil ===
function drawGrandHall(ctx, room) {
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 9);
  // Walls + trim
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#0a0518');
  // Long black-and-white aisle running south to north
  const aisleW = 5*64;
  const aisleX = W/2 - aisleW/2;
  ctx.fillStyle = '#1a1320';
  ctx.fillRect(aisleX, 64, aisleW, H - 128);
  ctx.fillStyle = '#e3d8c4';
  for (let y = 64; y < H - 128; y += 64) {
    for (let i = 0; i < 5; i++) {
      if ((i + (y/64)) % 2 === 0) ctx.fillRect(aisleX + i*64, y, 60, 60);
    }
  }
  // Aisle red runner down the centre 1.5 tiles wide
  drawCarpet(ctx, W/2 - 48, 80, 96, H - 160, '#5a1f3a');
  // === HIGH ALTAR (north end) ===
  const altarX = 11*64, altarY = 2*64, altarW = 6*64, altarH = 2*64;
  ctx.fillStyle = '#0a0518';
  roundRect(ctx, altarX, altarY, altarW, altarH, 4); ctx.fill();
  ctx.fillStyle = '#1a0e2c';
  roundRect(ctx, altarX + 8, altarY + 8, altarW - 16, altarH - 16, 4); ctx.fill();
  // Altar sigil (pulsing red, large)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const altarPulse = 0.65 + 0.35*Math.sin(t*1.2);
  ctx.globalAlpha = altarPulse;
  const altarGrad = ctx.createRadialGradient(altarX + altarW/2, altarY + altarH/2, 2, altarX + altarW/2, altarY + altarH/2, 80);
  altarGrad.addColorStop(0, '#ff5230');
  altarGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = altarGrad;
  ctx.fillRect(altarX - 20, altarY - 20, altarW + 40, altarH + 40);
  ctx.fillStyle = '#ffba66';
  ctx.font = 'bold 56px Cinzel,Georgia,serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('☩', altarX + altarW/2, altarY + altarH/2);
  ctx.restore();
  // === ROW OF PEWS (port + starboard) ===
  for (let row = 0; row < 5; row++) {
    const pewY = (4 + row*2)*64;
    drawPew(ctx, 3*64, pewY, 7*64, 1.2*64);
    drawPew(ctx, 18*64, pewY, 7*64, 1.2*64);
  }
  // === HANGING BANNERS (along side walls) ===
  for (let i = 0; i < 3; i++) {
    drawReaperBanner(ctx, 1.2*64, (3 + i*4.5)*64, 0.6*64, 3.5*64, '#5a1f1a', '☩', t, i);
    drawReaperBanner(ctx, (room.width - 1.8)*64, (3 + i*4.5)*64, 0.6*64, 3.5*64, '#a83a14', '⚔', t, i+5);
  }
  // === CANDLE CHANDELIERS — 3 hanging down the aisle ===
  drawChandelier(ctx, W/2, 5*64,  1.1, p.candle, t);
  drawChandelier(ctx, W/2, 10*64, 1.1, p.candle, t);
  drawChandelier(ctx, W/2, 14*64, 1.0, p.candle, t);
  // === GREAT SKYLIGHT SIGIL projected on the aisle ===
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const sky = 0.45 + 0.25*Math.sin(t*0.8);
  ctx.globalAlpha = sky;
  const skyGrad = ctx.createRadialGradient(W/2, H*0.55, 4, W/2, H*0.55, 160);
  skyGrad.addColorStop(0, '#ffba66');
  skyGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = skyGrad;
  ctx.beginPath(); ctx.arc(W/2, H*0.55, 160, 0, Math.PI*2); ctx.fill();
  // slow-rotating outer sigil ring
  ctx.translate(W/2, H*0.55);
  ctx.rotate(t * 0.15);
  ctx.strokeStyle = 'rgba(255,186,102,0.55)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 120, 0, Math.PI*2); ctx.stroke();
  for (let k = 0; k < 12; k++) {
    const a = (k/12) * Math.PI*2;
    const rx = Math.cos(a)*120, ry = Math.sin(a)*120;
    ctx.beginPath(); ctx.arc(rx, ry, 3.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // floor stencil
  ctx.save();
  ctx.font = 'bold 14px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(220,170,90,0.18)';
  ctx.textAlign = 'center';
  ctx.fillText('— THE GRAND HALL —', W/2, H - 96);
  ctx.restore();
  drawCommandEmbers(ctx, W, H, t);
}

function drawPew(ctx, x, y, w, h) {
  ctx.save();
  // Bench seat
  ctx.fillStyle = '#3a1c2c';
  roundRect(ctx, x, y, w, h*0.55, 3); ctx.fill();
  // Backrest
  ctx.fillStyle = '#2a131e';
  roundRect(ctx, x, y + h*0.55, w, h*0.45, 3); ctx.fill();
  // Highlights along the top edges
  ctx.fillStyle = '#5a2e44';
  ctx.fillRect(x, y, w, 3);
  ctx.fillRect(x, y + h*0.55, w, 2);
  // small carved sigils on the backrest
  ctx.fillStyle = '#7a4860';
  ctx.font = 'bold 9px Cinzel,Georgia,serif';
  ctx.textAlign = 'center';
  for (let i = 1; i < 4; i++) {
    ctx.fillText('☩', x + (w * i/4), y + h*0.85);
  }
  ctx.restore();
}

function drawStoneFloor(ctx, W, H, p, seed) {
  // Layered dark stone tile floor with mortar lines + subtle warm ambient.
  ctx.fillStyle = p.floor; ctx.fillRect(0,0,W,H);
  // Tile pattern (96x96, offset every other row by 48)
  const TS = 96;
  for (let y = 0; y < H; y += TS) {
    for (let x = 0; x < W; x += TS) {
      const off = ((y/TS) % 2) * (TS/2);
      const px = x - off;
      // Slight per-tile shade variance
      const v = Math.abs(Math.sin((px*0.013)+(y*0.017)+seed)) * 12;
      ctx.fillStyle = `rgb(${parseInt(p.stone.slice(1,3),16)-12+v}, ${parseInt(p.stone.slice(3,5),16)-12+v}, ${parseInt(p.stone.slice(5,7),16)-8+v})`;
      ctx.fillRect(px+1, y+1, TS-3, TS-3);
    }
  }
  // Diagonal cross-hatch shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W+H; i += 14) {
    ctx.beginPath();
    ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke();
  }
}

function drawArchWindow(ctx, x, y, w, h, accent) {
  // Tall pointed gothic arch with stained glass
  ctx.save();
  // frame
  ctx.fillStyle = '#0a0518';
  drawArchPath(ctx, x, y, w, h);
  ctx.fill();
  // inner glass — radial pink->purple gradient
  const cx = x + w/2, cy = y + h/2;
  const gr = ctx.createRadialGradient(cx, cy+10, 4, cx, cy, w);
  gr.addColorStop(0, '#ffaae0');
  gr.addColorStop(0.5, '#9344c4');
  gr.addColorStop(1, '#3a1860');
  ctx.fillStyle = gr;
  drawArchPath(ctx, x+5, y+5, w-10, h-10);
  ctx.fill();
  // mullion bars (3 vertical + 2 horizontal)
  ctx.strokeStyle = '#0a0518'; ctx.lineWidth = 3;
  for (let i = 1; i < 3; i++) {
    const px = x + (w/3)*i;
    ctx.beginPath(); ctx.moveTo(px, y+8); ctx.lineTo(px, y+h-6); ctx.stroke();
  }
  for (let i = 1; i < 2; i++) {
    const py = y + (h/2.4)*i + 6;
    ctx.beginPath(); ctx.moveTo(x+6, py); ctx.lineTo(x+w-6, py); ctx.stroke();
  }
  // crown ornament
  ctx.fillStyle = accent;
  ctx.fillRect(cx-2, y-4, 4, 8);
  ctx.restore();
}
function drawArchPath(ctx, x, y, w, h) {
  // pointed-arch (lancet)
  ctx.beginPath();
  ctx.moveTo(x, y + w/2);
  ctx.quadraticCurveTo(x + w/2, y - w/3, x + w, y + w/2);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
}

function drawChandelier(ctx, cx, cy, scale, candleColor, t) {
  // Hanging gothic chandelier — iron arms + 5 candles
  ctx.save();
  // chain
  ctx.strokeStyle = '#1a0e2c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy - 50*scale); ctx.lineTo(cx, cy - 8*scale); ctx.stroke();
  // ring
  ctx.fillStyle = '#1a0e2c';
  ctx.beginPath(); ctx.arc(cx, cy, 22*scale, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0518';
  ctx.beginPath(); ctx.arc(cx, cy, 17*scale, 0, Math.PI*2); ctx.fill();
  // 5 candles
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI*2;
    const px = cx + Math.cos(a) * 22 * scale;
    const py = cy + Math.sin(a) * 22 * scale;
    // candle stem
    ctx.fillStyle = '#d4c8b8';
    ctx.fillRect(px-1.5*scale, py-9*scale, 3*scale, 9*scale);
    // flame glow
    const flicker = 0.7 + 0.3*Math.sin(t*7 + i + state.flickerSeed);
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.55 * flicker;
    ctx.fillStyle = candleColor;
    ctx.beginPath(); ctx.ellipse(px, py-12*scale, 3*scale, 5*scale, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.18 * flicker;
    ctx.beginPath(); ctx.arc(px, py-12*scale, 14*scale, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawSconce(ctx, x, y, candleColor, t, seed) {
  // Wall sconce — bracket + candle + warm light pool
  ctx.save();
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(x-8, y-2, 16, 4);
  ctx.fillRect(x-5, y, 10, 8);
  // candle
  ctx.fillStyle = '#d4c8b8';
  ctx.fillRect(x-1.5, y-12, 3, 12);
  // flame
  const flicker = 0.7 + 0.3*Math.sin(t*8 + seed);
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.7 * flicker;
  ctx.fillStyle = candleColor;
  ctx.beginPath(); ctx.ellipse(x, y-16, 3, 5, 0, 0, Math.PI*2); ctx.fill();
  // light pool
  ctx.globalAlpha = 0.22 * flicker;
  const grad = ctx.createRadialGradient(x, y-12, 4, x, y-12, 60);
  grad.addColorStop(0, candleColor); grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x-60, y-72, 120, 90);
  ctx.restore();
}

function drawCandle(ctx, x, y, t, seed) {
  // base brass holder
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(x-4, y, 8, 4);
  ctx.fillStyle = '#2a1a08';
  ctx.fillRect(x-3, y+2, 6, 2);
  // candle
  ctx.fillStyle = '#e8d4b8';
  ctx.fillRect(x-2, y-12, 4, 12);
  // flame
  const flicker = 0.75 + 0.25*Math.sin(t*9 + seed);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.7 * flicker;
  ctx.fillStyle = '#ffac4a';
  ctx.beginPath(); ctx.ellipse(x, y-15, 2.8, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(x, y-15, 1.4, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.15 * flicker;
  ctx.fillStyle = '#ffac4a';
  ctx.beginPath(); ctx.arc(x, y-15, 28, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCarpet(ctx, x, y, w, h, color) {
  ctx.save();
  ctx.fillStyle = color;
  roundRect(ctx, x, y, w, h, 4); ctx.fill();
  // tassels top + bottom
  ctx.fillStyle = '#1a0e2c';
  for (let i = 0; i < w; i += 14) {
    ctx.fillRect(x+i+2, y-4, 2, 4);
    ctx.fillRect(x+i+2, y+h, 2, 4);
  }
  // motif (oval)
  ctx.strokeStyle = 'rgba(220,170,90,0.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(x+w/2, y+h/2, w*0.36, h*0.32, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x+w/2, y+h/2, w*0.22, h*0.18, 0, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawWallTrim(ctx, W, H, color) {
  // Inner border line with crown/base molding
  ctx.fillStyle = color;
  ctx.fillRect(0, 60, W, 4);              // top crown
  ctx.fillRect(0, H-64, W, 4);            // base molding
  ctx.fillRect(60, 0, 4, H);              // left
  ctx.fillRect(W-64, 0, 4, H);            // right
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ============================================================
//   ROOM PAINTERS

function drawControlRoom(ctx, room) {
  // Canon "Command Floor" — dark blue ceiling fading to red-orange floor,
  // a massive inverted dome hanging centrally, hooded reapers posted on both
  // sides, a central red-orange holographic projection column. No candles,
  // no stained glass, no purple stone.
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;

  // 1) Vertical gradient floor (deep blue → red-orange, like the comic ref)
  const floorGrad = ctx.createLinearGradient(0, 0, 0, H);
  floorGrad.addColorStop(0,    '#0e1424');   // top: deep cold blue
  floorGrad.addColorStop(0.45, '#2a1828');   // mid: dark crimson
  floorGrad.addColorStop(0.75, '#6a2418');   // dark orange-red
  floorGrad.addColorStop(1,    '#a83a14');   // bottom: hot orange floor glow
  ctx.fillStyle = floorGrad; ctx.fillRect(0, 0, W, H);

  // 2) Plate seams (large hexagonal-deck grid)
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 2;
  for (let y = 96; y < H; y += 192) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x = 96; x < W; x += 192) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

  // 3) Outer walls — dark grey metal panels
  ctx.fillStyle = '#0a0f1c';
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  // riveted seams on perimeter
  ctx.fillStyle = '#1a2438';
  for (let x = 32; x < W; x += 96) { ctx.fillRect(x, 4, 2, 56); ctx.fillRect(x, H-60, 2, 56); }
  for (let y = 32; y < H; y += 96) { ctx.fillRect(4, y, 56, 2); ctx.fillRect(W-60, y, 56, 2); }

  // 4) Tiered platforms (port + starboard) — raised stone with red sigil-lights
  drawCommandTier(ctx, 2*64, 3*64, 5*64, 1.5*64, t);
  drawCommandTier(ctx, 19*64, 3*64, 5*64, 1.5*64, t);

  // 4b) Scattered holographic command consoles (red-orange projection scopes)
  drawHoloConsole(ctx, 4.5*64,  7.2*64, t, 0.7, 'STRATA-FEED');
  drawHoloConsole(ctx, 21.5*64, 7.2*64, t, 0.7, 'SOUL-INDEX');
  drawHoloConsole(ctx, 9*64,    11.5*64, t, 0.55, 'CYCLE  ' + (Math.floor(t*7)%999).toString().padStart(3,'0'));
  drawHoloConsole(ctx, 17*64,   11.5*64, t, 0.55, 'LAYER  ' + ((Math.floor(t*3)%199) - 99));
  drawHoloConsole(ctx, 3.0*64,  10.5*64, t, 0.4,  'NAV');
  drawHoloConsole(ctx, 23.0*64, 10.5*64, t, 0.4,  'CONTAIN');

  // 4c) Wall-hung reaper banners (long fabric strips with the death sigil)
  drawReaperBanner(ctx, 0.4*64, 1.5*64, 0.6*64, 5*64, '#a83a14', '☩', t, 0);
  drawReaperBanner(ctx, 1.7*64, 1.5*64, 0.6*64, 5*64, '#5a1f1a', '⚔', t, 1);
  drawReaperBanner(ctx, (room.width-2.3)*64, 1.5*64, 0.6*64, 5*64, '#a83a14', '☩', t, 2);
  drawReaperBanner(ctx, (room.width-1.0)*64, 1.5*64, 0.6*64, 5*64, '#5a1f1a', '⚔', t, 3);

  // 5) The INVERTED DOME hanging from the ceiling — dark wedge with red sigils
  drawInvertedDome(ctx, 13*64, 4*64, 6*64, 4.2*64, t);

  // 5a) THE COMMAND THRONE — a raised dais of obsidian and bronze beneath
  //     the dome, with a tall high-backed chair of bone-and-iron rings.
  //     Master Death stands on this dais, not floating mid-air.
  drawCommandThrone(ctx, 13*64, 6.6*64, t);

  // 5b) Floating ember motes drifting upward toward the dome (atmospheric)
  drawCommandEmbers(ctx, W, H, t);

  // 5c) Stained-glass-style runic windows along the side walls (deep red)
  drawCommandRuneWindow(ctx, 1.0*64,  8.5*64, 0.5*64, 2.5*64, t, 0);
  drawCommandRuneWindow(ctx, 1.0*64,  12.0*64, 0.5*64, 2.5*64, t, 1);
  drawCommandRuneWindow(ctx, (room.width-1.5)*64, 8.5*64, 0.5*64, 2.5*64, t, 2);
  drawCommandRuneWindow(ctx, (room.width-1.5)*64, 12.0*64, 0.5*64, 2.5*64, t, 3);

  // 5d) Bronze brazier urns on the floor (flames lick out the top)
  drawBrazier(ctx, 6.5*64, 9.0*64, 0.6, t, 0);
  drawBrazier(ctx, 19.5*64, 9.0*64, 0.6, t, 7);
  drawBrazier(ctx, 9.0*64, 13.4*64, 0.55, t, 3);
  drawBrazier(ctx, 17.0*64, 13.4*64, 0.55, t, 11);

  // 6) Central holographic projection column — red-orange light beam UP
  drawProjectionColumn(ctx, 13*64, 9.5*64, t);

  // 6a) Concentric sigil circles around the central column (engraved floor)
  drawFloorSigilRings(ctx, 13*64, 9.5*64, [42, 78, 118], t);

  // 7) Hooded reapers posted left + right (placeholder shapes)
  drawHoodedReaper(ctx, 7*64, 13*64, t, 0);
  drawHoodedReaper(ctx, 19*64, 13*64, t, 1);

  // 8) Faint floor stencil text
  ctx.save();
  ctx.font = 'bold 13px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(255,140,80,0.18)';
  ctx.textAlign = 'center';
  ctx.fillText('▾ COMMAND FLOOR · DECK I ▾', W/2, H - 96);
  ctx.restore();
}

// The Command Throne — raised obsidian dais, bone-and-iron high-back chair,
// hanging chains from the dome above, sigil-runes pulsing along the steps.
function drawCommandThrone(ctx, cx, cy, t) {
  ctx.save();
  // ===== DAIS (3-tier ziggurat) =====
  // Lowest step (widest)
  ctx.fillStyle = '#15131e';
  roundRect(ctx, cx - 138, cy - 6, 276, 26, 4); ctx.fill();
  ctx.fillStyle = '#0e0c16';
  ctx.fillRect(cx - 138, cy - 6, 276, 4);
  // Middle step
  ctx.fillStyle = '#1a1726';
  roundRect(ctx, cx - 108, cy - 22, 216, 22, 4); ctx.fill();
  ctx.fillStyle = '#0e0c16';
  ctx.fillRect(cx - 108, cy - 22, 216, 4);
  // Top step (throne platform)
  ctx.fillStyle = '#1f1b2d';
  roundRect(ctx, cx - 80, cy - 38, 160, 18, 4); ctx.fill();
  ctx.fillStyle = '#0e0c16';
  ctx.fillRect(cx - 80, cy - 38, 160, 3);
  // Bronze trim strips on each step edge — pulsing red sigil-line
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.7 + 0.3*Math.sin(t*1.3);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ff5230';
  ctx.fillRect(cx - 138, cy - 5, 276, 1.5);
  ctx.fillRect(cx - 108, cy - 21, 216, 1.5);
  ctx.fillRect(cx - 80,  cy - 37, 160, 1.5);
  ctx.restore();

  // ===== THE THRONE (high-backed chair) =====
  // Backrest spire — tall bone arch rising up
  ctx.fillStyle = '#23202f';
  ctx.beginPath();
  ctx.moveTo(cx - 28, cy - 36);
  ctx.lineTo(cx - 28, cy - 134);
  ctx.quadraticCurveTo(cx, cy - 168, cx + 28, cy - 134);
  ctx.lineTo(cx + 28, cy - 36);
  ctx.closePath();
  ctx.fill();
  // Inner panel of the backrest (slightly lighter)
  ctx.fillStyle = '#2c2940';
  ctx.beginPath();
  ctx.moveTo(cx - 22, cy - 38);
  ctx.lineTo(cx - 22, cy - 128);
  ctx.quadraticCurveTo(cx, cy - 156, cx + 22, cy - 128);
  ctx.lineTo(cx + 22, cy - 38);
  ctx.closePath();
  ctx.fill();
  // Sigil sun-disc embedded high in the backrest
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const sigilPulse = 0.6 + 0.4*Math.sin(t*1.1);
  ctx.globalAlpha = 0.85 * sigilPulse;
  const sigilGrad = ctx.createRadialGradient(cx, cy - 130, 2, cx, cy - 130, 20);
  sigilGrad.addColorStop(0, '#ff8050');
  sigilGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sigilGrad;
  ctx.fillRect(cx - 22, cy - 152, 44, 44);
  ctx.fillStyle = '#ffba66';
  ctx.font = 'bold 18px Cinzel,Georgia,serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('☼', cx, cy - 130);
  ctx.restore();
  // Twin bone arm-rests / horns on either side
  ctx.fillStyle = '#d9c79a';
  ctx.beginPath(); ctx.ellipse(cx - 36, cy - 60, 6, 14, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 36, cy - 60, 6, 14, -0.3, 0, Math.PI*2); ctx.fill();
  // Two iron rings hanging from the dome via chains (left + right of throne)
  ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(cx - 60, cy - 160); ctx.lineTo(cx - 60, cy - 90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 60, cy - 160); ctx.lineTo(cx + 60, cy - 90); ctx.stroke();
  ctx.fillStyle = '#3a2a18';
  ctx.beginPath(); ctx.arc(cx - 60, cy - 88, 6, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + 60, cy - 88, 6, 0, Math.PI*2); ctx.stroke();
  // Small dangling sigil-charms below each ring
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.7 + 0.3*Math.sin(t*2.1);
  ctx.fillStyle = '#ff8050';
  ctx.font = 'bold 11px Cinzel,Georgia,serif';
  ctx.textAlign = 'center';
  ctx.fillText('☩', cx - 60, cy - 76);
  ctx.fillText('☩', cx + 60, cy - 76);
  ctx.restore();

  // ===== FLOOR-CARVED RUNE-RING in front of the throne =====
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.55 + 0.20*Math.sin(t*1.8);
  ctx.strokeStyle = '#ff5230'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.ellipse(cx, cy + 32, 86, 14, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx, cy + 32, 60, 9, 0, 0, Math.PI*2); ctx.stroke();
  // 8 small tick-marks on the outer ring
  for (let k = 0; k < 8; k++) {
    const ang = (k / 8) * Math.PI * 2;
    const rx = cx + Math.cos(ang) * 86;
    const ry = cy + 32 + Math.sin(ang) * 14;
    ctx.beginPath(); ctx.arc(rx, ry, 1.6, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}

// Tall narrow stained-glass-style window with a red sigil inside.
function drawCommandRuneWindow(ctx, x, y, w, h, t, seed) {
  ctx.save();
  // Iron tracery frame
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
  // Glass — dark crimson, faint diagonal sheen
  const g = ctx.createLinearGradient(x, y, x + w, y + h);
  g.addColorStop(0, '#3a0a10');
  g.addColorStop(0.6, '#7a1818');
  g.addColorStop(1, '#3a0a10');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
  // Cross-mullion
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(x, y + h*0.5 - 1, w, 2);
  ctx.fillRect(x + w*0.5 - 1, y, 2, h);
  // Glowing inner sigil
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.55 + 0.30*Math.sin(t*1.2 + seed);
  ctx.fillStyle = '#ff8050';
  ctx.font = `bold ${Math.round(w*0.7)}px Cinzel,Georgia,serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(['☩','✶','◈','♰'][seed % 4], x + w*0.5, y + h*0.5);
  ctx.restore();
  ctx.restore();
}

// Bronze brazier with a small live flame at the top.
function drawBrazier(ctx, x, y, scale, t, seed) {
  scale = scale || 0.6;
  ctx.save();
  // Tripod base
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(x - 8*scale, y, 16*scale, 4*scale);
  ctx.beginPath();
  ctx.moveTo(x - 7*scale, y);
  ctx.lineTo(x - 14*scale, y + 18*scale);
  ctx.lineTo(x - 11*scale, y + 18*scale);
  ctx.lineTo(x - 4*scale, y);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 7*scale, y);
  ctx.lineTo(x + 14*scale, y + 18*scale);
  ctx.lineTo(x + 11*scale, y + 18*scale);
  ctx.lineTo(x + 4*scale, y);
  ctx.closePath();
  ctx.fill();
  // Bowl
  ctx.fillStyle = '#5a4028';
  ctx.beginPath();
  ctx.ellipse(x, y - 4*scale, 14*scale, 5*scale, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#7a5226';
  ctx.beginPath();
  ctx.ellipse(x, y - 5*scale, 13*scale, 4*scale, 0, 0, Math.PI*2);
  ctx.fill();
  // Live flame
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const flick = 0.85 + 0.20*Math.sin(t*8 + seed);
  for (let k = 0; k < 4; k++) {
    ctx.globalAlpha = (0.55 - k*0.10) * flick;
    ctx.fillStyle = ['#ffd66e','#ff8050','#ff5230','#a83a14'][k];
    const yy = y - 12*scale - k*6*scale + Math.sin(t*6 + seed + k) * 1.2 * scale;
    const ww = (12 - k*2.6) * scale;
    const hh = (14 - k*2) * scale;
    ctx.beginPath();
    ctx.ellipse(x + Math.sin(t*5 + k) * 0.6 * scale, yy, ww, hh, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}

// Concentric carved rings around the central projection column.
function drawFloorSigilRings(ctx, cx, cy, radii, t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < radii.length; i++) {
    const r = radii[i];
    ctx.globalAlpha = (0.45 - i*0.08) * (0.75 + 0.25*Math.sin(t*1.5 + i));
    ctx.strokeStyle = '#ff8050'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.ellipse(cx, cy + 22, r, r*0.30, 0, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

// Small free-floating holo projector + UI ring + status text
function drawHoloConsole(ctx, x, y, t, scale, label) {
  ctx.save();
  // Base projector pedestal
  ctx.fillStyle = '#1a2438';
  roundRect(ctx, x - 22*scale, y + 18*scale, 44*scale, 14*scale, 3); ctx.fill();
  ctx.fillStyle = '#262e44';
  roundRect(ctx, x - 18*scale, y + 20*scale, 36*scale, 4*scale, 2); ctx.fill();
  // Projection cone (additive)
  ctx.globalCompositeOperation = 'lighter';
  const flick = 0.85 + 0.15*Math.sin(t*5 + x*0.013);
  const grad = ctx.createRadialGradient(x, y + 8*scale, 1, x, y + 8*scale, 36*scale);
  grad.addColorStop(0, 'rgba(255,140,80,' + (0.45*flick).toFixed(3) + ')');
  grad.addColorStop(1, 'rgba(255,140,80,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y + 8*scale, 36*scale, 0, Math.PI*2); ctx.fill();
  // Holographic ring(s)
  ctx.strokeStyle = 'rgba(255,166,96,' + (0.85*flick).toFixed(3) + ')';
  ctx.lineWidth = 1.5;
  for (let r = 0; r < 3; r++) {
    const radius = (10 + r*7) * scale;
    const tilt = (Math.sin(t * (1.3 + r*0.3)) * 0.4 + 0.6);
    ctx.beginPath();
    ctx.ellipse(x, y + 8*scale, radius, radius * tilt, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  // Crisp central "data sigil"
  ctx.fillStyle = 'rgba(255,210,150,' + (0.95*flick).toFixed(3) + ')';
  ctx.font = `bold ${Math.round(10*scale)}px JetBrains Mono,Consolas,monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(label || '◆', x, y + 11*scale);
  // Falling data ticks
  for (let i = 0; i < 4; i++) {
    const ty = ((t * 24 + i*9 + x*0.04) % 32) * scale;
    ctx.globalAlpha = (1 - ty/(32*scale)) * 0.45 * flick;
    ctx.fillStyle = '#ffba66';
    ctx.fillRect(x - 14*scale + i*7*scale, y - 2*scale + ty, 1.4*scale, 5*scale);
  }
  ctx.restore();
}

// Hanging cloth banner with embroidered reaper sigil
function drawReaperBanner(ctx, x, y, w, h, color, sigil, t, seed) {
  ctx.save();
  // Soft sway by row — top fixed, bottom sways a few px
  const sway = Math.sin(t*0.9 + seed*1.7) * 3;
  // Fabric (vertical gradient with darkening at bottom)
  const g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0,    color);
  g.addColorStop(0.55, '#2a1018');
  g.addColorStop(1,    '#170810');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w + sway*0.4, y + h*0.6);
  ctx.lineTo(x + w + sway, y + h);
  ctx.lineTo(x + sway, y + h);
  ctx.lineTo(x + sway*0.4, y + h*0.6);
  ctx.closePath();
  ctx.fill();
  // Brass hanging rod
  ctx.fillStyle = '#7a5226';
  ctx.fillRect(x - 4, y - 4, w + 8, 5);
  // Tassels
  ctx.fillStyle = '#3a1a20';
  ctx.fillRect(x + sway,     y + h, 3, 6);
  ctx.fillRect(x + w + sway, y + h, 3, 6);
  // Embroidered sigil down the middle, faintly glowing
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.55 + 0.35*Math.sin(t*1.3 + seed);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffa050';
  ctx.font = `bold ${Math.round(w*0.7)}px Cinzel,Georgia,serif`;
  ctx.textAlign = 'center';
  ctx.fillText(sigil, x + w/2 + sway*0.4, y + h*0.40);
  ctx.fillText(sigil, x + w/2 + sway*0.6, y + h*0.72);
  ctx.restore();
  ctx.restore();
}

// Drifting ember particles that float up from the floor toward the dome
function drawCommandEmbers(ctx, W, H, t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 24; i++) {
    const seed = i * 137.5;
    const x = ((seed * 11.3) % W);
    const speed = 14 + (i % 5) * 4;
    const ttotal = (H + 80);
    const y = H - ((t * speed + seed) % ttotal);
    const a = Math.max(0, Math.min(1, (y / H)));
    ctx.globalAlpha = (1 - a) * 0.55;
    ctx.fillStyle = i % 3 === 0 ? '#ff9a40' : '#ffba66';
    ctx.beginPath(); ctx.arc(x + Math.sin(t + i)*8, y, 1.4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawCommandTier(ctx, x, y, w, h, t) {
  // Dark grey raised platform with a glowing red console strip on top
  ctx.fillStyle = '#1a2438';
  roundRect(ctx, x, y, w, h, 6); ctx.fill();
  ctx.fillStyle = '#262e44';
  roundRect(ctx, x+6, y+6, w-12, h-12, 4); ctx.fill();
  // glowing red sigil-strip
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.7 + 0.3*Math.sin(t*2 + x*0.01);
  ctx.globalAlpha = 0.85 * pulse;
  ctx.fillStyle = '#ff3a3a';
  ctx.fillRect(x+14, y+12, w-28, 4);
  ctx.globalAlpha = 0.20 * pulse;
  ctx.fillRect(x+6, y+4, w-12, 18);
  ctx.restore();
  // small sigil dots along the strip
  ctx.fillStyle = '#ff8050';
  for (let i = 0; i < 5; i++) {
    const px = x + 22 + i*((w-44)/4);
    ctx.beginPath(); ctx.arc(px, y + h - 14, 3, 0, Math.PI*2); ctx.fill();
  }
}

function drawInvertedDome(ctx, cx, cy, w, h, t) {
  // The huge inverted dome that hangs from the ceiling, like the comic ref.
  // Drawn as a downward-pointing wedge with red sigil grooves.
  ctx.save();
  // outer wedge
  ctx.fillStyle = '#0a0e1c';
  ctx.beginPath();
  ctx.moveTo(cx - w/2, cy);
  ctx.lineTo(cx + w/2, cy);
  ctx.lineTo(cx + w*0.32, cy + h*0.72);
  ctx.quadraticCurveTo(cx, cy + h, cx - w*0.32, cy + h*0.72);
  ctx.closePath();
  ctx.fill();
  // inner shadow ridges
  ctx.strokeStyle = '#1a2438'; ctx.lineWidth = 2;
  for (let i = 1; i < 4; i++) {
    const s = i / 4;
    ctx.beginPath();
    ctx.moveTo(cx - w/2 + s*30, cy + 8);
    ctx.quadraticCurveTo(cx, cy + h*(0.5+s*0.3), cx + w/2 - s*30, cy + 8);
    ctx.stroke();
  }
  // central red sigil — diamond/spear
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.7 + 0.3*Math.sin(t*1.4);
  ctx.globalAlpha = 0.85 * pulse;
  ctx.fillStyle = '#ff3a3a';
  // vertical bar
  ctx.fillRect(cx - 2, cy + h*0.18, 4, h*0.55);
  // spear-tip
  ctx.beginPath();
  ctx.moveTo(cx, cy + h*0.78);
  ctx.lineTo(cx - 5, cy + h*0.70);
  ctx.lineTo(cx + 5, cy + h*0.70);
  ctx.closePath(); ctx.fill();
  // halo
  ctx.globalAlpha = 0.20 * pulse;
  ctx.beginPath(); ctx.arc(cx, cy + h*0.5, 60, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // small red dots on dome rim
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI*0.92 + (i/5)*Math.PI*0.84;
    const px = cx + Math.cos(a) * w*0.42;
    const py = cy + 12 + Math.sin(a) * h*0.15;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.7 + 0.3*Math.sin(t*3 + i);
    ctx.fillStyle = '#ff3a3a';
    ctx.beginPath(); ctx.arc(px, py, 2.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawProjectionColumn(ctx, cx, cy, t) {
  // Vertical column of red-orange holographic data rising into the dome
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.7 + 0.3*Math.sin(t*1.8);

  // outer halo
  ctx.globalAlpha = 0.18 * pulse;
  const grad = ctx.createRadialGradient(cx, cy, 8, cx, cy, 180);
  grad.addColorStop(0, '#ffdd80'); grad.addColorStop(0.5, '#ff5028'); grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(cx - 200, cy - 200, 400, 400);

  // central glowing pillar (extends UP from floor to dome above)
  const colW = 56;
  const gradCol = ctx.createLinearGradient(cx - colW/2, 0, cx + colW/2, 0);
  gradCol.addColorStop(0, 'rgba(255,80,40,0.05)');
  gradCol.addColorStop(0.5, 'rgba(255,180,90,0.85)');
  gradCol.addColorStop(1, 'rgba(255,80,40,0.05)');
  ctx.globalAlpha = 0.85 * pulse;
  ctx.fillStyle = gradCol;
  ctx.fillRect(cx - colW/2, cy - 340, colW, 340);

  // scrolling data flakes — small bright squares rising
  for (let i = 0; i < 16; i++) {
    const off = ((t*60 + i*22) % 320);
    const px = cx - 18 + ((i*7) % 36);
    const py = cy - off + 4;
    ctx.globalAlpha = 0.7 * pulse * (1 - off/320);
    ctx.fillStyle = '#ffdd80';
    ctx.fillRect(px, py, 3, 2);
  }
  ctx.restore();

  // base projector ring on the floor
  ctx.save();
  ctx.fillStyle = '#1a2438';
  ctx.beginPath(); ctx.ellipse(cx, cy, 56, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a2828';
  ctx.beginPath(); ctx.ellipse(cx, cy, 48, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.85 * pulse;
  ctx.fillStyle = '#ffaa50';
  ctx.beginPath(); ctx.ellipse(cx, cy, 38, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawHoodedReaper(ctx, x, y, t, seed) {
  // Placeholder hooded reaper — dark cloak + black hood + thin scythe.
  // Will be replaced with real sprites later.
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.ellipse(x, y + 30, 18, 5, 0, 0, Math.PI*2); ctx.fill();
  // cloak body (trapezoidal)
  ctx.fillStyle = '#0a0e1c';
  ctx.beginPath();
  ctx.moveTo(x - 8, y - 14);
  ctx.lineTo(x + 8, y - 14);
  ctx.lineTo(x + 16, y + 28);
  ctx.lineTo(x - 16, y + 28);
  ctx.closePath(); ctx.fill();
  // cloak inner highlight
  ctx.fillStyle = '#1a2438';
  ctx.beginPath();
  ctx.moveTo(x - 5, y - 8);
  ctx.lineTo(x + 5, y - 8);
  ctx.lineTo(x + 10, y + 24);
  ctx.lineTo(x - 10, y + 24);
  ctx.closePath(); ctx.fill();
  // hood
  ctx.fillStyle = '#0a0e1c';
  ctx.beginPath();
  ctx.moveTo(x - 9, y - 12);
  ctx.quadraticCurveTo(x, y - 26, x + 9, y - 12);
  ctx.lineTo(x + 7, y - 4);
  ctx.lineTo(x - 7, y - 4);
  ctx.closePath(); ctx.fill();
  // shadow inside hood — barely-visible coal eye
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.6 + 0.4*Math.sin(t*2 + seed);
  ctx.fillStyle = '#ff3a3a';
  ctx.fillRect(x - 2, y - 12, 1.5, 1.5);
  ctx.fillRect(x + 1, y - 12, 1.5, 1.5);
  ctx.restore();
  // scythe — long thin staff with curved blade at top
  ctx.strokeStyle = '#2a2018'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(x + 12, y - 40); ctx.lineTo(x + 14, y + 28); ctx.stroke();
  // blade
  ctx.fillStyle = '#9d9d9d';
  ctx.beginPath();
  ctx.moveTo(x + 12, y - 40);
  ctx.quadraticCurveTo(x + 26, y - 50, x + 38, y - 32);
  ctx.lineTo(x + 16, y - 32);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawDormHall(ctx, room){
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  drawStoneFloor(ctx, W, H, p, 2);
  // outer walls
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#1a0e2c');
  // central long carpet runner (deep wine)
  drawCarpet(ctx, 64, H/2-72, W-128, 144, '#5a1f3a');
  // 12 procedural dorm doors keyed off DORM_ROSTER (6 top + 6 bottom)
  for (const slot of DORM_ROSTER) {
    drawDormDoor(ctx, slot.worldX, slot.worldY, slot.side, p, slot.occupant);
  }
  // sconces between every door
  for (let i = 0; i < 7; i++) {
    drawSconce(ctx, (3 + i*4)*64, 60, p.candle, t, i*7);
    drawSconce(ctx, (3 + i*4)*64, H-60, p.candle, t, i*11);
  }
  // central chandelier
  drawChandelier(ctx, W/2, 2*64, 1.0, p.candle, t);
  drawChandelier(ctx, W*0.25, 2*64, 0.85, p.candle, t);
  drawChandelier(ctx, W*0.75, 2*64, 0.85, p.candle, t);
  // floor signage — engraved gold roman numerals
  ctx.save();
  ctx.font = 'bold 14px Cinzel,Georgia,serif';
  ctx.fillStyle = 'rgba(220,170,90,0.25)';
  ctx.textAlign = 'center'; ctx.fillText('◂ DORM HALL · DECK II ▸', W/2, H/2 + 22);
  ctx.restore();
}

function drawDormDoor(ctx, x, y, side, p, occ){
  // Tall pointed gothic door inset into the wall, with the reaper's magic sigil
  // glowing above it. A DECEASED reaper's sigil goes cold and stops glowing.
  ctx.save();
  // arched recess
  ctx.fillStyle = '#0a0518';
  ctx.beginPath();
  ctx.moveTo(x-26, y+10);
  ctx.quadraticCurveTo(x, y-14, x+26, y+10);
  ctx.lineTo(x+26, y+58);
  ctx.lineTo(x-26, y+58);
  ctx.closePath();
  ctx.fill();
  // SEALED dorm — stone-welded plate over the recess
  if (occ && occ.kind === 'sealed') {
    ctx.fillStyle = '#2a1828';
    ctx.fillRect(x-22, y+14, 44, 40);
    // iron rivets
    ctx.fillStyle = '#0a0518';
    for (let r = 0; r < 8; r++) {
      const rx = x - 18 + (r%4)*12;
      const ry = y + 18 + Math.floor(r/4)*28;
      ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.fill();
    }
    // Welded-over "X"
    ctx.strokeStyle = '#5a3a52'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x-16, y+20); ctx.lineTo(x+16, y+48); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+16, y+20); ctx.lineTo(x-16, y+48); ctx.stroke();
    ctx.restore();
    return;
  }
  // wooden door
  ctx.fillStyle = '#3a1c2c';
  ctx.beginPath();
  ctx.moveTo(x-22, y+14);
  ctx.quadraticCurveTo(x, y-4, x+22, y+14);
  ctx.lineTo(x+22, y+54);
  ctx.lineTo(x-22, y+54);
  ctx.closePath();
  ctx.fill();
  // iron banding
  ctx.strokeStyle = '#1a0e2c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x-20, y+22); ctx.lineTo(x+20, y+22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-20, y+38); ctx.lineTo(x+20, y+38); ctx.stroke();
  // small viewing slit (warm amber light, very subtle — dim if deceased)
  ctx.fillStyle = '#1a0e2c';
  ctx.fillRect(x-3, y+18, 6, 6);
  if (!(occ && occ.deceased)) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.45 + 0.35*Math.sin(t*2 + x*.01);
    ctx.fillStyle = p.candle;
    ctx.fillRect(x-2.5, y+19, 5, 5);
    ctx.restore();
  }
  // === REAPER MAGIC SIGIL — drawn ABOVE the door arch, glows if INTACT ===
  if (occ && occ.sigil) {
    const sigY = side === 'top' ? y + 36 : y + 36;          // upper-mid of door
    const intact = !occ.deceased;
    const immortal = !!occ.immortal;
    // Sigil colour: immortal = warm gold, normal-intact = pale violet, deceased = ash
    let sigCol = intact ? (immortal ? '#ffd86a' : '#d4a3ff') : '#5a4860';
    ctx.save();
    ctx.font = 'bold 18px Cinzel,Georgia,serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (intact) {
      // pulsing glow halo behind the sigil
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const pulse = immortal
        ? (0.78 + 0.22 * Math.sin(t * 1.4 + x*0.013))
        : (0.55 + 0.45 * Math.sin(t * 2.2 + x*0.021));
      ctx.globalAlpha = 0.35 * pulse;
      const grad = ctx.createRadialGradient(x, sigY, 1, x, sigY, 22);
      grad.addColorStop(0, sigCol);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x - 22, sigY - 22, 44, 44);
      ctx.restore();
      // Crisp sigil glyph on top
      ctx.shadowColor = sigCol;
      ctx.shadowBlur = immortal ? 14 : 8;
    } else {
      ctx.globalAlpha = 0.45;
    }
    ctx.fillStyle = sigCol;
    ctx.fillText(occ.sigil, x, sigY);
    ctx.restore();
    // Deceased: a faint trail of soft ashen smoke rising from the sigil
    if (!intact) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#6a5470';
      for (let k = 0; k < 3; k++) {
        const dy = -k*8 + ((t*22 + k*5) % 16);
        const dx = Math.sin(t*1.5 + k*2 + x*0.05) * 3;
        ctx.beginPath(); ctx.arc(x + dx, sigY - 18 - dy, 2 - k*0.4, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawMaysRoom(ctx, room){
  const W = room.width * 64, H = room.height * 64;
  const p = room.palette;
  // wood plank floor (warm purple-tinted)
  ctx.fillStyle = '#2a1438';
  ctx.fillRect(0,0,W,H);
  for (let y = 0; y < H; y += 22) {
    for (let x = 0; x < W; x += 84) {
      const off = ((y/22) % 2) * 42;
      const px = x - off;
      const v = Math.abs(Math.sin(px*0.04 + y*0.05))*8;
      ctx.fillStyle = `rgb(${42+v}, ${20+v*.5}, ${56+v})`;
      ctx.fillRect(px+1, y+1, 84-3, 22-3);
    }
  }
  // outer walls (deep purple)
  ctx.fillStyle = p.wall;
  ctx.fillRect(0,0,W,64); ctx.fillRect(0,H-64,W,64);
  ctx.fillRect(0,0,64,H); ctx.fillRect(W-64,0,64,H);
  drawWallTrim(ctx, W, H, '#1a0e2c');
  // stained-glass arched window over bed (top wall)
  drawArchWindow(ctx, 7.5*64, 4, 3*64, 56);
  // canopy bed (with draped curtains)
  ctx.fillStyle = '#1a0a26';
  roundRect(ctx, 1.2*64, 2*64, 4*64, 3*64, 8); ctx.fill();
  // mattress
  ctx.fillStyle = '#5a2c80';
  roundRect(ctx, 1.2*64+12, 2*64+18, 4*64-24, 3*64-30, 6); ctx.fill();
  // pillow
  ctx.fillStyle = '#e8b9d8';
  ctx.fillRect(1.2*64+22, 2*64+24, 1.2*64, 0.45*64);
  // bed posts (4)
  ctx.fillStyle = '#1a0a26';
  ctx.fillRect(1.2*64-2, 2*64-4, 6, 3.2*64);
  ctx.fillRect(1.2*64+4*64-4, 2*64-4, 6, 3.2*64);
  // curtain drapery (left & right)
  ctx.fillStyle = 'rgba(120,60,160,0.85)';
  ctx.beginPath();
  ctx.moveTo(1.2*64, 2*64-4); ctx.lineTo(1.2*64+24, 2*64+1*64);
  ctx.lineTo(1.2*64+10, 2*64+2.5*64); ctx.lineTo(1.2*64-2, 2*64+2.5*64);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(1.2*64+4*64, 2*64-4); ctx.lineTo(1.2*64+4*64-24, 2*64+1*64);
  ctx.lineTo(1.2*64+4*64-10, 2*64+2.5*64); ctx.lineTo(1.2*64+4*64+2, 2*64+2.5*64);
  ctx.closePath(); ctx.fill();
  // VANITY
  ctx.fillStyle = '#e8b9d8';
  roundRect(ctx, 13*64, 1.5*64, 3.5*64, 2*64, 8); ctx.fill();
  ctx.fillStyle = '#7a4a90';
  ctx.fillRect(13*64+10, 1.5*64+10, 3.5*64-20, 14);
  // ornate mirror
  ctx.fillStyle = '#1a0a26';
  ctx.beginPath();
  ctx.moveTo(13*64+0.5*64, 1.5*64-30);
  ctx.quadraticCurveTo(13*64+1.75*64, 1.5*64-58, 13*64+3*64, 1.5*64-30);
  ctx.lineTo(13*64+3*64, 1.5*64);
  ctx.lineTo(13*64+0.5*64, 1.5*64);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(220,170,220,0.4)';
  ctx.beginPath();
  ctx.moveTo(13*64+0.6*64, 1.5*64-26);

  ctx.beginPath(); ctx.arc(1.2*64+0.7*64, 6.5*64+1.5*64, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.2*64+1.3*64, 6.5*64+1.5*64, 3, 0, Math.PI*2); ctx.fill();
  // BOOKSHELF
  ctx.fillStyle = '#1a0a26';
  roundRect(ctx, 14.5*64, 5.5*64, 2.5*64, 5*64, 4); ctx.fill();
